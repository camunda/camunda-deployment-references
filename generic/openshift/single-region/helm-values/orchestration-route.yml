---
orchestration:

    service:
        annotations:
            # generate a TLS certificate for the Zeebe Gateway Service
            service.beta.openshift.io/serving-cert-secret-name: camunda-platform-internal-service-certificate

    ingress:
        grpc:
            enabled: true
            annotations:
                haproxy.router.openshift.io/timeout: 300s
                route.openshift.io/termination: reencrypt
                # reference the re-encrypt secret
                route.openshift.io/destination-ca-certificate-secret: camunda-platform-internal-service-certificate
            className: openshift-default
            tls:
                enabled: true
                # TODO(docs): before merging, port the explanation below into
                # camunda-docs (Self-Managed > OpenShift > Ingress / ROSA HCP
                # ALPN h2 procedure). Reference companion scripts:
                #   procedure/enable-ingress-http2.sh
                #   procedure/copy-router-tls-secret.sh
                #
                # Default value `'-'` lets the Ingress Operator manage the Route TLS
                # certificate automatically. This works on self-managed OpenShift
                # clusters that advertise ALPN h2 on default certs (e.g. with
                # cluster-wide `default-enable-http2=true`, see
                # `procedure/enable-ingress-http2.sh`).
                #
                # On ROSA HCP managed clusters, HAProxy only advertises ALPN h2
                # per-SNI via a `crt-list` entry, which requires the Route to
                # carry an explicit `spec.tls.certificate`. In that case, override
                # this value (e.g. with `yq`) to reference a Secret holding the
                # router default wildcard cert (provisioned by
                # `procedure/copy-router-tls-secret.sh`), for example:
                #     secretName: camunda-platform-router-tls
                secretName: '-'
            host: zeebe-${CAMUNDA_DOMAIN}

    # mount the Service certificate in the pod
    env:
        - name: CAMUNDA_API_GRPC_SSL_ENABLED
          value: 'true'
        - name: CAMUNDA_API_GRPC_SSL_CERTIFICATE
          value: /usr/local/camunda/config/tls.crt
        - name: CAMUNDA_API_GRPC_SSL_CERTIFICATEPRIVATEKEY
          value: /usr/local/camunda/config/tls.key
    extraVolumeMounts:
        - name: certificate
          mountPath: /usr/local/camunda/config/tls.crt
          subPath: tls.crt
        - name: key
          mountPath: /usr/local/camunda/config/tls.key
          subPath: tls.key
    extraVolumes:
        - name: certificate
          secret:
              secretName: camunda-platform-internal-service-certificate
              items:
                  - key: tls.crt
                    path: tls.crt
              defaultMode: 420
        - name: key
          secret:
              secretName: camunda-platform-internal-service-certificate
              items:
                  - key: tls.key
                    path: tls.key
              defaultMode: 420
