---
# Chart values for the Camunda Platform 8 Helm chart.
# This file deliberately contains only the values that differ from the defaults.
# For changes and documentation, use your favorite diff tool to compare it with:
# https://github.com/camunda/camunda-platform-helm/blob/main/charts/camunda-platform/values.yaml

# This is an example values.yml for a dual-region setup and might require resource tuning from your side
#
# Elasticsearch is managed via the ECK operator and configured through a separate overlay file:
# - Elasticsearch: generic/kubernetes/operator-based/elasticsearch/camunda-elastic-values.yml
#

global:
    # Multiregion options for the Orchestration Cluster
    #
    ## WARNING: In order to get your multi-region setup covered by Camunda enterprise support
    # you MUST get your configuration and run books reviewed by Camunda before going to production.
    # This is necessary for us to be able to help you in case of outages,
    # due to the complexity of operating multi-region setups and the dependencies to the underlying Kubernetes prerequisites.
    # If you operate this in the wrong way you risk corruption and complete loss of all data especially in the dual-region case.
    # If you can, consider three regions. Please, contact your customer success manager as soon as you start planning a multi-region setup.
    # Camunda reserves the right to limit support if no review was done prior to launch or the review showed significant risks.
    multiregion:
        # number of regions that this Camunda Platform instance is stretched across
        regions: 2
    security:
        authentication:
            # Use basic auth for inter-component communication (demo/demo)
            # since Management Identity (Keycloak) is not deployed in dual-region
            method: basic
    identity:
        auth:
            # Disable the Identity authentication
            # it will fall back to basic-auth: demo/demo as default user
            enabled: false

    compatibility:
        openshift:
            adaptSecurityContext: force # enforce compatibility with SCCs

connectors:
    enabled: true

orchestration:
    data:
        secondaryStorage:
            type: elasticsearch
    clusterSize: '8'
    partitionCount: '8'
    replicationFactor: '4'
    # Disable the Camunda and Zeebe exporters as we use region specific ones below
    exporters:
        camunda:
            enabled: false
        zeebe:
            enabled: false
    env:
        - name: CAMUNDA_DATA_BACKUP_REPOSITORYNAME
          value: camunda_backup
        - name: CAMUNDA_PERSISTENT_SESSIONS_ENABLED
          value: 'true'
        - name: CAMUNDA_CLUSTER_INITIALCONTACTPOINTS
          value: ${CAMUNDA_CLUSTER_INITIALCONTACTPOINTS}
        # Region 0 exporter config
        - name: CAMUNDA_DATA_EXPORTERS_CAMUNDAREGION0_CLASSNAME
          value: io.camunda.exporter.CamundaExporter
        - name: CAMUNDA_DATA_EXPORTERS_CAMUNDAREGION0_ARGS_CONNECT_URL
          value: ${CAMUNDA_DATA_EXPORTERS_CAMUNDAREGION0_ARGS_CONNECT_URL}
        - name: CAMUNDA_DATA_EXPORTERS_CAMUNDAREGION0_ARGS_CONNECT_USERNAME
          value: elastic
        - name: CAMUNDA_DATA_EXPORTERS_CAMUNDAREGION0_ARGS_CONNECT_PASSWORD
          valueFrom:
              secretKeyRef:
                  name: elasticsearch-es-password-region-0
                  key: elastic
        # Region 1 exporter config
        - name: CAMUNDA_DATA_EXPORTERS_CAMUNDAREGION1_CLASSNAME
          value: io.camunda.exporter.CamundaExporter
        - name: CAMUNDA_DATA_EXPORTERS_CAMUNDAREGION1_ARGS_CONNECT_URL
          value: ${CAMUNDA_DATA_EXPORTERS_CAMUNDAREGION1_ARGS_CONNECT_URL}
        - name: CAMUNDA_DATA_EXPORTERS_CAMUNDAREGION1_ARGS_CONNECT_USERNAME
          value: elastic
        - name: CAMUNDA_DATA_EXPORTERS_CAMUNDAREGION1_ARGS_CONNECT_PASSWORD
          valueFrom:
              secretKeyRef:
                  name: elasticsearch-es-password-region-1
                  key: elastic
        # Zeebe cluster tuning
        - name: CAMUNDA_DATA_SNAPSHOTPERIOD
          value: 5m
        - name: CAMUNDA_CLUSTER_MEMBERSHIP_PROBETIMEOUT
          value: 500ms
        - name: CAMUNDA_CLUSTER_MEMBERSHIP_PROBEINTERVAL
          value: 2s
        - name: CAMUNDA_CLUSTER_RAFT_SNAPSHOTREQUESTTIMEOUT
          value: 10s
        - name: CAMUNDA_CLUSTER_COMPRESSIONALGORITHM
          value: GZIP
        - name: CAMUNDA_CLUSTER_NETWORK_ADVERTISEDHOST
          value: ${DOLLAR}(K8S_NAME).$ZEEBE_SERVICE_NAME
    # TEMPORARY WORKAROUND — remove once the upstream Camunda fix is released.
    # A Zeebe broker resolves its initialContactPoints only once at startup; if a
    # cross-region "*.svc.clusterset.local" name is not yet published by Submariner
    # Lighthouse at that moment (NXDOMAIN), the broker hangs forever (pod stays
    # 0/1 Running, port 9600 never opens) instead of re-resolving. This init
    # container gates broker startup until every initial contact point resolves,
    # so the broker process never sees an NXDOMAIN.
    # It reuses the broker image (already pulled on the node) to avoid an extra
    # image pull. The image is not hardcoded: ${DOLLAR}{BROKER_IMAGE} is resolved at
    # deploy time by install-chart.sh from the chart being installed, so it always
    # matches the orchestration/zeebe image without manual maintenance.
    # Tracking issue: https://github.com/camunda/camunda/issues/55038
    initContainers:
        - name: wait-clusterset-dns
          image: ${DOLLAR}{BROKER_IMAGE}
          command:
              - /bin/sh
              - -c
              - |
                set -eu
                # Fail open: if the image ships no resolver, do not block startup.
                command -v getent >/dev/null 2>&1 || { echo "getent unavailable; skipping cross-region DNS gate."; exit 0; }
                # Bounded TOTAL wait (~12 min) across all hosts, independent of how
                # many per-pod names we derive, so a genuine misconfiguration can
                # never stall startup past the deployment timeout (fail-open).
                deadline=${DOLLAR}(( ${DOLLAR}(date +%s) + ${DOLLAR}{CLUSTERSET_DNS_TIMEOUT_SECONDS:-720} ))
                # Brokers advertise and dial PER-POD clusterset names
                # (<statefulset>-<ordinal>.<contact-point-host>), not just the
                # per-region headless contact point. The headless name resolves as
                # soon as the ServiceImport exists, so gating only on it lets a
                # broker start before individual peer-pod records are published; it
                # then hits NXDOMAIN dialing a peer (e.g. ...-zeebe-0) and hangs.
                # Gate on every per-pod name instead. The Zeebe service name is the
                # 2nd DNS label of the contact point and each pod is reachable at
                # <service>-<ordinal>.<host>. brokers-per-region defaults to 4
                # (clusterSize 8 / 2 regions); if you change orchestration.clusterSize
                # or the number of regions, set BROKERS_PER_REGION to match so the
                # gate waits on the correct per-pod names.
                brokers_per_region="${DOLLAR}{BROKERS_PER_REGION:-4}"
                hosts=""
                for ep in ${DOLLAR}(echo "${CAMUNDA_CLUSTER_INITIALCONTACTPOINTS}" | tr ',' ' '); do
                  cp_host=${DOLLAR}(echo "${DOLLAR}ep" | cut -d: -f1)
                  svc=${DOLLAR}(echo "${DOLLAR}cp_host" | cut -d. -f2)
                  n=0
                  while [ "${DOLLAR}n" -lt "${DOLLAR}brokers_per_region" ]; do
                    hosts="${DOLLAR}hosts ${DOLLAR}{svc}-${DOLLAR}{n}.${DOLLAR}{cp_host}"
                    n=${DOLLAR}((n + 1))
                  done
                done
                echo "Waiting for cross-region clusterset DNS to resolve all Zeebe broker pods..."
                for host in ${DOLLAR}hosts; do
                  until getent hosts "${DOLLAR}host" >/dev/null 2>&1; do
                    if [ "${DOLLAR}(date +%s)" -ge "${DOLLAR}deadline" ]; then
                      echo "  giving up on ${DOLLAR}host (global ~12 min DNS budget exhausted); starting broker anyway (fail-open)."
                      break
                    fi
                    echo "  waiting for ${DOLLAR}host ..."
                    sleep 5
                  done
                done
                echo "Cross-region DNS gate complete; starting broker."
    pvcSize: 32Gi
    logLevel: ERROR

    resources:
        requests:
            cpu: 200m
            memory: 2Gi
        limits:
            cpu: 1512m
            memory: 5Gi

identity:
    enabled: false

identityKeycloak:
    enabled: false

console:
    enabled: false # by default, console is not enabled

optimize:
    enabled: false

elasticsearch:
    enabled: false
