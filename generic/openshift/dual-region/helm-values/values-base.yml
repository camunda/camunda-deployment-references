---
# Chart values for the Camunda Platform 8 Helm chart.
# This file deliberately contains only the values that differ from the defaults.
# For changes and documentation, use your favorite diff tool to compare it with:
# https://github.com/camunda/camunda-platform-helm/blob/main/charts/camunda-platform/values.yaml

global:
    # Multiregion options for Zeebe
    #
    ## WARNING: In order to get your multi-region setup covered by Camunda enterprise support
    # you MUST get your configuration and run books reviewed by Camunda before going to production.
    # This is necessary for us to be able to help you in case of outages,
    # due to the complexity of operating multi-region setups and the dependencies to the underlying Kubernetes prerequisites.
    # If you operate this in the wrong way you risk corruption and complete loss of all data especially in the dual-region case.
    # If you can, consider three regions. Please, contact your customer success manager as soon as you start planning a multi-region setup.
    # Camunda reserves the right to limit support if no review was done prior to launch or the review showed significant risks.
    multiregion:
        # number of regions that this Camunda Platform instance is stretched across
        regions: 2
    identity:
        auth:
            # Disable the Identity authentication
            # it will fall back to basic-auth: demo/demo as default user
            enabled: false
    elasticsearch:
        disableExporter: true

    compatibility:
        openshift:
            adaptSecurityContext: force # enforce compatibility with SCCs


operate:
    env:
        - name: CAMUNDA_OPERATE_BACKUP_REPOSITORYNAME
          value: camunda_backup
tasklist:
    env:
        - name: CAMUNDA_TASKLIST_BACKUP_REPOSITORYNAME
          value: camunda_backup

identity:
    enabled: false

# Temporary Helm chart v10 fix
identityKeycloak:
    enabled: false

optimize:
    enabled: false

connectors:
    enabled: false

zeebe:
    clusterSize: 8
    partitionCount: 8
    replicationFactor: 4
    env:
        - name: ZEEBE_BROKER_DATA_SNAPSHOTPERIOD
          value: 5m
        - name: ZEEBE_BROKER_DATA_DISKUSAGECOMMANDWATERMARK
          value: '0.85'
        - name: ZEEBE_BROKER_DATA_DISKUSAGEREPLICATIONWATERMARK
          value: '0.87'
        - name: ZEEBE_BROKER_CLUSTER_INITIALCONTACTPOINTS
          value: ${ZEEBE_BROKER_CLUSTER_INITIALCONTACTPOINTS}
        - name: ZEEBE_BROKER_EXPORTERS_ELASTICSEARCHREGION0_CLASSNAME
          value: io.camunda.zeebe.exporter.ElasticsearchExporter
        - name: ZEEBE_BROKER_EXPORTERS_ELASTICSEARCHREGION0_ARGS_URL
          value: ${ZEEBE_BROKER_EXPORTERS_ELASTICSEARCHREGION0_ARGS_URL}
        - name: ZEEBE_BROKER_EXPORTERS_ELASTICSEARCHREGION1_CLASSNAME
          value: io.camunda.zeebe.exporter.ElasticsearchExporter
        - name: ZEEBE_BROKER_EXPORTERS_ELASTICSEARCHREGION1_ARGS_URL
          value: ${ZEEBE_BROKER_EXPORTERS_ELASTICSEARCHREGION1_ARGS_URL}
        # Enable JSON logging for Google Cloud Stackdriver
        - name: ZEEBE_LOG_APPENDER
          value: Stackdriver
        - name: ZEEBE_LOG_STACKDRIVER_SERVICENAME
          value: zeebe
        - name: ZEEBE_LOG_STACKDRIVER_SERVICEVERSION
          valueFrom:
              fieldRef:
                  fieldPath: metadata.namespace
        # Cross-region SWIM membership tuning for stretched clusters. The default probe
        # timeout (100ms) is too tight for cross-region latency: on a cold start brokers
        # transiently see peers in the other region as unreachable, SWIM ejects them,
        # membership churns, and brokers flap so the topology never converges. Matches
        # the proven aws/containers/ecs-dual-region-fargate tuning.
        - name: ZEEBE_BROKER_CLUSTER_MEMBERSHIP_PROBETIMEOUT
          value: 1000ms
        - name: ZEEBE_BROKER_CLUSTER_MEMBERSHIP_PROBEINTERVAL
          value: 2s
        - name: ZEEBE_BROKER_CLUSTER_MEMBERSHIP_FAILURETIMEOUT
          value: 10000ms
        - name: ZEEBE_BROKER_EXPERIMENTAL_RAFT_SNAPSHOTREQUESTTIMEOUT
          value: 10s
        - name: ZEEBE_BROKER_CLUSTER_MESSAGECOMPRESSION
          value: GZIP
        - name: ZEEBE_BROKER_BACKPRESSURE_AIMD_REQUESTTIMEOUT
          value: 1s
        - name: ZEEBE_BROKER_NETWORK_ADVERTISEDHOST
          value: ${DOLLAR}(K8S_NAME).$ZEEBE_SERVICE_NAME
    # TEMPORARY WORKAROUND — remove once the upstream Camunda fix is released.
    # A Zeebe broker resolves its initialContactPoints only once at startup; if a
    # cross-region "*.svc.clusterset.local" name is not yet published by Submariner
    # Lighthouse at that moment (NXDOMAIN), the broker hangs forever (pod stays
    # 0/1 Running, port 9600 never opens) instead of re-resolving. This init
    # container gates broker startup until every initial contact point resolves,
    # so the broker process never sees an NXDOMAIN.
    # It reuses the broker image (already pulled on the node) to avoid an extra
    # image pull. The image is not hardcoded: ${DOLLAR}{BROKER_IMAGE} is resolved at
    # deploy time by install-chart.sh from the chart being installed, so it always
    # matches the orchestration/zeebe image without manual maintenance.
    # Tracking issue: https://github.com/camunda/camunda/issues/55038
    initContainers:
        - name: wait-clusterset-dns
          image: ${DOLLAR}{BROKER_IMAGE}
          command:
              - /bin/sh
              - -c
              - |
                set -eu
                # Fail open: if the image ships no resolver, do not block startup.
                command -v getent >/dev/null 2>&1 || { echo "getent unavailable; skipping cross-region DNS gate."; exit 0; }
                # Bounded TOTAL wait (~12 min) across all contact points, independent
                # of how many there are, so a genuine misconfiguration can never stall
                # startup past the deployment timeout (fail-open).
                deadline=${DOLLAR}(( ${DOLLAR}(date +%s) + ${DOLLAR}{CLUSTERSET_DNS_TIMEOUT_SECONDS:-720} ))
                echo "Waiting for cross-region clusterset DNS to resolve all Zeebe contact points..."
                for ep in ${DOLLAR}(echo "${ZEEBE_BROKER_CLUSTER_INITIALCONTACTPOINTS}" | tr ',' ' '); do
                  host=${DOLLAR}(echo "${DOLLAR}ep" | cut -d: -f1)
                  until getent hosts "${DOLLAR}host" >/dev/null 2>&1; do
                    if [ "${DOLLAR}(date +%s)" -ge "${DOLLAR}deadline" ]; then
                      echo "  giving up on ${DOLLAR}host (global ~12 min DNS budget exhausted); starting broker anyway (fail-open)."
                      break
                    fi
                    echo "  waiting for ${DOLLAR}host ..."
                    sleep 5
                  done
                done
                echo "Cross-region DNS gate complete; starting broker."
    pvcSize: 1Gi

    resources:
        requests:
            cpu: 100m
            memory: 512M
        limits:
            cpu: 512m
            memory: 2Gi

zeebeGateway:
    replicas: 1

    env:
        - name: ZEEBE_GATEWAY_CLUSTER_MESSAGECOMPRESSION
          value: GZIP
        - name: ZEEBE_GATEWAY_CLUSTER_MEMBERSHIP_PROBETIMEOUT
          value: 1000ms
        - name: ZEEBE_GATEWAY_CLUSTER_MEMBERSHIP_PROBEINTERVAL
          value: 2s
        - name: ZEEBE_GATEWAY_CLUSTER_MEMBERSHIP_FAILURETIMEOUT
          value: 10000ms

    resources:
        requests:
            cpu: 100m
            memory: 512M
        limits:
            cpu: 1000m
            memory: 1Gi

    logLevel: ERROR

elasticsearch:
    enabled: true
    master:
        replicaCount: 3
        resources:
            requests:
                cpu: 100m
                memory: 512M
            limits:
                cpu: 1000m
                memory: 2Gi
        persistence:
            size: 15Gi
    initScripts:
        init-keystore.sh: |
            #!/bin/bash
            set -e

            echo "Adding S3 access keys to Elasticsearch keystore..."

            # Add S3 client camunda keys to the keystore
            echo "${DOLLAR}S3_SECRET_KEY" | elasticsearch-keystore add -x s3.client.camunda.secret_key
            echo "${DOLLAR}S3_ACCESS_KEY" | elasticsearch-keystore add -x s3.client.camunda.access_key
    extraEnvVarsSecret: elasticsearch-env-secret
