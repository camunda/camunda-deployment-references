---
# Elasticsearch Backup Verification Job
# Verifies source ES health and lists indices to be migrated.
# The actual data transfer uses the _reindex API during restore (no snapshots).
# Required env vars: JOB_NAME, ES_IMAGE, ES_HOST, ES_PORT, ES_SECRET_NAME,
#   NAMESPACE, TIMESTAMP
apiVersion: batch/v1
kind: Job
metadata:
    name: ${JOB_NAME}
    namespace: ${NAMESPACE}
    labels:
        app: orchestration-migration
        migration.camunda.io/type: backup
        migration.camunda.io/component: elasticsearch
spec:
    ttlSecondsAfterFinished: 3600
    backoffLimit: 2
    template:
        metadata:
            labels:
                app: orchestration-migration
                migration.camunda.io/type: backup
        spec:
            restartPolicy: Never
            containers:
                - name: backup
                  image: ${ES_IMAGE}
                  command:
                      - /bin/bash
                      - -c
                      - |
                        set -euo pipefail
                        echo "=== ES Backup Verification ==="
                        echo "Source: ${ES_HOST}:${ES_PORT}"

                        AUTH=()
                        [ -n "${ES_PASSWORD:-}" ] && AUTH=(-u "elastic:$ES_PASSWORD")

                        # Wait for ES
                        MAX_RETRIES=60; RETRY=0
                        until curl -sf "${AUTH[@]}" "http://${ES_HOST}:${ES_PORT}/_cluster/health" >/dev/null; do
                          RETRY=$((RETRY + 1))
                          if [ "$RETRY" -ge "$MAX_RETRIES" ]; then
                            echo "ERROR: Elasticsearch not ready after $MAX_RETRIES attempts"; exit 1
                          fi
                          echo "Waiting for Elasticsearch ($RETRY/$MAX_RETRIES)..."; sleep 5
                        done

                        echo "Cluster health:"
                        curl -sf "${AUTH[@]}" "http://${ES_HOST}:${ES_PORT}/_cluster/health?pretty"
                        echo ""

                        # List Camunda indices
                        echo "Camunda indices:"
                        INDEX_INFO=$(curl -sf "${AUTH[@]}" "http://${ES_HOST}:${ES_PORT}/_cat/indices?h=index,docs.count,store.size&v" \
                          | grep -E "^(index|zeebe|operate|tasklist|optimize|connectors)" || echo "(none found)")
                        echo "$INDEX_INFO"
                        echo ""

                        # Summary totals
                        TOTAL_DOCS=$(echo "$INDEX_INFO" | grep -v "^index" | awk '{s+=$2} END {printf "%d", s}')
                        TOTAL_INDICES=$(echo "$INDEX_INFO" | grep -v "^index" | wc -l | tr -d ' ')
                        echo "Summary: $TOTAL_INDICES indices, $TOTAL_DOCS total documents"
                        echo ""

                        echo "Backup verification complete"
                  env:
                      - name: ES_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: ${ES_SECRET_NAME}
                                key: elasticsearch-password
                                optional: true
                  resources:
                      requests: {memory: 128Mi, cpu: 50m}
                      limits: {memory: 256Mi, cpu: 200m}
