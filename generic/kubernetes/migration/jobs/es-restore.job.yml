---
# Elasticsearch Reindex-from-Remote Restore Job
# Copies indices from source ES to target ES using the _reindex API.
# Requires target ES to have: reindex.remote.whitelist: "*:9200"
# Required env vars: JOB_NAME, ES_IMAGE, SOURCE_ES_HOST, SOURCE_ES_PORT,
#   TARGET_ES_HOST, TARGET_ES_PORT, SOURCE_ES_SECRET_NAME,
#   TARGET_ES_SECRET_NAME, NAMESPACE, TIMESTAMP
apiVersion: batch/v1
kind: Job
metadata:
    name: ${JOB_NAME}
    namespace: ${NAMESPACE}
    labels:
        app: orchestration-migration
        migration.camunda.io/type: restore
        migration.camunda.io/component: elasticsearch
spec:
    ttlSecondsAfterFinished: 3600
    backoffLimit: 2
    template:
        metadata:
            labels:
                app: orchestration-migration
                migration.camunda.io/type: restore
        spec:
            restartPolicy: Never
            containers:
                - name: restore
                  image: ${ES_IMAGE}
                  command:
                      - /bin/sh
                      - -c
                      - |
                        set -e
                        echo "=== ES Restore (Reindex from Remote) ==="

                        SOURCE="http://${SOURCE_ES_HOST}:${SOURCE_ES_PORT}"
                        TARGET="http://${TARGET_ES_HOST}:${TARGET_ES_PORT}"
                        echo "Source: $SOURCE"
                        echo "Target: $TARGET"

                        TARGET_AUTH=""
                        [ -n "$TARGET_ES_PASSWORD" ] && TARGET_AUTH="-u elastic:$TARGET_ES_PASSWORD"
                        SOURCE_AUTH=""
                        [ -n "$SOURCE_ES_PASSWORD" ] && SOURCE_AUTH="-u elastic:$SOURCE_ES_PASSWORD"

                        # Wait for target ES
                        MAX_RETRIES=60; RETRY=0
                        until curl -sf $TARGET_AUTH "$TARGET/_cluster/health" >/dev/null; do
                          RETRY=$((RETRY + 1))
                          if [ "$RETRY" -ge "$MAX_RETRIES" ]; then
                            echo "ERROR: Target ES not ready after $MAX_RETRIES attempts"; exit 1
                          fi
                          echo "Waiting for target ES ($RETRY/$MAX_RETRIES)..."; sleep 5
                        done

                        # Wait for source ES
                        RETRY=0
                        until curl -sf $SOURCE_AUTH "$SOURCE/_cluster/health" >/dev/null; do
                          RETRY=$((RETRY + 1))
                          if [ "$RETRY" -ge "$MAX_RETRIES" ]; then
                            echo "ERROR: Source ES not ready after $MAX_RETRIES attempts"; exit 1
                          fi
                          echo "Waiting for source ES ($RETRY/$MAX_RETRIES)..."; sleep 5
                        done

                        # Get list of Camunda indices from source
                        echo "Getting indices from source..."
                        INDICES=$(curl -sf $SOURCE_AUTH \
                          "$SOURCE/_cat/indices?h=index&format=text" \
                          | grep -E "^(zeebe|operate|tasklist|optimize|connectors)" | sort)

                        if [ -z "$INDICES" ]; then
                          echo "WARNING: No Camunda indices found on source. Nothing to reindex."
                          exit 0
                        fi

                        INDEX_COUNT=$(echo "$INDICES" | wc -l | tr -d ' ')
                        echo "Found $INDEX_COUNT Camunda indices to migrate"

                        # Delete existing Camunda indices on target to avoid conflicts
                        echo "Cleaning up existing indices on target..."
                        for pattern in "zeebe-*" "operate-*" "tasklist-*" "optimize-*" "connectors-*"; do
                          curl -sf -X DELETE $TARGET_AUTH "$TARGET/$pattern" 2>/dev/null || true
                        done

                        # Build remote source auth fragment
                        REMOTE_AUTH=""
                        if [ -n "$SOURCE_ES_PASSWORD" ]; then
                          REMOTE_AUTH=",\"username\":\"elastic\",\"password\":\"$SOURCE_ES_PASSWORD\""
                        fi

                        # Reindex each index from source to target
                        CURRENT=0
                        FAILED=0
                        for idx in $INDICES; do
                          CURRENT=$((CURRENT + 1))
                          echo "[$CURRENT/$INDEX_COUNT] Reindexing: $idx"

                          BODY="{\"source\":{\"remote\":{\"host\":\"$SOURCE\"$REMOTE_AUTH},\"index\":\"$idx\"},\"dest\":{\"index\":\"$idx\"}}"

                          if ! curl -sf -X POST $TARGET_AUTH \
                            "$TARGET/_reindex?wait_for_completion=true&timeout=10m" \
                            -H 'Content-Type: application/json' \
                            -d "$BODY"; then
                            echo "  WARN: Failed to reindex $idx"
                            FAILED=$((FAILED + 1))
                          fi
                          echo ""
                        done

                        # Verify
                        echo ""
                        echo "Target cluster health:"
                        curl -sf $TARGET_AUTH "$TARGET/_cluster/health?pretty"
                        echo ""
                        echo "Target indices:"
                        curl -sf $TARGET_AUTH "$TARGET/_cat/indices?v"
                        echo ""

                        if [ "$FAILED" -gt 0 ]; then
                          echo "ERROR: $FAILED out of $INDEX_COUNT indices failed to reindex"
                          exit 1
                        fi

                        echo "Restore complete: $INDEX_COUNT indices migrated"
                  env:
                      - name: TARGET_ES_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: ${TARGET_ES_SECRET_NAME}
                                key: elastic
                                optional: true
                      - name: SOURCE_ES_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: ${SOURCE_ES_SECRET_NAME}
                                key: elasticsearch-password
                                optional: true
                  resources:
                      requests: {memory: 128Mi, cpu: 50m}
                      limits: {memory: 256Mi, cpu: 200m}
