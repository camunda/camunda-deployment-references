---
# PostgreSQL Backup Job (generic, parameterized by COMPONENT)
# Required env vars: COMPONENT, JOB_NAME, PG_HOST, PG_PORT, PG_DATABASE,
#   PG_USERNAME, PG_SECRET_NAME, PG_SECRET_KEY, PG_IMAGE, BACKUP_PVC, NAMESPACE, TIMESTAMP
apiVersion: batch/v1
kind: Job
metadata:
    name: ${JOB_NAME}
    namespace: ${NAMESPACE}
    labels:
        app: ${COMPONENT}-migration
        migration.camunda.io/type: backup
        migration.camunda.io/component: ${COMPONENT}
spec:
    ttlSecondsAfterFinished: 3600
    backoffLimit: 2
    template:
        metadata:
            labels:
                app: ${COMPONENT}-migration
                migration.camunda.io/type: backup
        spec:
            restartPolicy: Never
            containers:
                - name: backup
                  image: ${PG_IMAGE}
                  command:
                      - /bin/bash
                      - -c
                      - |
                        set -euo pipefail
                        echo "=== PG Backup: ${COMPONENT} ==="
                        echo "Source: ${PG_HOST}:${PG_PORT}/${PG_DATABASE}"

                        MAX_RETRIES=60; RETRY=0
                        until pg_isready -h "${PG_HOST}" -p "${PG_PORT}" -U "$PGUSER"; do
                          RETRY=$((RETRY + 1))
                          if [ "$RETRY" -ge "$MAX_RETRIES" ]; then
                            echo "ERROR: PostgreSQL not ready after $MAX_RETRIES attempts"; exit 1
                          fi
                          echo "Waiting for PostgreSQL ($RETRY/$MAX_RETRIES)..."; sleep 5
                        done

                        mkdir -p /backup/${COMPONENT}

                        # ── Pre-backup metrics ──
                        echo "Database size: $(psql -h "${PG_HOST}" -p "${PG_PORT}" -U "$PGUSER" \
                          -d "${PG_DATABASE}" -tAc "SELECT pg_size_pretty(pg_database_size(current_database()))")"
                        echo ""
                        echo "Row counts per table:"
                        psql -h "${PG_HOST}" -p "${PG_PORT}" -U "$PGUSER" -d "${PG_DATABASE}" -tA \
                          -c "SELECT table_name || ': ' || n_live_tup FROM pg_stat_user_tables ORDER BY n_live_tup DESC" \
                          2>/dev/null || echo "  (statistics not available)"
                        TOTAL_ROWS=$(psql -h "${PG_HOST}" -p "${PG_PORT}" -U "$PGUSER" -d "${PG_DATABASE}" -tAc \
                          "SELECT COALESCE(SUM(n_live_tup),0) FROM pg_stat_user_tables" 2>/dev/null || echo "0")
                        echo "Total rows (approx): $TOTAL_ROWS"
                        echo ""

                        pg_dump -h "${PG_HOST}" -p "${PG_PORT}" -U "$PGUSER" \
                          -d "${PG_DATABASE}" -F custom \
                          -f /backup/${COMPONENT}/${COMPONENT}-db-${TIMESTAMP}.dump

                        echo "Backup complete:"
                        ls -lh /backup/${COMPONENT}/
                        echo "Objects: $(pg_restore --list /backup/${COMPONENT}/${COMPONENT}-db-${TIMESTAMP}.dump | wc -l)"
                  env:
                      - name: PGUSER
                        value: ${PG_USERNAME}
                      - name: PGPASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: ${PG_SECRET_NAME}
                                key: ${PG_SECRET_KEY}
                  resources:
                      requests: {memory: 256Mi, cpu: 100m}
                      limits: {memory: 512Mi, cpu: 500m}
                  volumeMounts:
                      - {name: backup, mountPath: /backup}
            volumes:
                - name: backup
                  persistentVolumeClaim:
                      claimName: ${BACKUP_PVC}
