---
# Benchmark job to generate realistic Zeebe data for migration validation.
#
# Uses camunda-8-benchmark to create process instances via gRPC, producing
# real exporter data in Elasticsearch (operate, tasklist indices).
# Runs for 5 minutes at 5 PI/s (~1500 process instances), then the Job
# is terminated by activeDeadlineSeconds.
#
# Authentication: uses the venom test client registered by Identity with
# admin role and full permissions (via bitnami-values-identity-test.yml).
#
# Prerequisites:
#   - Camunda 8.8+ deployed with bitnami-values.yml + bitnami-values-identity-test.yml
#   - identity-secret-for-components-integration secret created before helm install
#
# Usage:
#   kubectl apply -n camunda -f benchmark-job.yml
#   kubectl wait --for=condition=complete job/migration-benchmark -n camunda --timeout=600s

apiVersion: batch/v1
kind: Job
metadata:
    name: migration-benchmark
    labels:
        app: migration-test-data
spec:
    ttlSecondsAfterFinished: 3600
    activeDeadlineSeconds: 300
    backoffLimit: 0
    template:
        metadata:
            labels:
                app: migration-test-data
        spec:
            restartPolicy: Never
            containers:
                - name: benchmark
                  image: camundacommunityhub/camunda-8-benchmark:main
                  env:
                      - name: CAMUNDA_CLIENT_MODE
                        value: self-managed
                      - name: CAMUNDA_CLIENT_ZEEBE_GRPC_ADDRESS
                        value: http://camunda-zeebe-gateway:26500
                      - name: CAMUNDA_CLIENT_ZEEBE_REST_ADDRESS
                        value: http://camunda-zeebe-gateway:8080/rest
                      - name: CAMUNDA_CLIENT_ZEEBE_PREFER_REST_OVER_GRPC
                        value: 'false'
                      - name: CAMUNDA_CLIENT_AUTH_ISSUER
                        value: http://camunda-keycloak:80/auth/realms/camunda-platform/protocol/openid-connect/token
                      - name: CAMUNDA_CLIENT_AUTH_CLIENT_ID
                        valueFrom:
                            secretKeyRef:
                                name: identity-secret-for-components-integration
                                key: identity-admin-client-id
                      - name: CAMUNDA_CLIENT_AUTH_CLIENT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: identity-secret-for-components-integration
                                key: identity-admin-client-secret
                      - name: BENCHMARK_START_PROCESSES
                        value: 'true'
                      - name: BENCHMARK_START_PI_PER_SECOND
                        value: '5'
                      - name: BENCHMARK_AUTO_DEPLOY_PROCESS
                        value: 'true'
                      - name: BENCHMARK_BPMN_PROCESS_ID
                        value: benchmark
                      - name: BENCHMARK_START_WORKERS
                        value: 'true'
                      - name: BENCHMARK_JOB_TYPE
                        value: benchmark-task
                      - name: BENCHMARK_TASK_COMPLETION_DELAY
                        value: '100'
                      - name: BENCHMARK_WARMUP_PHASE_DURATION_MILLIS
                        value: '10000'
                      - name: BENCHMARK_START_RATE_ADJUSTMENT_STRATEGY
                        value: none
                  resources:
                      requests:
                          cpu: 500m
                          memory: 512Mi
                      limits:
                          cpu: 1
                          memory: 1Gi
