---
# Kind cluster configuration for migration tests.
# Derived from: local/kubernetes/kind-single-region/configs/kind-cluster-config.yaml
# with an extra worker node — migration requires more capacity (Bitnami source
# deployment + operator-based target deployment running side-by-side).
#
# Target runner: aws-core-16-longrunning (16 vCPU, ~50 GB RAM)

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: camunda-platform-local

# Bump containerd's per-pull progress timeout (default: 1m).
# Pulling many large camunda/keycloak/postgresql/elasticsearch images in
# parallel on a single Kind worker can exceed the default and yield
# "context canceled" / ImagePullBackOff errors, especially in CI runners.
# The migration scenario pulls the Bitnami source stack AND the operator-based
# target stack side-by-side, so it is even more sensitive to this timeout.
containerdConfigPatches:
    - |-
      [plugins."io.containerd.grpc.v1.cri"]
        image_pull_progress_timeout = "10m"

networking:
    apiServerAddress: 127.0.0.1
    apiServerPort: 6443

nodes:
    - role: control-plane
      # renovate: datasource=docker depName=kindest/node
      image: kindest/node:v1.34.0@sha256:7416a61b42b1662ca6ca89f02028ac133a309a2a30ba309614e8ec94d976dc5a
      extraPortMappings:
          - containerPort: 80
            hostPort: 80
            listenAddress: 0.0.0.0
          - containerPort: 443
            hostPort: 443
            listenAddress: 0.0.0.0
      kubeadmConfigPatches:
          - |
            kind: KubeletConfiguration
            evictionHard:
              memory.available: "200Mi"
            systemReserved:
              memory: "512Mi"
    - role: worker
      # renovate: datasource=docker depName=kindest/node
      image: kindest/node:v1.34.0@sha256:7416a61b42b1662ca6ca89f02028ac133a309a2a30ba309614e8ec94d976dc5a
      kubeadmConfigPatches:
          - |
            kind: KubeletConfiguration
            evictionHard:
              memory.available: "200Mi"
            systemReserved:
              memory: "512Mi"
    - role: worker
      # renovate: datasource=docker depName=kindest/node
      image: kindest/node:v1.34.0@sha256:7416a61b42b1662ca6ca89f02028ac133a309a2a30ba309614e8ec94d976dc5a
      kubeadmConfigPatches:
          - |
            kind: KubeletConfiguration
            evictionHard:
              memory.available: "200Mi"
            systemReserved:
              memory: "512Mi"
    - role: worker
      # renovate: datasource=docker depName=kindest/node
      image: kindest/node:v1.34.0@sha256:7416a61b42b1662ca6ca89f02028ac133a309a2a30ba309614e8ec94d976dc5a
      kubeadmConfigPatches:
          - |
            kind: KubeletConfiguration
            evictionHard:
              memory.available: "200Mi"
            systemReserved:
              memory: "512Mi"
