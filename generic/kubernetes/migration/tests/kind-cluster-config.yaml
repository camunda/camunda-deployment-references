---
# Kind cluster configuration for migration tests.
# Derived from: local/kubernetes/kind-single-region/configs/kind-cluster-config.yaml
# with an extra worker node — migration requires more capacity (Bitnami source
# deployment + operator-based target deployment running side-by-side).
#
# Target runner: aws-core-16-longrunning (16 vCPU, ~50 GB RAM)

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: camunda-platform-local

networking:
    apiServerAddress: 127.0.0.1
    apiServerPort: 6443

# Extend containerd's image-pull progress timeout (default 5m).
# The migration test pulls many large Camunda/Bitnami images (camunda ~480MB,
# optimize ~560MB, elasticsearch ~740MB, ...) across all Kind nodes at once.
# Under the runner's shared egress bandwidth a single in-flight pull can make
# no measurable progress for more than 5m, which makes containerd cancel it
# ("httpReadSeeker: failed open: context canceled") and restart it from
# scratch, so it never converges within the `helm install --wait` budget.
# A generous deadline lets starved pulls finish once peers complete.
containerdConfigPatches:
    - |-
      [plugins.'io.containerd.cri.v1.images']
        image_pull_progress_timeout = '30m'

nodes:
    - role: control-plane
      # renovate: datasource=docker depName=kindest/node
      image: kindest/node:v1.34.0@sha256:7416a61b42b1662ca6ca89f02028ac133a309a2a30ba309614e8ec94d976dc5a
      extraPortMappings:
          - containerPort: 80
            hostPort: 80
            listenAddress: 0.0.0.0
          - containerPort: 443
            hostPort: 443
            listenAddress: 0.0.0.0
      kubeadmConfigPatches:
          - |
            kind: KubeletConfiguration
            evictionHard:
              memory.available: "200Mi"
            systemReserved:
              memory: "512Mi"
    - role: worker
      # renovate: datasource=docker depName=kindest/node
      image: kindest/node:v1.34.0@sha256:7416a61b42b1662ca6ca89f02028ac133a309a2a30ba309614e8ec94d976dc5a
      kubeadmConfigPatches:
          - |
            kind: KubeletConfiguration
            evictionHard:
              memory.available: "200Mi"
            systemReserved:
              memory: "512Mi"
    - role: worker
      # renovate: datasource=docker depName=kindest/node
      image: kindest/node:v1.34.0@sha256:7416a61b42b1662ca6ca89f02028ac133a309a2a30ba309614e8ec94d976dc5a
      kubeadmConfigPatches:
          - |
            kind: KubeletConfiguration
            evictionHard:
              memory.available: "200Mi"
            systemReserved:
              memory: "512Mi"
    - role: worker
      # renovate: datasource=docker depName=kindest/node
      image: kindest/node:v1.34.0@sha256:7416a61b42b1662ca6ca89f02028ac133a309a2a30ba309614e8ec94d976dc5a
      kubeadmConfigPatches:
          - |
            kind: KubeletConfiguration
            evictionHard:
              memory.available: "200Mi"
            systemReserved:
              memory: "512Mi"
