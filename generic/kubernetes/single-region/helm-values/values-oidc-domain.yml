---
# OIDC Domain Overlay - Redirect URLs for Domain mode
#
# This file extends values-oidc.yml with domain-specific URLs.
# Merge order: values-domain.yml + values-oidc.yml + values-oidc-domain.yml
#   yq ". *+ load(\"values-oidc.yml\") *+ load(\"values-oidc-domain.yml\")" values-domain.yml > values.yml
#
# Required environment variables:
#   - CAMUNDA_DOMAIN: Your domain name

orchestration:
    # `orchestration.security.authentication.oidc.redirectUrl` is deprecated and
    # is removed in chart v16 (Camunda 8.11). It is migrated to its unified
    # configuration equivalents through `extraConfiguration` (imported last into
    # the Orchestration application config). The chart appended `/sso-callback`
    # for the Orchestration redirect-uri and `/operate` and `/tasklist` for the
    # Operate/Tasklist redirect roots; all three are reproduced here verbatim.
    extraConfiguration:
        - file: orchestration-oidc.yaml
          content: |
              camunda:
                security:
                  authentication:
                    oidc:
                      redirect-uri: https://${CAMUNDA_DOMAIN}/sso-callback
                operate:
                  identity:
                    redirectRootUrl: https://${CAMUNDA_DOMAIN}/operate
                tasklist:
                  identity:
                    redirectRootUrl: https://${CAMUNDA_DOMAIN}/tasklist
