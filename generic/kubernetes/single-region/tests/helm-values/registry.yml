---
# This file contains specific values used during the integration tests


# Auth to avoid Docker download rate limit.
# https://docs.docker.com/docker-hub/download-rate-limit/
identityKeycloak:
    image:
        # Mirror chart defaults so c8-sm-checks aws-irsa.sh can match the
        # 'camunda/keycloak' substring in helm get values output.
        # renovate: datasource=docker depName=camunda/keycloak
        repository: camunda/keycloak
        tag: 26.3.3
        pullSecrets:
            - name: index-docker-io

global:
    image:
        pullSecrets:
            - name: index-docker-io

elasticsearch:
    global:
        imagePullSecrets:
            - name: index-docker-io
