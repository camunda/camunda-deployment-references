---
# Identity test client configuration for RDBMS variant
# Same as identity.yml but without optimize-api permissions (Optimize is disabled in RDBMS mode)
# keep it synced with identity.yml
identity:
    clients:
        - id: venom
          name: Venom
          secret:
              existingSecret: identity-secret-for-components-integration
              existingSecretKey: identity-admin-client-secret
          redirectUris: /dummy
          rootUrl: http://dummy
          type: confidential
          permissions:
              - resourceServerId: camunda-identity-resource-server
                definition: read
              - resourceServerId: camunda-identity-resource-server
                definition: write
              - resourceServerId: orchestration-api
                definition: read:*
              - resourceServerId: orchestration-api
                definition: write:*
              - resourceServerId: web-modeler-api
                definition: write:*
              - resourceServerId: web-modeler-public-api
                definition: create:*
              - resourceServerId: web-modeler-public-api
                definition: read:*
              - resourceServerId: web-modeler-public-api
                definition: update:*
              - resourceServerId: web-modeler-public-api
                definition: delete:*
              - resourceServerId: console-api
                definition: write:*

orchestration:
    security:
        initialization:
            defaultRoles:
                admin:
                    clients:
                        - venom
