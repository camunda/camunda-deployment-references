---
# Camunda Platform 8 Values - Domain Configuration
# This configuration enables external access via ingress/routes with custom domains
#
# Variables substituted by envsubst:
# - CAMUNDA_DOMAIN: Domain for Camunda components (e.g., lei-standard.camunda.ie)
# - INGRESS_CLASS_NAME: Ingress controller class (contour for EKS, openshift-default for OpenShift)

global:
    host: ${CAMUNDA_DOMAIN}
    # Ingress configuration for external access
    ingress:
        enabled: true
        className: ${INGRESS_CLASS_NAME}
        tls:
            # TLS/HTTPS configuration - behavior depends on platform:
            # - EKS/Kubernetes: Uses cert-manager + Let's Encrypt for automatic certificates
            enabled: true  # Set to true for HTTPS
            # - OpenShift: secretName will be '-' because OpenShift routes handle TLS termination automatically
            secretName: camunda-c8-tls
        annotations:
            kubernetes.io/tls-acme: 'true'

    identity:
        auth:
            identity:
                redirectUrl: https://${CAMUNDA_DOMAIN}/managementidentity
            console:
                redirectUrl: https://${CAMUNDA_DOMAIN}/console
            webModeler:
                redirectUrl: https://${CAMUNDA_DOMAIN}/modeler
            optimize:
                redirectUrl: https://${CAMUNDA_DOMAIN}/optimize


orchestration:
    contextPath: /
    ingress:
        grpc:
            enabled: true
            host: zeebe-${CAMUNDA_DOMAIN}
            className: ${INGRESS_CLASS_NAME}
            tls:
                enabled: true
                secretName: zeebe-c8-tls-grpc
            annotations:
                kubernetes.io/tls-acme: 'true'
    # Tell Contour the gRPC upstream (port 26500) speaks cleartext HTTP/2 (h2c).
    # Required for Zeebe gRPC through the Contour ingress; inert on OpenShift
    # (routes handle gRPC) and ignored by controllers other than Contour.
    service:
        annotations:
            projectcontour.io/upstream-protocol.h2c: '26500'

# The Orchestration OIDC redirect (deprecated `orchestration.security.authentication.oidc.redirectUrl`,
# removed in chart v16 / Camunda 8.11) is configured via `extraConfiguration` in the
# co-applied keycloak/camunda-keycloak-domain-values.yml snippet, so it is not repeated here.
optimize:
    contextPath: /optimize

console:
    contextPath: /console

webModeler:
    contextPath: /modeler

connectors:
    contextPath: /connectors
