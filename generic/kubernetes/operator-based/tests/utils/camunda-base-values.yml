---
# Optimize configuration
optimize:
    enabled: true

# Connectors configuration
connectors:
    enabled: true

# Chart 15.x consolidates Console + WebModeler under Camunda Hub.
# `console.enabled` / `webModeler.enabled` are deprecated; sub-component
# overrides still pass through via the chart's `or` fallback.
camundaHub:
    enabled: true

identity:
    enabled: true
