---
# Elasticsearch cluster managed by ECK for dual-region setup — Teleport variant.
#
# This manifest adds Teleport-specific tolerations and nodeAffinity to
# schedule Elasticsearch pods on the unstable node groups used by the
# Teleport-based CI environment.
#
# Apply this AFTER the base elasticsearch-cluster-dual-region.yml to
# patch the running cluster.  ECK will perform a rolling update.
#
# Prerequisites:
# - ECK operator installed (via .github/actions/kubernetes-eck-operator)
# - Secret 'elasticsearch-s3-credentials' with keys:
#     s3.client.camunda.access_key
#     s3.client.camunda.secret_key
#
# Created service: elasticsearch-es-http:9200
# Created secret:  elasticsearch-es-elastic-user (auto-generated by ECK)

apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
    name: elasticsearch
spec:
    # renovate: datasource=docker depName=docker.elastic.co/elasticsearch/elasticsearch
    version: 8.19.12
    http:
        tls:
            selfSignedCertificate:
                disabled: true
    # S3 credentials for snapshot/backup repository
    # ECK injects these into the Elasticsearch keystore at startup
    secureSettings:
        - secretName: elasticsearch-s3-credentials
    nodeSets:
        - name: masters
          count: 2
          config:
              # Disable mmap for compatibility with containers that lack the required vm.max_map_count sysctl
              # yamllint disable-line
              node.store.allow_mmap: 'false'
              # Disable deprecation warnings - https://github.com/camunda/camunda/issues/26285
              # yamllint disable-line
              logger.org.elasticsearch.deprecation: OFF
          podTemplate:
              spec:
                  tolerations:
                      - key: t-core-8-unstable
                        operator: Exists
                        effect: NoSchedule
                      - key: t-core-16-unstable
                        operator: Exists
                        effect: NoSchedule
                  affinity:
                      nodeAffinity:
                          requiredDuringSchedulingIgnoredDuringExecution:
                              nodeSelectorTerms:
                                  - matchExpressions:
                                        - key: nodegroup
                                          operator: In
                                          values:
                                              - t-core-8-unstable
                                              - t-core-16-unstable
                      podAntiAffinity:
                          requiredDuringSchedulingIgnoredDuringExecution:
                              - labelSelector:
                                    matchExpressions:
                                        - key: elasticsearch.k8s.elastic.co/cluster-name
                                          operator: In
                                          values:
                                              - elasticsearch
                                topologyKey: kubernetes.io/hostname
                  containers:
                      - name: elasticsearch
                        securityContext:
                            readOnlyRootFilesystem: true
                        env:
                            - name: ELASTICSEARCH_ENABLE_REST_TLS
                              value: 'false'
                            - name: READINESS_PROBE_TIMEOUT
                              value: '300'
                        resources:
                            requests:
                                cpu: 100m
                                memory: 512Mi
                            limits:
                                cpu: 1
                                memory: 2Gi
          volumeClaimTemplates:
              - metadata:
                    name: elasticsearch-data
                spec:
                    accessModes: [ReadWriteOnce]
                    resources:
                        requests:
                            storage: 30Gi
