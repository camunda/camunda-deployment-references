---
# Elasticsearch cluster managed by ECK (Elastic Cloud on Kubernetes) for dual-region setup.
#
# This manifest deploys a 3-node Elasticsearch cluster with S3 snapshot repository
# support for cross-region backup and restore operations.
#
# Prerequisites:
# - ECK operator installed (via .github/actions/kubernetes-eck-operator)
# - Secret 'elasticsearch-env-secret' with keys:
#     s3.client.camunda.access_key
#     s3.client.camunda.secret_key
#
# Created service: elasticsearch-es-http:9200 (ClusterIP), elasticsearch-es-masters:9200 (headless)
# Created secret:  elasticsearch-es-elastic-user (auto-generated by ECK per region)
# After ECK deployment, run sync_elasticsearch_passwords.sh to create cross-region password secrets.
# NOTE (EKS / VPN-peering): Cross-region Zeebe exporters must use the headless service
#   (elasticsearch-es-masters) so that DNS returns pod IPs routable across clusters.
#   The ClusterIP service (elasticsearch-es-http) is NOT routable cross-cluster over VPN/peering.
#   On OpenShift with Submariner, ClusterIP services receive a ClusterSetIP and
#   elasticsearch-es-http can be used via the *.svc.clusterset.local domain.

apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
    name: elasticsearch
spec:
    # renovate: datasource=docker depName=docker.elastic.co/elasticsearch/elasticsearch
    version: 8.19.13
    http:
        tls:
            selfSignedCertificate:
                disabled: true
    # S3 credentials for snapshot/backup repository
    # ECK injects these into the Elasticsearch keystore at startup
    secureSettings:
        - secretName: elasticsearch-env-secret
    nodeSets:
        - name: masters
          count: 3
          config:
              # Disable mmap for compatibility with containers that lack the required vm.max_map_count sysctl
              # yamllint disable-line
              node.store.allow_mmap: 'false'
              # Disable deprecation warnings - https://github.com/camunda/camunda/issues/26285
              # yamllint disable-line
              logger.org.elasticsearch.deprecation: "OFF"
          podTemplate:
              spec:
                  affinity:
                      podAntiAffinity:
                          requiredDuringSchedulingIgnoredDuringExecution:
                              - labelSelector:
                                    matchExpressions:
                                        - key: elasticsearch.k8s.elastic.co/cluster-name
                                          operator: In
                                          values:
                                              - elasticsearch
                                topologyKey: kubernetes.io/hostname
                  containers:
                      - name: elasticsearch
                        securityContext:
                            readOnlyRootFilesystem: true
                        env:
                            - name: ELASTICSEARCH_ENABLE_REST_TLS
                              value: 'false'
                            - name: READINESS_PROBE_TIMEOUT
                              value: '300'
                        resources:
                            requests:
                                cpu: 1
                                memory: 2Gi
                            limits:
                                cpu: 2
                                memory: 2Gi
          volumeClaimTemplates:
              - metadata:
                    name: elasticsearch-data
                spec:
                    accessModes: [ReadWriteOnce]
                    resources:
                        requests:
                            storage: 64Gi
