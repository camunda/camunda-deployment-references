---
# Camunda Platform 8 Values - RDBMS Secondary Storage Snippet
# This configuration replaces Elasticsearch with PostgreSQL (RDBMS) for secondary storage.
# Requires a CloudNativePG cluster named 'pg-camunda' with database 'camunda' and owner 'camunda'.
#
# Authentication Secrets:
# - pg-camunda-secret: Contains PostgreSQL user credentials for orchestration secondary storage
#
# Note: Optimize requires Elasticsearch and is disabled in RDBMS mode.

# Orchestration secondary storage configuration (RDBMS instead of Elasticsearch)
orchestration:
    # `orchestration.exporters.camunda.enabled` is deprecated (removed in chart v16 /
    # Camunda 8.11) but intentionally kept as a values key here. With the RDBMS
    # exporter enabled the inbuilt Camunda exporter is already disabled, so behaviour
    # is unchanged. It is NOT moved to `extraConfiguration` because this snippet is
    # layered into the kind pg-only deployment via repeated `helm --values`, where
    # Helm *replaces* (not deep-merges) list-typed fields like `extraConfiguration` —
    # which would silently drop another layer's override. The non-blocking
    # deprecation warning is filtered by internal-helm-deprecation-check.
    exporters:
        camunda:
            enabled: false
        rdbms:
            enabled: true
    data:
        secondaryStorage:
            type: rdbms
            rdbms:
                url: jdbc:postgresql://pg-camunda-rw:5432/camunda
                username: camunda
                secret:
                    existingSecret: pg-camunda-secret
                    existingSecretKey: password

# Disable Optimize (requires Elasticsearch, not available in RDBMS mode)
optimize:
    enabled: false
