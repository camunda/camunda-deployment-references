---
# Camunda Platform 8 Values - RDBMS Secondary Storage Snippet
# This configuration replaces Elasticsearch with PostgreSQL (RDBMS) for secondary storage.
# Requires a CloudNativePG cluster named 'pg-camunda' with database 'camunda' and owner 'camunda'.
#
# Authentication Secrets:
# - pg-camunda-secret: Contains PostgreSQL user credentials for orchestration secondary storage
#
# Note: Optimize requires Elasticsearch and is disabled in RDBMS mode.

# Orchestration secondary storage configuration (RDBMS instead of Elasticsearch)
orchestration:
    exporters:
        rdbms:
            enabled: true
    # Disable the inbuilt Camunda exporter via unified configuration. The values key
    # orchestration.exporters.camunda.enabled is deprecated in chart 8.10 (removed in
    # v16); it is a template toggle, so it is migrated to the equivalent app-config key.
    extraConfiguration:
        - file: orchestration-camunda-exporter.yaml
          content: |
              camunda:
                data:
                  secondary-storage:
                    autoconfigure-camunda-exporter: false
    data:
        secondaryStorage:
            type: rdbms
            rdbms:
                url: jdbc:postgresql://pg-camunda-rw:5432/camunda
                username: camunda
                secret:
                    existingSecret: pg-camunda-secret
                    existingSecretKey: password

# Disable Optimize (requires Elasticsearch, not available in RDBMS mode)
optimize:
    enabled: false
