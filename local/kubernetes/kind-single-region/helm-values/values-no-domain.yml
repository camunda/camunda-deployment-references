---
# Camunda Platform Helm values for Kind local development WITHOUT domain
#
# This configuration enables:
# - No Ingress (access via port-forward)
# - Local access via localhost with port forwarding
# - OIDC authentication via Keycloak
#
# Used in combination with operator-based values from generic/kubernetes/operator-based/:
# - camunda-elastic-values.yml (Elasticsearch via ECK)
# - camunda-keycloak-no-domain-values.yml (Keycloak via operator, no-domain mode)
# - camunda-identity-values.yml (PostgreSQL for Identity via CloudNativePG)
# - camunda-webmodeler-values.yml (PostgreSQL for Web Modeler via CloudNativePG)

global:
    ingress:
        enabled: false

    identity:
        auth:
            admin:
                secret:
                    existingSecret: camunda-credentials
                    existingSecretKey: identity-admin-client-token

            identity:
                redirectUrl: http://localhost:8085

            optimize:
                redirectUrl: http://localhost:8083
                secret:
                    existingSecret: camunda-credentials
                    existingSecretKey: identity-optimize-client-token

            console:
                redirectUrl: http://localhost:8087
                secret:
                    existingSecret: camunda-credentials
                    existingSecretKey: identity-console-client-token

            webModeler:
                redirectUrl: http://localhost:8070

connectors:
    enabled: true
    inbound:
        mode: disabled
    resources:
        requests:
            cpu: 100m
            memory: 256Mi
        limits:
            cpu: 1000m
            memory: 1Gi
    security:
        authentication:
            oidc:
                secret:
                    existingSecret: camunda-credentials
                    existingSecretKey: identity-connectors-client-token

identity:
    enabled: true
    fullURL: http://localhost:8085

    resources:
        requests:
            cpu: 50m
            memory: 128Mi
        limits:
            cpu: 500m
            memory: 512Mi

    firstUser:
        enabled: true
        username: admin
        email: admin@camunda.local
        firstName: Admin
        lastName: User
        secret:
            existingSecret: camunda-credentials
            existingSecretKey: identity-first-user-password

optimize:
    enabled: true
    resources:
        requests:
            cpu: 200m
            memory: 256Mi
        limits:
            cpu: 1000m
            memory: 1Gi

# Reduce Zeebe resources for local development
orchestration:
    clusterSize: '1'
    # `orchestration.partitionCount` / `orchestration.replicationFactor` are
    # deprecated and removed in chart v16 (Camunda 8.11). They are provided via
    # `orchestration.env` (unified configuration env vars) rather than
    # `extraConfiguration`, because the kind deployment layers several value files
    # through repeated `helm --values`, where Helm *replaces* list-typed fields like
    # `extraConfiguration` — only one file's list would survive. `env` here is the
    # single Orchestration env source across those layers, so it is collision-free.
    env:
        - name: CAMUNDA_CLUSTER_PARTITIONCOUNT
          value: '1'
        - name: CAMUNDA_CLUSTER_REPLICATIONFACTOR
          value: '1'
    pvcSize: 10Gi
    resources:
        requests:
            cpu: 300m
            memory: 512Mi
        limits:
            cpu: 2000m
            memory: 2Gi
    security:
        authentication:
            oidc:
                secret:
                    existingSecret: camunda-credentials
                    existingSecretKey: identity-orchestration-client-token
        initialization:
            defaultRoles:
                admin:
                    users:
                        - admin
camundaHub:
    enabled: true
    console:
        resources:
            requests:
                cpu: 50m
                memory: 64Mi
            limits:
                cpu: 500m
                memory: 256Mi

    webModeler:
        # Chart 15.x defaults webModeler.image.tag to "8.10.0-alpha1-rc1",
        # which is not published to Docker Hub. Use the rolling SNAPSHOT tag
        # for camunda/hub and camunda/hub-websockets in CI until a tagged
        # release is available.
        image:
            tag: SNAPSHOT
        restapi:
            resources:
                requests:
                    cpu: 100m
                    memory: 256Mi
                limits:
                    cpu: 1000m
                    memory: 1Gi
        websockets:
            resources:
                requests:
                    cpu: 50m
                    memory: 128Mi
                limits:
                    cpu: 500m
                    memory: 512Mi

# Chart 15.x: Web Modeler Pusher secret/key must be configured at the
# top-level `webModeler.*` path, not under `camundaHub.webModeler.*`.
# Without this, the chart auto-generates a new random Pusher secret on
# every `helm upgrade`, breaking WebSocket auth.
webModeler:
    restapi:
        pusher:
            secret:
                existingSecret: camunda-credentials
                existingSecretKey: webmodeler-pusher-app-secret
            client:
                secret:
                    existingSecret: camunda-credentials
                    existingSecretKey: webmodeler-pusher-app-key
