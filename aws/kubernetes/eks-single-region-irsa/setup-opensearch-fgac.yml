---
# this manifest configure the fine grained access control on OpenSearch
apiVersion: batch/v1
kind: Job
metadata:
    name: setup-opensearch-fgac
    labels:
        app: setup-opensearch-fgac
spec:
    backoffLimit: 0
    template:
        spec:
            restartPolicy: Never
            containers:
                - name: setup-opensearch-fgac
                  image: amazonlinux:latest
                  command:
                      - sh
                      - -c
                      - |
                        /bin/bash <<'EOF'
                        set -euo pipefail

                        echo "Configuring Fine-Grained Access Control for OpenSearch..."

                        # If the following script moves outside of lines 28 - 48, adjust the documentation referencing this file.
                        # Beginning of Script

                        # Send the PATCH request to map the IAM role to OpenSearch role
                        HTTP_CODE=$(curl -sS -o /tmp/response.json -w "%{http_code}" \
                          -u "$OPENSEARCH_MASTER_USERNAME:$OPENSEARCH_MASTER_PASSWORD" \
                          -X PATCH \
                          "https://$OPENSEARCH_HOST/_opendistro/_security/api/rolesmapping/all_access?pretty" \
                          -H 'Content-Type: application/json' \
                          -d'
                          [
                            {
                              "op": "add",
                              "path": "/backend_roles",
                              "value": ["'$OPENSEARCH_ROLE_ARN'"]
                            }
                          ]')

                        echo "Response (HTTP $HTTP_CODE):"
                        cat /tmp/response.json

                        if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
                          echo "ERROR: FGAC role mapping failed with HTTP $HTTP_CODE"
                          exit 1
                        fi

                        echo "FGAC role mapping configured successfully."

                        # End of Script
                        EOF
                  env:
                      - name: OPENSEARCH_HOST
                        valueFrom:
                            secretKeyRef:
                                name: setup-os-secret
                                key: OPENSEARCH_HOST
                      - name: OPENSEARCH_ROLE_ARN
                        valueFrom:
                            secretKeyRef:
                                name: setup-os-secret
                                key: OPENSEARCH_ROLE_ARN
                      - name: OPENSEARCH_MASTER_USERNAME
                        valueFrom:
                            secretKeyRef:
                                name: setup-os-secret
                                key: OPENSEARCH_MASTER_USERNAME
                      - name: OPENSEARCH_MASTER_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: setup-os-secret
                                key: OPENSEARCH_MASTER_PASSWORD
