---
orchestration:
    extraConfiguration:
        - file: orchestration-multitenancy.yaml
          content: |
              camunda:
                security:
                  multiTenancy:
                    checksEnabled: true
                    apiEnabled: true
                operate:
                  multiTenancy:
                    enabled: true
                tasklist:
                  multiTenancy:
                    enabled: true
              zeebe:
                broker:
                  gateway:
                    multitenancy:
                      enabled: true
