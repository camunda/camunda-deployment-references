---
# AWS EKS No-Domain Configuration for Camunda Platform (RDBMS variant)
#
# This file contains infrastructure configuration without ingress (for port-forward access),
# using Amazon Aurora PostgreSQL (RDBMS) as the orchestration secondary storage
# instead of Amazon OpenSearch.
#
# Combine with an auth overlay:
#   - Keycloak Operator: yq ". *+ load(\"generic/kubernetes/operator-based/keycloak/camunda-keycloak-no-domain-values.yml\")" values-no-domain.yml > values.yml
#   - OIDC:              yq ". *+ load(\"values-oidc.yml\")" values-no-domain.yml > values.yml
#
# Differences from the OpenSearch variant:
# - OpenSearch is not provisioned and not referenced
# - Optimize is disabled (it requires Elasticsearch/OpenSearch)
# - Orchestration uses RDBMS secondary storage on Aurora PostgreSQL
#
# Required environment variables:
#   - DB_HOST, DB_PORT: Aurora endpoint and port
#   - DB_IDENTITY_USERNAME, DB_IDENTITY_NAME: Identity database connection
#   - DB_ORCHESTRATION_USERNAME, DB_ORCHESTRATION_NAME: Orchestration (secondary storage) connection

global:
    security:
        authentication:
            method: oidc

    identity:
        auth:
            enabled: true

identity:
    enabled: true
    contextPath: /managementidentity
    fullURL: http://localhost:8080/managementidentity # replace this with a port of your choice when you will do port forwarding

    firstUser:
        enabled: true
        username: admin
        email: admin@camunda.local
        firstName: Admin
        lastName: User
        secret:
            existingSecret: identity-secret-for-components
            existingSecretKey: identity-first-user-password

    externalDatabase:
        enabled: true
        host: ${DB_HOST}
        port: ${DB_PORT}
        username: ${DB_IDENTITY_USERNAME}
        database: ${DB_IDENTITY_NAME}
        secret:
            existingSecret: identity-postgres-secret
            existingSecretKey: password

# Optimize requires Elasticsearch/OpenSearch and is not available in RDBMS mode
optimize:
    enabled: false

console:
    enabled: false # by default, console is not enabled


webModeler:
    enabled: false # by default, webModeler is not enabled

    restapi:
        externalDatabase:
            url: jdbc:aws-wrapper:postgresql://${DB_HOST}:${DB_PORT}/${DB_WEBMODELER_NAME}
            user: ${DB_WEBMODELER_USERNAME}
            secret:
                existingSecret: webmodeler-postgres-secret
                existingSecretKey: password
        env:
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: software.amazon.jdbc.Driver
        mail:
            secret:
                existingSecret: webmodeler-secret
                existingSecretKey: smtp-password
            fromAddress: changeme@example.com   # change this required value

orchestration:
    exporters:
        camunda:
            enabled: false
        rdbms:
            enabled: true

    data:
        secondaryStorage:
            type: rdbms
            rdbms:
                url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_ORCHESTRATION_NAME}?sslmode=require
                username: ${DB_ORCHESTRATION_USERNAME}
                secret:
                    existingSecret: orchestration-postgres-secret
                    existingSecretKey: password

    security:
        initialization:
            defaultRoles:
                admin:
                    users:
                        - admin


webModelerPostgresql:
    # Will deploy a postgresql database for webModeler.
    # If you enable webModeler, you either need to turn it true or use an external database
    enabled: false

# Disable Elasticsearch (not needed in RDBMS mode)
elasticsearch:
    enabled: false
