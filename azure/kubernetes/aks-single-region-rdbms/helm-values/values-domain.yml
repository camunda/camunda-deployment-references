---
# Azure AKS Domain Configuration for Camunda Platform (RDBMS variant)
#
# This is the base values file for Camunda components using RDBMS (PostgreSQL)
# as the secondary storage instead of Elasticsearch.
#
# Auth provider configs are applied via overlays:
# - Keycloak Operator: generic/kubernetes/operator-based/keycloak/camunda-keycloak-domain-values.yml
# - OIDC: generic/kubernetes/single-region/helm-values/values-oidc.yml + values-oidc-domain.yml
#
# Differences from Elasticsearch variant:
# - Elasticsearch is disabled
# - Optimize is disabled (requires Elasticsearch)
# - Orchestration uses RDBMS secondary storage with Azure Flexible Server PostgreSQL
#

global:
    ingress:
        enabled: true
        host: ${CAMUNDA_DOMAIN}
        tls:
            enabled: true
            secretName: camunda-c8-tls
        annotations:
            kubernetes.io/tls-acme: 'true'

    security:
        authentication:
            method: oidc

    identity:
        auth:
            enabled: true
            identity:
                redirectUrl: https://${CAMUNDA_DOMAIN}/managementidentity
            console:
                redirectUrl: https://${CAMUNDA_DOMAIN}/console
            webModeler:
                redirectUrl: https://${CAMUNDA_DOMAIN}/modeler

identity:
    enabled: true
    contextPath: /managementidentity
    fullURL: https://${CAMUNDA_DOMAIN}/managementidentity

    firstUser:
        enabled: true
        username: admin
        email: admin@camunda.local
        firstName: Admin
        lastName: User
        secret:
            existingSecret: identity-secret-for-components
            existingSecretKey: identity-first-user-password

    externalDatabase:
        enabled: true
        host: ${DB_HOST}
        port: ${DB_PORT}
        username: ${DB_IDENTITY_USERNAME}
        database: ${DB_IDENTITY_NAME}
        secret:
            existingSecret: identity-postgres-secret
            existingSecretKey: password

connectors:
    contextPath: /connectors

webModeler:
    enabled: false
    contextPath: /modeler

    restapi:
        externalDatabase:
            enabled: true
            url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_WEBMODELER_NAME}?sslmode=require
            user: ${DB_WEBMODELER_USERNAME}
            secret:
                existingSecret: webmodeler-postgres-secret
                existingSecretKey: password

        mail:
            secret:
                existingSecret: webmodeler-secret
                existingSecretKey: smtp-password
            fromAddress: changeme@example.com


webModelerPostgresql:
    enabled: false

# Optimize requires Elasticsearch and is not available in RDBMS mode
optimize:
    enabled: false

# RDBMS secondary storage configuration
orchestration:
    contextPath: /

    exporters:
        camunda:
            enabled: false
        rdbms:
            enabled: true

    data:
        secondaryStorage:
            type: rdbms
            rdbms:
                url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_ORCHESTRATION_NAME}?sslmode=require
                username: ${DB_ORCHESTRATION_USERNAME}
                secret:
                    existingSecret: orchestration-postgres-secret
                    existingSecretKey: password

    security:
        initialization:
            defaultRoles:
                admin:
                    users:
                        - admin

    ingress:
        grpc:
            enabled: true
            host: zeebe-${CAMUNDA_DOMAIN}
            tls:
                enabled: true
                secretName: zeebe-c8-tls-grpc
            annotations:
                kubernetes.io/tls-acme: 'true'

# Disable Elasticsearch (not needed in RDBMS mode)
elasticsearch:
    enabled: false

console:
    enabled: false # by default, console is not enabled
    contextPath: /console
