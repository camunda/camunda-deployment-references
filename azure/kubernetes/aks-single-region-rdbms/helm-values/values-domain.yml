---
# Azure AKS RDBMS Domain Configuration for Camunda Platform
#
# This values file configures Camunda to use Azure Database for PostgreSQL -
# Flexible Server as the secondary datastore instead of Elasticsearch/OpenSearch.
# This is supported from Camunda 8.9+ with RDBMS as alternative secondary storage.
#
# Auth provider configs are applied via overlays:
# - Keycloak Operator: generic/kubernetes/operator-based/keycloak/camunda-keycloak-domain-values.yml
# - OIDC: generic/kubernetes/single-region/helm-values/values-oidc.yml + values-oidc-domain.yml
#
# Required environment variables (exported by vars-create-db.sh):
#   - CAMUNDA_DOMAIN: Your domain name
#   - DB_HOST: PostgreSQL Flexible Server FQDN
#   - DB_PORT: PostgreSQL port (5432)
#   - DB_IDENTITY_NAME / DB_IDENTITY_USERNAME
#   - RDBMS_SECONDARY_DATABASE / RDBMS_SECONDARY_USERNAME
#

global:
    elasticsearch:
        enabled: false

    ingress:
        enabled: true
        host: ${CAMUNDA_DOMAIN}
        tls:
            enabled: true
            secretName: camunda-c8-tls
        annotations:
            kubernetes.io/tls-acme: 'true'

    security:
        authentication:
            method: oidc

    identity:
        auth:
            enabled: true
            identity:
                redirectUrl: https://${CAMUNDA_DOMAIN}/managementidentity
            console:
                redirectUrl: https://${CAMUNDA_DOMAIN}/console

identity:
    enabled: true
    contextPath: /managementidentity
    fullURL: https://${CAMUNDA_DOMAIN}/managementidentity

    firstUser:
        enabled: true
        username: admin
        email: admin@camunda.local
        firstName: Admin
        lastName: User
        secret:
            existingSecret: identity-secret-for-components
            existingSecretKey: identity-first-user-password

    externalDatabase:
        enabled: true
        host: ${DB_HOST}
        port: ${DB_PORT}
        username: ${DB_IDENTITY_USERNAME}
        database: ${DB_IDENTITY_NAME}
        secret:
            existingSecret: identity-postgres-secret
            existingSecretKey: password

connectors:
    contextPath: /connectors

optimize:
    enabled: false # Optimize requires Elasticsearch and does not support RDBMS secondary storage

orchestration:
    contextPath: /

    data:
        secondaryStorage:
            type: rdbms
    env:
        - name: CAMUNDA_DATA_SECONDARYSTORAGE_RDBMS_URL
          value: "jdbc:postgresql://${DB_HOST}:${DB_PORT}/${RDBMS_SECONDARY_DATABASE}?sslmode=require"
        - name: CAMUNDA_DATA_SECONDARYSTORAGE_RDBMS_USERNAME
          value: "${RDBMS_SECONDARY_USERNAME}"
        - name: CAMUNDA_DATA_SECONDARYSTORAGE_RDBMS_AUTODDL
          value: "true"
        - name: CAMUNDA_DATA_SECONDARYSTORAGE_RDBMS_PASSWORD
          valueFrom:
              secretKeyRef:
                  name: rdbms-secondary-secret
                  key: password

    security:
        initialization:
            defaultRoles:
                admin:
                    users:
                        - admin

    ingress:
        grpc:
            enabled: true
            host: zeebe-${CAMUNDA_DOMAIN}
            tls:
                enabled: true
                secretName: zeebe-c8-tls-grpc
            annotations:
                kubernetes.io/tls-acme: 'true'

webModeler:
    enabled: false

webModelerPostgresql:
    enabled: false

console:
    enabled: false # by default, console is not enabled
    contextPath: /console
