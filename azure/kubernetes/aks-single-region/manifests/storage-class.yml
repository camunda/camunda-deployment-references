---
# StorageClass manifest for AKS using Azure Disk CSI driver.
# PremiumV2_LRS provides high performance SSD storage.
# Note: Azure Disks are encrypted at rest by default using platform-managed keys.
# To use customer-managed keys, add encryptionType and diskEncryptionSetID parameters.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
    name: premium-lrs-sc
    annotations:
        storageclass.kubernetes.io/is-default-class: 'true'
provisioner: disk.csi.azure.com
parameters:
    storageaccounttype: PremiumV2_LRS
    kind: Managed
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
