---
# Azure AKS Domain Configuration for Camunda Platform
#
# This is the base values file for Camunda components.
#
# Auth provider configs are applied via overlays:
# - Keycloak Operator: generic/kubernetes/operator-based/keycloak/camunda-keycloak-domain-values.yml
# - OIDC: generic/kubernetes/single-region/helm-values/values-oidc.yml + values-oidc-domain.yml
#
# Elasticsearch is managed via the ECK operator and configured through a separate overlay file:
# - Elasticsearch: generic/kubernetes/operator-based/elasticsearch/camunda-elastic-values.yml
#

global:
    host: ${CAMUNDA_DOMAIN}
    ingress:
        enabled: true
        className: contour
        tls:
            enabled: true
            secretName: camunda-c8-tls
        annotations:
            kubernetes.io/tls-acme: 'true'

    security:
        authentication:
            method: oidc

    identity:
        auth:
            enabled: true
            webModeler:
                redirectUrl: https://${CAMUNDA_DOMAIN}/modeler
            optimize:
                redirectUrl: https://${CAMUNDA_DOMAIN}/optimize

identity:
    enabled: true
    contextPath: /managementidentity
    fullURL: https://${CAMUNDA_DOMAIN}/managementidentity

    firstUser:
        enabled: true
        username: admin
        email: admin@camunda.local
        firstName: Admin
        lastName: User
        secret:
            existingSecret: identity-secret-for-components
            existingSecretKey: identity-first-user-password

    externalDatabase:
        enabled: true
        host: ${DB_HOST}
        port: ${DB_PORT}
        username: ${DB_IDENTITY_USERNAME}
        database: ${DB_IDENTITY_NAME}
        secret:
            existingSecret: identity-postgres-secret
            existingSecretKey: password

connectors:
    contextPath: /connectors

webModeler:
    enabled: false
    contextPath: /modeler

    restapi:
        externalDatabase:
            url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_WEBMODELER_NAME}?sslmode=require
            username: ${DB_WEBMODELER_USERNAME}
            secret:
                existingSecret: webmodeler-postgres-secret
                existingSecretKey: password

        mail:
            secret:
                existingSecret: webmodeler-secret
                existingSecretKey: smtp-password
        # from-address is deprecated as a values key in chart 8.10 (removed in v16),
        # so the sender address is supplied via unified configuration instead.
        extraConfiguration:
            - file: webmodeler-mail.yaml
              content: |
                  camunda:
                    modeler:
                      mail:
                        from-address: changeme@example.com


optimize:
    enabled: true
    contextPath: /optimize

orchestration:
    contextPath: /

    data:
        secondaryStorage:
            type: elasticsearch

    security:
        initialization:
            defaultRoles:
                admin:
                    users:
                        - admin

    ingress:
        grpc:
            enabled: true
            className: contour
            host: zeebe-${CAMUNDA_DOMAIN}
            tls:
                enabled: true
                secretName: zeebe-c8-tls-grpc
            annotations:
                kubernetes.io/tls-acme: 'true'

    # Tell Contour the gRPC upstream (port 26500) speaks cleartext HTTP/2 (h2c).
    # Required for Zeebe gRPC through the Contour ingress.
    service:
        annotations:
            projectcontour.io/upstream-protocol.h2c: '26500'
