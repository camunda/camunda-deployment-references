---
matrix:
    distro:
        - name: Kind
          schedule_only: false

    scenario:
        - name: kind-single-region

    declination:
        - name: no-domain
          use_tls: false
          cluster_suffix: nodomain
          storage_backend: elasticsearch
          desc: Setup chart without Ingress and TLS, using port-forward.
        - name: domain
          use_tls: true
          cluster_suffix: domain
          storage_backend: elasticsearch
          desc: Setup chart with Ingress and TLS using mkcert.
        - name: pg-only-no-domain
          use_tls: false
          cluster_suffix: pgonlynodomain
          storage_backend: rdbms
          desc: Setup chart without Ingress and TLS, using RDBMS secondary storage (no ES).
        - name: pg-only-domain
          use_tls: true
          cluster_suffix: pgonlydomain
          storage_backend: rdbms
          desc: Setup chart with Ingress and TLS using mkcert, using RDBMS secondary storage (no ES).
