---
# Test matrix configuration for Migration from Bitnami tests
# This matrix defines the test scenarios for migrating from Bitnami sub-charts
# to Kubernetes operators (ECK, CNPG, Keycloak Operator)

matrix:
    # WARNING: Unlike other ref archs, this matrix does not use a separate `declination` dimension.
    # The declination (domain/no-domain) is inlined directly into each distro entry via `use_tls`
    # to avoid unnecessary heavy job combinations (heavy is only tested with domain mode).
    distro:
        # Kind is used for migration tests — no cloud infra needed
        # Coverage strategy:
        #   - light NoDomain: basic regression (no TLS, no warm reindex)
        #   - light Domain:   TLS/Ingress path coverage
        #   - heavy Domain:   large-data migration WITHOUT warm reindex (baseline)
        #   - heavy WarmReindex Domain: large-data migration WITH warm reindex
        # The heavy pair enables the meta-analysis job to compare cutover times.

        - name: Kind-NoDomain
          schedule_only: false
          type: kind
          use_tls: false

        - name: Kind-Domain
          schedule_only: false
          type: kind
          use_tls: true

        - name: Kind-Heavy-Domain
          schedule_only: false
          weekly_schedule_only: true
          type: kind
          benchmark_scenario: heavy
          use_tls: true

        - name: Kind-Heavy-WarmReindex-Domain
          schedule_only: false
          weekly_schedule_only: true
          type: kind
          benchmark_scenario: heavy
          es_warm_reindex: true
          use_tls: true

    scenario:
        # Test the full migration workflow
        - name: migration-from-bitnami
          shortName: mfb

    # Components to test migration for
    # Each component can be tested independently
    component:
        - name: full
          desc: Run full migration (all components)
          orchestration: true
          identity: true
          keycloak: true
          webmodeler: true
