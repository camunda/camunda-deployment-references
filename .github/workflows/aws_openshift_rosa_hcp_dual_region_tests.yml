---
name: Tests - Integration - AWS OpenShift ROSA HCP Dual Region
permissions:
    contents: read
    pull-requests: write
on:
    schedule:
        - cron: 0 3 * * 2
    pull_request: {}
    workflow_dispatch:
        inputs:
            cluster_name:
                description: Cluster name.
                required: false
                type: string
            delete_clusters:
                description: Whether to delete the clusters.
                type: boolean
                default: true
            enable_tests:
                description: Whether to enable the tests.
                type: boolean
                default: true
            ref-arch:
                description: |
                    Reference architecture to use, can only deploy one at a time.
                    Use a different trigger with unique names for each ref-arch.
                    Valid values are `rosa-hcp-dual-region`.
                    Only for workflow_dispatch.
                required: false
                type: string
                default: rosa-hcp-dual-region
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false
env:
    IS_SCHEDULE: ${{ (contains(github.head_ref, 'schedules/') || github.event_name == 'schedule') && 'true' || 'false' }}
    IS_RENOVATE_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'renovate[bot]' }}
    AWS_PROFILE: infex
    S3_BACKEND_BUCKET: tests-ra-aws-rosa-hcp-tf-state-eu-central-1
    S3_BUCKET_REGION: eu-central-1
    S3_BACKEND_BUCKET_PREFIX: aws/openshift/rosa-hcp-dual-region/
    TF_MODULES_DIRECTORY: ./.tf-modules-workflow/
    CLUSTER_0_AWS_REGION: eu-west-2
    CLUSTER_1_AWS_REGION: eu-west-3
    CLEANUP_CLUSTERS: ${{ github.event.inputs.delete_clusters || 'true' }}
    CI_MATRIX_FILE: .github/workflows-config/aws-openshift-rosa-hcp-dual-region/test_matrix.yml
    TESTS_ENABLED: ${{ github.event.inputs.enable_tests || 'true' }}
    ROSA_CLI_VERSION: latest
jobs:
    triage:
        runs-on: ubuntu-latest
        outputs:
            should_skip: ${{ steps.skip_check.outputs.should_skip }}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
            - name: Check labels
              id: skip_check
              uses: ./.github/actions/internal-triage-skip
    clusters-info:
        needs:
            - triage
        if: needs.triage.outputs.should_skip == 'false'
        name: Define Matrix
        runs-on: ubuntu-latest
        outputs:
            platform-matrix: ${{ steps.matrix.outputs.platform_matrix }}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
              with:
                  fetch-depth: 0
            - name: Install asdf tools with cache
              uses: camunda/infraex-common-config/./.github/actions/asdf-install-tooling@ce8f360e366f900378c3d1531d1f278f3789f04b
            - name: Define tests matrix
              uses: ./.github/actions/internal-tests-matrix
              id: matrix
              with:
                  ci_matrix_file: ${{ env.CI_MATRIX_FILE }}
                  cluster_name: ${{ inputs.cluster_name }}
                  ref_arch: ${{ inputs.ref-arch }}
                  is_schedule: ${{ env.IS_SCHEDULE }}
                  is_renovate_pr: ${{ env.IS_RENOVATE_PR }}
    prepare-clusters:
        name: Prepare clusters
        needs:
            - clusters-info
        strategy:
            fail-fast: false
            matrix:
                distro: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).distro }}
                scenario: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).scenario }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
              with:
                  ref: ${{ github.ref }}
                  fetch-depth: 0
            - name: Install asdf tools with cache
              uses: camunda/infraex-common-config/./.github/actions/asdf-install-tooling@ce8f360e366f900378c3d1531d1f278f3789f04b
            - name: Import Secrets
              id: secrets
              uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b
              with:
                  url: ${{ secrets.VAULT_ADDR }}
                  method: approle
                  roleId: ${{ secrets.VAULT_ROLE_ID }}
                  secretId: ${{ secrets.VAULT_SECRET_ID }}
                  exportEnv: false
                  secrets: |
                      secret/data/products/infrastructure-experience/ci/common RH_OPENSHIFT_TOKEN;
                      secret/data/products/infrastructure-experience/ci/common CI_OPENSHIFT_MAIN_USERNAME;
                      secret/data/products/infrastructure-experience/ci/common CI_ENCRYPTION_KEY;
            - name: Configure AWS CLI
              uses: ./.github/actions/aws-configure-cli
              with:
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
                  aws-profile: ${{ env.AWS_PROFILE }}
                  aws-region: ${{ env.CLUSTER_0_AWS_REGION }}
            - name: Set current target branch
              id: target-branch
              run: |
                  set -euo pipefail
                  TARGET_BRANCH=$(cat .target-branch)
                  echo "TARGET_BRANCH=$TARGET_BRANCH" | tee -a "$GITHUB_OUTPUT"
            - name: Create ROSA cluster and login
              uses: ./.github/actions/aws-openshift-rosa-hcp-dual-region-create
              id: create_clusters
              if: always() && success()
              with:
                  rh-token: ${{ steps.secrets.outputs.RH_OPENSHIFT_TOKEN }}
                  cluster-name-0: ${{ matrix.distro.clusterName }}-${{matrix.scenario.shortName }}-0
                  cluster-name-1: ${{ matrix.distro.clusterName }}-${{matrix.scenario.shortName }}-1
                  admin-username-cluster-0: ${{ steps.secrets.outputs.CI_OPENSHIFT_MAIN_USERNAME }}
                  admin-username-cluster-1: ${{ steps.secrets.outputs.CI_OPENSHIFT_MAIN_USERNAME }}
                  aws-region-cluster-0: ${{ env.CLUSTER_0_AWS_REGION }}
                  aws-region-cluster-1: ${{ env.CLUSTER_1_AWS_REGION }}
                  s3-backend-bucket: ${{ env.S3_BACKEND_BUCKET }}
                  s3-bucket-region: ${{ env.S3_BUCKET_REGION }}
                  s3-bucket-key-prefix: ${{ env.S3_BACKEND_BUCKET_PREFIX }}${{ steps.target-branch.outputs.TARGET_BRANCH }}/
                  openshift-version-cluster-0: ${{ matrix.distro.version }}
                  openshift-version-cluster-1: ${{ matrix.distro.version }}
                  tf-modules-revision: ${{ github.ref }}
                  tf-modules-path: ${{ env.TF_MODULES_DIRECTORY }}
                  cleanup-tf-modules-path: 'false'
                  tags: >
                      {


                        "ci-run-id": "${{ github.run_id }}",
                        "ci-run-number": "${{ github.run_number }}",
                        "ci-workflow": "${{ github.workflow }}",
                        "ci-actor": "${{ github.actor }}",
                        "ci-ref": "${{ github.ref }}",
                        "ci-commit": "${{ github.sha }}",
                        "ci-repo": "${{ github.repository }}",
                        "ci-event": "${{ github.event_name }}",
                        "map-migrated": "migARUADZHVWZ"
                      }

            - name: Dump kubeconfig before encryption
              run: |
                  kubectl config view --raw > "${{ runner.temp }}/kubeconfig.yaml"
            - name: Export kubeconfig and encrypt it
              id: export_kube_config
              uses: ./.github/actions/internal-generic-encrypt-export
              with:
                  file_path: ${{ runner.temp }}/kubeconfig.yaml
                  encryption_key: ${{ steps.secrets.outputs.CI_ENCRYPTION_KEY }}
            - name: Dump other secrets from the action
              id: dump_secrets
              run: |
                  set -euo pipefail

                  yq eval -n \
                    '.["backup-bucket-s3-aws-access-key"] = "${{ steps.create_clusters.outputs.backup-bucket-s3-aws-access-key }}" |
                    .["backup-bucket-s3-aws-secret-access-key"] = "${{ steps.create_clusters.outputs.backup-bucket-s3-aws-secret-access-key }}" |
                    .["backup-bucket-s3-bucket-name"] = "${{ steps.create_clusters.outputs.backup-bucket-s3-bucket-name }}"' > "${{ runner.temp }}/sensitive_values.yaml"
            - name: Export other secrets from the action
              id: export_secrets
              uses: ./.github/actions/internal-generic-encrypt-export
              with:
                  file_path: ${{ runner.temp }}/sensitive_values.yaml
                  encryption_key: ${{ steps.secrets.outputs.CI_ENCRYPTION_KEY }}
            - uses: cloudposse/github-action-matrix-outputs-write@ed06cf3a6bf23b8dce36d1cf0d63123885bb8375
              id: out
              with:
                  matrix-step-name: ${{ github.job }}
                  matrix-key: ${{ matrix.distro.name }}-${{ matrix.scenario.name }}
                  outputs: |-
                      kubeconfig_encrypted: ${{ steps.export_kube_config.outputs.encrypted_file_base64 }}
                      sensitive_values_raw: ${{ steps.export_secrets.outputs.encrypted_file_base64 }}
            - name: 🌐 Post-creation steps
              timeout-minutes: 20
              run: |
                  set -euo pipefail

                  # Here we verify the extraction of the env variables as presented in the documentation

                  cd ${{ env.TF_MODULES_DIRECTORY }}/aws/openshift/${{ matrix.scenario.name }}/terraform/clusters/
                  source ../../procedure/gather-cluster-login-id.sh
                  cd -

                  if [[ -z "$CLUSTER_0_NAME" || -z "$CLUSTER_0_API_URL" || -z "$CLUSTER_0_ADMIN_USERNAME" || -z "$CLUSTER_0_ADMIN_PASSWORD" ]]; then
                    echo "❌ ERROR: One or more Cluster 0 environment variables are empty."
                    exit 1
                  fi
                  if [[ -z "$CLUSTER_1_NAME" || -z "$CLUSTER_1_API_URL" || -z "$CLUSTER_1_ADMIN_USERNAME" || -z "$CLUSTER_1_ADMIN_PASSWORD" ]]; then
                    echo "❌ ERROR: One or more Cluster 1 environment variables are empty."
                    exit 1
                  fi


                  ./aws/openshift/${{ matrix.scenario.name }}/procedure/verify-cluster-nodes.sh
    access-info:
        name: Read kube configs from matrix
        runs-on: ubuntu-latest
        needs: prepare-clusters
        outputs:
            config: ${{ steps.read-workflow.outputs.result }}
        steps:
            - uses: cloudposse/github-action-matrix-outputs-read@33cac12fa9282a7230a418d859b93fdbc4f27b5a
              id: read-workflow
              with:
                  matrix-step-name: prepare-clusters
    integration-tests:
        name: Run integration tests - ${{ matrix.distro.name }} - ${{ matrix.scenario.name }}
        runs-on: ubuntu-latest
        needs:
            - clusters-info
            - access-info
        strategy:
            fail-fast: false
            matrix:
                distro: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).distro }}
                scenario: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).scenario }}
        env:
            TEST_CLUSTER_TYPE: openshift
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
            - name: Install asdf tools with cache for the project
              uses: camunda/infraex-common-config/./.github/actions/asdf-install-tooling@ce8f360e366f900378c3d1531d1f278f3789f04b
            - name: Install CLI tools from OpenShift Mirror
              uses: redhat-actions/openshift-tools-installer@144527c7d98999f2652264c048c7a9bd103f8a82
              with:
                  oc: ${{ matrix.distro.version }}
            - name: Import Secrets
              id: secrets
              uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b
              with:
                  url: ${{ secrets.VAULT_ADDR }}
                  method: approle
                  roleId: ${{ secrets.VAULT_ROLE_ID }}
                  secretId: ${{ secrets.VAULT_SECRET_ID }}
                  exportEnv: false
                  secrets: |
                      secret/data/products/infrastructure-experience/ci/common DOCKERHUB_USER;
                      secret/data/products/infrastructure-experience/ci/common DOCKERHUB_PASSWORD;
                      secret/data/products/infrastructure-experience/ci/common CI_CAMUNDA_USER_TEST_CLIENT_ID;
                      secret/data/products/infrastructure-experience/ci/common CI_CAMUNDA_USER_TEST_CLIENT_SECRET;
                      secret/data/products/infrastructure-experience/ci/common RH_OPENSHIFT_TOKEN;
                      secret/data/products/infrastructure-experience/ci/common CI_ENCRYPTION_KEY;
            - name: 🔐 Retrieve kubeconfig from outputs
              uses: ./.github/actions/internal-generic-decrypt-import
              with:
                  output_path: ${{ runner.temp }}/kubeconfig
                  encrypted_file_base64: >
                      ${{ fromJson(needs.access-info.outputs.config).kubeconfig_encrypted[


                        format(
                          '{0}-{1}',
                          matrix.distro.name,
                          matrix.scenario.name
                        )
                      ] }}

                  encryption_key: ${{ steps.secrets.outputs.CI_ENCRYPTION_KEY }}
            - name: 🔐 Login into the clusters
              timeout-minutes: 2
              run: |
                  mkdir -p "$HOME/.kube"
                  mv "${{ runner.temp }}/kubeconfig" "$HOME/.kube/config"

                  oc config current-context
                  # get nodes will be performed in the next step
            - name: 🏷️ Configure clusters informations
              timeout-minutes: 10
              run: "set -euo pipefail\n\nsed -i -e 's/^export CLUSTER_0=\".*\"/export CLUSTER_0=\"${{ matrix.distro.clusterName }}-${{matrix.scenario.shortName\
                  \ }}-0\"/' \\\n       -e 's/^export CLUSTER_1=\".*\"/export CLUSTER_1=\"${{ matrix.distro.clusterName }}-${{matrix.scenario.shortName\
                  \ }}-1\"/' \\\n      generic/openshift/dual-region/procedure/set-cluster-names.sh\n\nsource ./generic/openshift/dual-region/procedure/set-cluster-names.sh\n\
                  \necho \"CLUSTER_0=$CLUSTER_0\" | tee -a \"$GITHUB_ENV\"\necho \"CLUSTER_1=$CLUSTER_1\" | tee -a \"$GITHUB_ENV\"\n\n# ensure we are logged\
                  \ in\noc --context=\"$CLUSTER_0\" get nodes\noc --context=\"$CLUSTER_1\" get nodes\n\necho \"\U0001F4E4 Export all env variables in GITHUB_ENV\
                  \ for consistency between steps\"\nenv | while IFS= read -r line; do echo \"$line\" >> \"$GITHUB_ENV\"; done\n"
            - name: 📁 Get a copy of the reference architecture
              timeout-minutes: 10
              run: |
                  set -euo pipefail

                  ./aws/openshift/${{ matrix.scenario.name }}/procedure/get-your-copy.sh
                  tree
            - name: 🚢 Configure ACM
              timeout-minutes: 15
              env:
                  RHCS_TOKEN: ${{ steps.secrets.outputs.RH_OPENSHIFT_TOKEN }}
              run: |
                  set -euo pipefail

                  cd ./generic/openshift/dual-region/procedure/acm/

                  echo "Install ACM"
                  if ! ./install-acm.sh 2>&1; then
                    echo "ACM installation failed."
                    exit 1
                  fi

                  ./verify-acm.sh

                  echo "Configure MultiClusterHub"
                  if ! ./install-multi-cluster-hub.sh 2>&1; then
                    echo "MultiClusterHub installation failed."
                    exit 1
                  fi

                  ./verify-multi-cluster-hub.sh

                  echo "Configure ManagedClusterSet"
                  if ! ./install-managed-cluster-set.sh 2>&1; then
                    echo "ManagedClusterSet installation failed."
                    exit 1
                  fi

                  # Initial verification (should be quick)
                  timeout 60 ./verify-managed-cluster-set.sh || echo "Initial verification timeout - continuing with import"

                  echo "Import Clusters in the ManagedClusterSet"
                  if ! ./initiate-cluster-set.sh 2>&1; then
                    echo "Cluster import to ManagedClusterSet failed."
                    echo ""
                    echo "Running diagnostics..."
                    ./debug-managed-cluster.sh local-cluster || true
                    ./debug-managed-cluster.sh "$CLUSTER_1" || true
                    exit 1
                  fi

                  echo "Verify all clusters are healthy (with timeout and retry logic)"
                  ./verify-managed-cluster-set.sh
            - name: 🐠 Configure Submariner
              timeout-minutes: 10
              run: |
                  set -euo pipefail

                  echo "Configure Submariner"
                  cd ./generic/openshift/dual-region/procedure/submariner/

                  echo "Running pre-flight checks..."
                  if ! ./preflight-check.sh; then
                    echo "⚠️  Pre-flight checks failed!"
                    echo "Attempting to wait for clusters to become healthy..."

                    cd ../acm/
                    if ! ./verify-managed-cluster-set.sh; then
                      echo "❌ Clusters are not healthy. Cannot proceed with Submariner installation."
                      echo ""
                      echo "Running diagnostics..."
                      ./debug-managed-cluster.sh local-cluster || true
                      ./debug-managed-cluster.sh "$CLUSTER_1" || true
                      exit 1
                    fi
                    cd ../submariner/

                    echo "Re-running pre-flight checks after waiting for clusters..."
                    if ! ./preflight-check.sh; then
                      echo "❌ Pre-flight checks still failing. Aborting Submariner installation."
                      exit 1
                    fi
                  fi

                  echo "Listing available broker nodes..."
                  ./list-nodes-brokers.sh

                  echo "Labeling broker nodes..."
                  ./label-nodes-brokers.sh

                  echo "Verifying node labels..."
                  ./list-nodes-brokers.sh

                  echo "Installing Submariner..."
                  ./install-submariner.sh

                  echo "Verifying Submariner installation..."
                  ./verify-submariner.sh

                  echo "Installing subctl CLI..."
                  source ./install-subctl.sh
                  echo "PATH=$PATH" | tee -a "$GITHUB_ENV"

                  echo "Verifying subctl..."
                  ./verify-subctl.sh
            - name: 🔬🚨 Debug Submariner connectivity
              if: failure()
              timeout-minutes: 5
              run: bash ./generic/openshift/dual-region/procedure/submariner/diagnose-submariner.sh
            - name: 🏗️ Retrieve exported Environment values from outputs
              uses: ./.github/actions/internal-generic-decrypt-import
              with:
                  output_path: ${{ runner.temp }}/sensitive.yaml
                  encrypted_file_base64: >
                      ${{ fromJson(needs.access-info.outputs.config).sensitive_values_raw[


                        format(
                          '{0}-{1}',
                          matrix.distro.name,
                          matrix.scenario.name
                        )
                      ] }}

                  encryption_key: ${{ steps.secrets.outputs.CI_ENCRYPTION_KEY }}
            - name: 🏗️ Prepare the environment for the deployment
              timeout-minutes: 20
              run: |
                  set -euo pipefail

                  echo "Load outputs values from creation of the clusters"

                  # shellcheck disable=SC2086
                  export BACKUP_BUCKET_S3_AWS_ACCESS_KEY=$(yq eval '.["backup-bucket-s3-aws-access-key"]' "${{ runner.temp }}/sensitive.yaml")
                  # protect sensitive values
                  echo "::add-mask::$BACKUP_BUCKET_S3_AWS_ACCESS_KEY"
                  # shellcheck disable=SC2086
                  export BACKUP_BUCKET_S3_AWS_SECRET_ACCESS_KEY=$(yq eval '.["backup-bucket-s3-aws-secret-access-key"]' "${{ runner.temp }}/sensitive.yaml")
                  # protect sensitive values
                  echo "::add-mask::$BACKUP_BUCKET_S3_AWS_SECRET_ACCESS_KEY"
                  # shellcheck disable=SC2086
                  export BACKUP_BUCKET_S3_BUCKET_NAME=$(yq eval '.["backup-bucket-s3-bucket-name"]' "${{ runner.temp }}/sensitive.yaml")
                  # Persist for multi-region test step (backup-bucket input)
                  echo "BACKUP_BUCKET_S3_BUCKET_NAME=$BACKUP_BUCKET_S3_BUCKET_NAME" >> "$GITHUB_ENV"

                  echo "Setup environment values"
                  sed -i \
                    -e "s#^export CLUSTER_0=\".*\"#export CLUSTER_0=\"${{ matrix.distro.clusterName }}-${{matrix.scenario.shortName }}-0\"#" \
                    -e "s#^export CLUSTER_1=\".*\"#export CLUSTER_1=\"${{ matrix.distro.clusterName }}-${{matrix.scenario.shortName }}-1\"#" \
                    -e "s#^export REGION_0=\".*\"#export REGION_0=\"${{ env.CLUSTER_0_AWS_REGION }}\"#" \
                    -e "s#^export REGION_1=\".*\"#export REGION_1=\"${{ env.CLUSTER_1_AWS_REGION }}\"#" \
                    -e "s#^export AWS_ACCESS_KEY_ES=\".*\"#export AWS_ACCESS_KEY_ES=\"${BACKUP_BUCKET_S3_AWS_ACCESS_KEY}\"#" \
                    -e "s#^export AWS_SECRET_ACCESS_KEY_ES=\".*\"#export AWS_SECRET_ACCESS_KEY_ES=\"${BACKUP_BUCKET_S3_AWS_SECRET_ACCESS_KEY}\"#" \
                    -e "s#^export AWS_ES_BUCKET_NAME=\".*\"#export AWS_ES_BUCKET_NAME=\"${BACKUP_BUCKET_S3_BUCKET_NAME}\"#" \
                    -e "s#^export AWS_ES_BUCKET_REGION=\".*\"#export AWS_ES_BUCKET_REGION=\"${{ env.CLUSTER_0_AWS_REGION }}\"#" \
                    generic/openshift/dual-region/procedure/chart-env.sh

                  # the chart env should be loaded by the client at the very first step of his installation
                  source .github/scripts/gha-functions.sh
                  export_new_env_vars ./generic/openshift/dual-region/procedure/chart-env.sh

                  echo "Delete the namespaces to ensure a fresh start"
                  if kubectl --context "$CLUSTER_0" get namespace "$CAMUNDA_NAMESPACE_0" &>/dev/null; then
                    kubectl --context "$CLUSTER_0" delete namespace "$CAMUNDA_NAMESPACE_0" --wait
                    while kubectl --context "$CLUSTER_0" get namespace "$CAMUNDA_NAMESPACE_0" &>/dev/null; do
                      echo "Namespace $CAMUNDA_NAMESPACE_0 still being deleted, waiting..."
                      sleep 5
                    done
                  fi

                  if kubectl --context "$CLUSTER_1" get namespace "$CAMUNDA_NAMESPACE_1" &>/dev/null; then
                    kubectl --context "$CLUSTER_1" delete namespace "$CAMUNDA_NAMESPACE_1" --wait
                    while kubectl --context "$CLUSTER_1" get namespace "$CAMUNDA_NAMESPACE_1" &>/dev/null; do
                      echo "Namespace $CAMUNDA_NAMESPACE_1 still being deleted, waiting..."
                      sleep 5
                    done
                  fi

                  echo "Setup namespaces and initial secrets"
                  source ./generic/openshift/dual-region/procedure/setup-namespaces.sh
                  source ./generic/openshift/dual-region/procedure/create-elasticsearch-secrets.sh
            - name: Set kubectl context to Cluster 0
              run: kubectl config use-context ${{ env.CLUSTER_0 }}
            - name: Deploy Elasticsearch via ECK on Cluster 0
              timeout-minutes: 15
              uses: ./.github/actions/kubernetes-eck-operator
              with:
                  namespace: ${{ env.CAMUNDA_NAMESPACE_0 }}
                  elasticsearch-cluster-file: elasticsearch-cluster-dual-region.yml
            - name: Set kubectl context to Cluster 1
              run: kubectl config use-context ${{ env.CLUSTER_1 }}
            - name: Deploy Elasticsearch via ECK on Cluster 1
              timeout-minutes: 15
              uses: ./.github/actions/kubernetes-eck-operator
              with:
                  namespace: ${{ env.CAMUNDA_NAMESPACE_1 }}
                  elasticsearch-cluster-file: elasticsearch-cluster-dual-region.yml
            - name: Sync Elasticsearch passwords across regions
              run: |
                  set -euo pipefail

                  bash ./generic/openshift/dual-region/procedure/sync-elasticsearch-passwords.sh
            - name: 🏗️📝 Generate dual-region variables
              timeout-minutes: 5
              run: "set -euo pipefail\n\necho \"Generate dual-region variables\"\nCLUSTER_0='local-cluster' ZEEBE_CLUSTER_SIZE=8 source ./generic/openshift/dual-region/procedure/generate-zeebe-helm-values.sh\n\
                  \necho \"\U0001F4E4 Export all env variables in GITHUB_ENV for consistency between steps\"\nenv | while IFS= read -r line; do echo \"\
                  $line\" >> \"$GITHUB_ENV\"; done\n"
            - name: 🛠️ Assemble deployment values of generic/openshift/dual-region
              timeout-minutes: 10
              run: |
                  set -o errexit
                  set -euo pipefail

                  echo "Construct the values.yml file for each cluster"

                  # TODO: Align with AKS deployment to use values-enterprise.yaml as base
                  # and apply registry-harbor.yml for all deployments (not just tests).
                  # This should be documented in the procedure for production deployments.
                  # See: azure_kubernetes_aks_single_region_tests.yml for reference implementation.
                  cp -f generic/openshift/dual-region/helm-values/values-base.yml ./values.yml

                  echo "Apply ECK Elasticsearch overlay (secondaryStorage + optimize config):"
                  yq '. *+ load("generic/kubernetes/operator-based/elasticsearch/camunda-elastic-values.yml")' values.yml > values-result.yml
                  cat values-result.yml && mv values-result.yml values.yml

                  echo "Region 0:"
                  yq '. *+ load("generic/openshift/dual-region/helm-values/values-region-0.yml")' values.yml > values-region-0-result.yml
                  cat values-region-0-result.yml && mv values-region-0-result.yml values-region-0.yml

                  echo "Region 1:"
                  yq '. *+ load("generic/openshift/dual-region/helm-values/values-region-1.yml")' values.yml > values-region-1-result.yml
                  cat values-region-1-result.yml && mv values-region-1-result.yml values-region-1.yml

                  # Add integration tests values
                  if [ "$TESTS_ENABLED" == "true" ]; then
                    echo "Enabling test files"
                    for file in registry.yml; do

                      echo "Region 0:"
                      yq ". *+ load(\"generic/kubernetes/dual-region/tests/helm-values/$file\")" values-region-0.yml > values-region-0-result.yml
                      cat values-region-0-result.yml && mv values-region-0-result.yml values-region-0.yml

                      echo "Region 1:"
                      yq ". *+ load(\"generic/kubernetes/dual-region/tests/helm-values/$file\")" values-region-1.yml > values-region-1-result.yml
                      cat values-region-1-result.yml && mv values-region-1-result.yml values-region-1.yml

                    done
                  fi

                  ./generic/openshift/dual-region/procedure/assemble-envsubst-values.sh
            - name: Helm registry login
              uses: ./.github/actions/internal-helm-registry-login
              with:
                  helm-chart-version: ${{ env.HELM_CHART_VERSION }}
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
            - name: Camunda CI basic-auth credentials
              id: camunda-ci-credentials
              uses: ./.github/actions/internal-camunda-ci-credentials
              with:
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
            - name: Merge CI basic-auth overlay into generated values
              shell: bash
              env:
                  OVERLAY_FILE: ${{ steps.camunda-ci-credentials.outputs.values-file }}
              run: |
                  set -euo pipefail
                  for region_values in generated-values-region-0.yml generated-values-region-1.yml; do
                      # shellcheck disable=SC2016 # $item is a yq expression, not a shell variable
                      yq eval-all '. as $item ireduce ({}; . *+ $item)' \
                          "${region_values}" "${OVERLAY_FILE}" > "${region_values}.merged"
                      mv "${region_values}.merged" "${region_values}"
                      # The merged file now carries the Vault basic-auth credentials, so
                      # restrict it to 0600 (matching the internal-camunda-ci-credentials
                      # overlay) instead of the default ~0644 workspace permissions.
                      chmod 600 "${region_values}"
                  done
            - name: 🏁 Install Camunda 8 using the generic/openshift helm chart procedure
              timeout-minutes: 30
              run: |
                  set -euo pipefail

                  # Generate tests objects
                  if [ "$TESTS_ENABLED" == "true" ]; then
                    # Create the pull secrets described in generic/kubernetes/dual-region/tests/helm-values/registry.yml
                    kubectl create secret docker-registry index-docker-io \
                        --docker-server=index.docker.io \
                        --docker-username="${{ steps.secrets.outputs.DOCKERHUB_USER }}" \
                        --docker-password="${{ steps.secrets.outputs.DOCKERHUB_PASSWORD }}" \
                        --context="$CLUSTER_0" \
                        --namespace="$CAMUNDA_NAMESPACE_0"

                    kubectl create secret docker-registry index-docker-io \
                        --docker-server=index.docker.io \
                        --docker-username="${{ steps.secrets.outputs.DOCKERHUB_USER }}" \
                        --docker-password="${{ steps.secrets.outputs.DOCKERHUB_PASSWORD }}" \
                        --context="$CLUSTER_1" \
                        --namespace="$CAMUNDA_NAMESPACE_1"
                  fi

                  ./generic/openshift/dual-region/procedure/install-chart.sh
                  echo "Waiting for the manifests to be applied"
                  sleep 30

                  ./generic/openshift/dual-region/procedure/export-services-submariner.sh
                  ./generic/openshift/dual-region/procedure/verify-exported-services.sh
            - name: 🔍 Check for Helm deprecation warnings (region 0)
              uses: ./.github/actions/internal-helm-deprecation-check
              with:
                  release-name: ${{ env.CAMUNDA_RELEASE_NAME }}
                  namespace: ${{ env.CAMUNDA_NAMESPACE_0 }}
                  kube-context: ${{ env.CLUSTER_0 }}
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
            - name: 🔍 Check for Helm deprecation warnings (region 1)
              uses: ./.github/actions/internal-helm-deprecation-check
              with:
                  release-name: ${{ env.CAMUNDA_RELEASE_NAME }}
                  namespace: ${{ env.CAMUNDA_NAMESPACE_1 }}
                  kube-context: ${{ env.CLUSTER_1 }}
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
            - name: 👀⏳ Wait for the deployment to be healthy using generic/openshift/dual-region
              timeout-minutes: 20
              run: |
                  set -euo pipefail

                  ./generic/openshift/dual-region/procedure/check-deployment-ready.sh
            - name: Set current Camunda version
              id: camunda-version
              run: |
                  set -euo pipefail

                  CAMUNDA_VERSION=$(cat .camunda-version)
                  echo "CAMUNDA_VERSION=$CAMUNDA_VERSION" | tee -a "$GITHUB_OUTPUT"
            - name: Ensure CI basic-auth credentials are set (INC-5340)
              if: env.TESTS_ENABLED == 'true'
              run: |
                  set -euo pipefail
                  if [ -z "${CAMUNDA_BASIC_AUTH_USER:-}" ] || [ -z "${CAMUNDA_BASIC_AUTH_PASSWORD:-}" ]; then
                    echo "::error::CAMUNDA_BASIC_AUTH_USER/PASSWORD not set; refusing to run the dual-region topology check against a default-auth gateway (INC-5340)." >&2
                    exit 1
                  fi
            - name: 🧪 Run Zeebe client tests (dual-region topology)
              if: env.TESTS_ENABLED == 'true'
              timeout-minutes: 30
              uses: ./.github/actions/internal-camunda-chart-tests
              with:
                  camunda-version: ${{ steps.camunda-version.outputs.CAMUNDA_VERSION }}
                  test-cluster-type: ${{ env.TEST_CLUSTER_TYPE }}
                  zeebe-authenticated: 'false'
                  zeebe-topology-check-script: ./generic/kubernetes/dual-region/procedure/check-zeebe-cluster-topology.sh
                  zeebe-topology-golden-file: ./generic/kubernetes/dual-region/procedure/check-zeebe-cluster-topology-output.json
                  camunda-namespace-0: ${{ env.CAMUNDA_NAMESPACE_0 }}
                  cluster-1-name: ${{ env.CLUSTER_1 }}
                  camunda-namespace-1: ${{ env.CAMUNDA_NAMESPACE_1 }}
                  test-release-name: ${{ env.CAMUNDA_RELEASE_NAME }}
                  test-client-id: ${{ steps.secrets.outputs.CI_CAMUNDA_USER_TEST_CLIENT_ID }}
                  test-client-secret: ${{ steps.secrets.outputs.CI_CAMUNDA_USER_TEST_CLIENT_SECRET }}
                  enable-c8sm-deployment-check: 'false'
                  enable-c8sm-connectivity-check: 'false'
                  enable-c8sm-irsa-check: 'false'
                  enable-c8sm-zeebe-token-check: 'false'
                  enable-c8sm-zeebe-connectivity-check: 'false'
            - name: Helm registry login
              uses: ./.github/actions/internal-helm-registry-login
              with:
                  helm-chart-version: ${{ env.HELM_CHART_VERSION }}
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
            - name: Run Multi-region tests
              if: env.TESTS_ENABLED == 'true'
              timeout-minutes: 60
              uses: ./.github/actions/internal-multi-region-tests
              with:
                  cluster-0-name: ${{ env.CLUSTER_0 }}
                  cluster-1-name: ${{ env.CLUSTER_1 }}
                  cluster-0-namespace: ${{ env.CAMUNDA_NAMESPACE_0 }}
                  cluster-1-namespace: ${{ env.CAMUNDA_NAMESPACE_1 }}
                  helm-version: ${{ env.HELM_CHART_VERSION }}
                  backup-name: ${{ env.CAMUNDA_RELEASE_NAME }}-backup-${{ github.run_attempt }}
                  backup-bucket: ${{ env.BACKUP_BUCKET_S3_BUCKET_NAME }}
                  default-values-yaml: ${{ github.workspace }}/openshift.yml
                  region-0-values-yaml: ${{ github.workspace }}/generated-values-region-0.yml
                  region-1-values-yaml: ${{ github.workspace }}/generated-values-region-1.yml
                  extra-values-yaml: ${{ steps.camunda-ci-credentials.outputs.values-file }}
                  skip-cleanup: 'true'
                  post-failback-script: ./generic/openshift/dual-region/procedure/export-services-submariner.sh
                  distribution: OpenShift
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
            - name: 🔬🚨 Get failed Pods info - Cluster 0
              if: failure()
              uses: ./.github/actions/internal-debug-failed-pods
              with:
                  namespace: ${{ env.CAMUNDA_NAMESPACE_0 || format('camunda-{0}', env.CLUSTER_0) }}
                  context: ${{ env.CLUSTER_0 }}
                  artifact-suffix: ${{ matrix.distro.name }}-${{ matrix.scenario.name }}-cluster-0
            - name: 🔬🚨 Get failed Pods info - Cluster 1
              if: failure()
              uses: ./.github/actions/internal-debug-failed-pods
              with:
                  namespace: ${{ env.CAMUNDA_NAMESPACE_1 || format('camunda-{0}', env.CLUSTER_1) }}
                  context: ${{ env.CLUSTER_1 }}
                  artifact-suffix: ${{ matrix.distro.name }}-${{ matrix.scenario.name }}-cluster-1
            - name: 🔬🚨 Debug dual-region infrastructure
              if: failure()
              run: |
                  set -euo pipefail

                  # Derive namespace if not already set (e.g. failure before chart-env.sh is sourced)
                  export CAMUNDA_NAMESPACE_0="${CAMUNDA_NAMESPACE_0:-camunda-$CLUSTER_0}"
                  export CAMUNDA_NAMESPACE_1="${CAMUNDA_NAMESPACE_1:-camunda-$CLUSTER_1}"

                  echo "::group::MCH installation status"
                  oc --context="$CLUSTER_0" get multiclusterhubs -n open-cluster-management -o yaml || true
                  echo "::endgroup::"

                  for cluster_ctx in "$CLUSTER_0" "$CLUSTER_1"; do
                    ns="CAMUNDA_NAMESPACE_0"
                    [[ "$cluster_ctx" == "$CLUSTER_1" ]] && ns="CAMUNDA_NAMESPACE_1"
                    ns_val="${!ns}"

                    echo "::group::Submariner ServiceExports/Imports - ${cluster_ctx}"
                    kubectl --context="$cluster_ctx" -n "$ns_val" get serviceexports -o wide 2>/dev/null || echo "No ServiceExports found"
                    kubectl --context="$cluster_ctx" -n "$ns_val" get serviceimports -o wide 2>/dev/null || echo "No ServiceImports found"
                    echo "::endgroup::"

                    echo "::group::DNS resolution test - ${cluster_ctx}"
                    kubectl --context="$cluster_ctx" -n "$ns_val" \
                      run dns-test-"${cluster_ctx}" --image=busybox:1.28 --rm --restart=Never --command -- \
                      nslookup "${CAMUNDA_RELEASE_NAME:-camunda}-zeebe.${ns_val}.svc.clusterset.local" \
                      2>/dev/null || echo "DNS test failed or timed out"
                    echo "::endgroup::"
                  done

                  echo "::group::Cross-cluster connectivity test (Cluster 1 → Cluster 0)"
                  kubectl --context="$CLUSTER_1" -n "$CAMUNDA_NAMESPACE_1" run connectivity-test --image=busybox:1.28 --rm -it --restart=Never --command -- sh -c "
                    echo 'Testing DNS for cluster 0 zeebe...'
                    nslookup local-cluster.${CAMUNDA_RELEASE_NAME:-camunda}-zeebe.${CAMUNDA_NAMESPACE_0}.svc.clusterset.local || echo 'DNS resolution failed'
                    echo ''
                    echo 'Testing TCP connectivity to cluster 0 zeebe on port 26502...'
                    nc -zv local-cluster.${CAMUNDA_RELEASE_NAME:-camunda}-zeebe.${CAMUNDA_NAMESPACE_0}.svc.clusterset.local 26502 2>&1 || echo 'TCP connection failed'
                  " 2>/dev/null || echo "Connectivity test failed or timed out"
                  echo "::endgroup::"
    integration-tests-retry:
        name: Retry Tests in case of failure
        if: failure() && fromJSON(github.run_attempt) < 3
        runs-on: ubuntu-latest
        needs:
            - integration-tests
        steps:
            - name: Retrigger job
              uses: camunda/infra-global-github-actions/rerun-failed-run@da769276f29caf2b74d3dd00ba4b154714b1c0a5
              with:
                  error-messages: ''
                  run-id: ${{ github.run_id }}
                  repository: ${{ github.repository }}
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
    cleanup-clusters:
        name: Cleanup ROSA clusters
        if: always() && (needs.integration-tests.result == 'success' || fromJson(github.run_attempt) >= 3 || needs.integration-tests-retry.result == 'failure')
        runs-on: ubuntu-latest
        needs:
            - clusters-info
            - integration-tests
            - integration-tests-retry
        strategy:
            fail-fast: false
            matrix:
                distro: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).distro }}
                scenario: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).scenario }}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
              if: env.CLEANUP_CLUSTERS == 'true'
              with:
                  fetch-depth: 0
            - name: Install asdf tools with cache
              if: env.CLEANUP_CLUSTERS == 'true'
              uses: camunda/infraex-common-config/./.github/actions/asdf-install-tooling@ce8f360e366f900378c3d1531d1f278f3789f04b
            - name: Import Secrets
              id: secrets
              uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b
              if: env.CLEANUP_CLUSTERS == 'true'
              with:
                  url: ${{ secrets.VAULT_ADDR }}
                  method: approle
                  roleId: ${{ secrets.VAULT_ROLE_ID }}
                  secretId: ${{ secrets.VAULT_SECRET_ID }}
                  exportEnv: false
                  secrets: |
                      secret/data/products/infrastructure-experience/ci/common RH_OPENSHIFT_TOKEN;
            - name: Configure AWS CLI
              uses: ./.github/actions/aws-configure-cli
              if: env.CLEANUP_CLUSTERS == 'true'
              with:
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
                  aws-profile: ${{ env.AWS_PROFILE }}
                  aws-region: ${{ env.CLUSTER_0_AWS_REGION }}
            - name: Set current target branch
              if: env.CLEANUP_CLUSTERS == 'true'
              id: target-branch
              run: |
                  set -euo pipefail
                  TARGET_BRANCH=$(cat .target-branch)
                  echo "TARGET_BRANCH=$TARGET_BRANCH" | tee -a "$GITHUB_OUTPUT"
            - name: Delete on-demand ROSA HCP Cluster
              uses: ./.github/actions/aws-generic-terraform-cleanup
              if: always() && env.CLEANUP_CLUSTERS == 'true'
              timeout-minutes: 180
              env:
                  RHCS_TOKEN: ${{ steps.secrets.outputs.RH_OPENSHIFT_TOKEN }}
                  CLUSTER_0_AWS_REGION: ${{ env.CLUSTER_0_AWS_REGION }}
                  CLUSTER_1_AWS_REGION: ${{ env.CLUSTER_1_AWS_REGION }}
              with:
                  tf-bucket: ${{ env.S3_BACKEND_BUCKET }}
                  tf-bucket-region: ${{ env.S3_BUCKET_REGION }}
                  max-age-hours: 0
                  target: ${{ matrix.distro.clusterName }}-${{matrix.scenario.shortName }}
                  tf-bucket-key-prefix: ${{ env.S3_BACKEND_BUCKET_PREFIX }}${{ steps.target-branch.outputs.TARGET_BRANCH }}/
                  openshift: 'true'
                  delete-ghost-rosa-clusters: 'true'
                  modules-order: backup_bucket,peering,clusters
    report-success:
        name: Report success
        if: ${{ !failure() && !cancelled() }}
        runs-on: ubuntu-latest
        needs:
            - integration-tests
            - cleanup-clusters
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
            - name: Prevent other runs for renovate
              if: ${{ env.IS_RENOVATE_PR == 'true' }}
              env:
                  GH_TOKEN: ${{ github.token }}
              uses: ./.github/actions/internal-apply-skip-label
    report-failure:
        name: Report failures
        if: needs.triage.outputs.should_skip == 'false' && (failure() && (needs.integration-tests-retry.result != 'success' || fromJSON(github.run_attempt)
            >= 3))
        runs-on: ubuntu-latest
        needs:
            - triage
            - integration-tests-retry
            - report-success
        steps:
            - name: Notify in Slack in case of failure
              id: slack-notification
              uses: camunda/infraex-common-config/.github/actions/report-failure-on-slack@ce8f360e366f900378c3d1531d1f278f3789f04b
              with:
                  vault_addr: ${{ secrets.VAULT_ADDR }}
                  vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
                  vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}
                  slack_channel_id: ${{ env.IS_SCHEDULE == 'true' && 'C076N4G1162' || 'C07E4FF6YMB' }}
                  slack_mention_people: ${{ env.IS_SCHEDULE == 'true' && '@infraex-medic' || '' }}
                  disable_silence_check: ${{ env.IS_SCHEDULE == 'true' && 'false' || 'true' }}

