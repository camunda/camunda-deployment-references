---
name: Tests - Integration - AWS Compute EC2 Single Region

permissions:
    contents: read # don't allow commits
    pull-requests: write # allow comments, labels (used by internal-apply-skip-label)

on:
    schedule:
        - cron: 30 2 * * 3
    workflow_dispatch:
        inputs:
            # for compliance with other workflows, we use the same naming convention
            cluster_name:
                description: Prefix for the resource names. Must be unique across all reference architectures.
                type: string
            delete_clusters:
                description: Whether to delete the resources or not.
                type: boolean
                default: true
            enable_tests:
                description: Whether to enable the tests.
                type: boolean
                default: true
            ref-arch:
                description: |
                    Valid values are `ec2-single-region`.
                    Only for workflow_dispatch.
                required: false
                type: string
                default: ec2-single-region
    pull_request:
        paths:
            - .github/actions/aws-generic-terraform-cleanup/**
            - .github/actions/aws-compute-ec2-single-region-create/**
            - .github/actions/aws-configure-cli/**
            - .github/actions/internal-generic-terraform-outputs/**
            - .github/actions/camunda-smoke-test/**
            - .github/actions/internal-terraform-drift-detect/**
            - .github/workflows/aws_compute_ec2_single_region_tests.yml
            - .tool-versions
            - aws/compute/ec2-single-region/**
            - '!aws/compute/ec2-single-region/terraform/cluster/test/golden/**'
            - generic/compute/debian/**
            - generic/debian/**

# limit to a single execution per actor of this workflow
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    # we don't cancel the previous run, so it can finish it and let clusters in a proper state
    cancel-in-progress: false

env:
    IS_SCHEDULE: ${{ (contains(github.head_ref, 'schedules/') || github.event_name == 'schedule') && 'true' || 'false' }}
    IS_RENOVATE_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'renovate[bot]' }}

    AWS_PROFILE: infraex
    AWS_REGION: eu-west-2
    S3_BACKEND_BUCKET: tests-ra-aws-rosa-hcp-tf-state-eu-central-1
    S3_BUCKET_REGION: eu-central-1
    S3_BACKEND_BUCKET_PREFIX: aws/compute/ec2-single-region/ # keep it synced with the name of the module for simplicity
    TF_MODULES_PATH: ./.action-tf-modules/aws-compute-ec2-single-region-create

    CI_MATRIX_FILE: .github/workflows-config/aws-compute-ec2-single-region/test_matrix.yml
    CLEANUP_CLUSTERS: ${{ github.event.inputs.delete_clusters || 'true' }}

    TESTS_ENABLED: ${{ github.event.inputs.enable_tests || 'true' }}

    # TODO: [release-duty] before the release, update the below versions to the stable release!
    # TODO: [release-duty] adjust renovate comment to bump the minor version to the new stable release
    # TODO: [release-duty] Adjust the previous version to the previous stable release, 8.9 --> 8.8, for 8.8 would stick to 8.8
    # renovate: datasource=github-releases depName=camunda/camunda versioning=regex:^8\.10(\.(?<patch>\d+))?$
    # Pre-GA: the all-in-one installer ships 8.10.0-SNAPSHOT, so this must carry the
    # "-SNAPSHOT" suffix. The upgrade test keys its pre-release gate (and the final
    # version assertion) off this string; without the suffix the gate stays off and the
    # 8.9 -> 8.10.0-SNAPSHOT upgrade is rejected (IncompatibleVersionException). Revert to
    # the GA version at release time (see release-duty TODOs above).
    # TODO: [release-duty] at 8.10 GA, drop the "-SNAPSHOT" suffix here (revert TESTS_CAMUNDA_VERSION to 8.10.0).
    TESTS_CAMUNDA_VERSION: 8.10.0-SNAPSHOT
    TESTS_CAMUNDA_PREVIOUS_VERSION: 8.9.0 # Version to be used for upgrade tests, not updated automatically

    # renovate: datasource=github-releases depName=camunda/connectors versioning=regex:^8\.10(\.(?<patch>\d+))?$
    TESTS_CONNECTORS_VERSION: 8.10.0-SNAPSHOT
    TESTS_CONNECTORS_PREVIOUS_VERSION: 8.9.0 # Version to be used for upgrade tests, not updated automatically

jobs:
    triage:
        runs-on: ubuntu-latest
        outputs:
            should_skip: ${{ steps.skip_check.outputs.should_skip }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - name: Check labels
              id: skip_check
              uses: ./.github/actions/internal-triage-skip

    clusters-info:
        needs:
            - triage
        if: needs.triage.outputs.should_skip == 'false'
        name: Define Matrix
        runs-on: ubuntu-latest
        outputs:
            platform-matrix: ${{ steps.matrix.outputs.platform_matrix }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0

            - name: Install asdf tools with cache
              uses: camunda/infraex-common-config/./.github/actions/asdf-install-tooling@ce8f360e366f900378c3d1531d1f278f3789f04b # 1.7.0

            - name: Define tests matrix
              uses: ./.github/actions/internal-tests-matrix
              id: matrix
              with:
                  ci_matrix_file: ${{ env.CI_MATRIX_FILE }}
                  cluster_name: ${{ inputs.cluster_name }}
                  ref_arch: ${{ inputs.ref-arch }}
                  cluster_prefix: ec2-${{ github.event.pull_request.number || '' }}
                  is_schedule: ${{ env.IS_SCHEDULE }}
                  is_renovate_pr: ${{ env.IS_RENOVATE_PR }}

    prepare-clusters:
        needs:
            - clusters-info
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                distro: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).distro }}
                scenario: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).scenario }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Install asdf tools with cache
              uses: camunda/infraex-common-config/./.github/actions/asdf-install-tooling@ce8f360e366f900378c3d1531d1f278f3789f04b # 1.7.0

            - name: Configure AWS CLI
              uses: ./.github/actions/aws-configure-cli
              with:
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
                  aws-profile: ${{ env.AWS_PROFILE }}
                  aws-region: ${{ env.AWS_REGION }}
            - name: Set current target branch
              id: target-branch
              run: |
                  set -euo pipefail
                  TARGET_BRANCH=$(cat .target-branch)
                  echo "TARGET_BRANCH=$TARGET_BRANCH" | tee -a "$GITHUB_OUTPUT"
            - name: Create Infrastructure
              id: create_infrastructure
              uses: ./.github/actions/aws-compute-ec2-single-region-create
              if: always() && success()
              with:
                  aws-region: ${{ env.AWS_REGION }}
                  tf-modules-revision: ${{ github.ref }}
                  tf-modules-path: ${{ env.TF_MODULES_PATH }}
                  tf-modules-name: cluster
                  cluster-name: ${{ matrix.distro.clusterName }}-${{matrix.scenario.shortName }}
                  s3-backend-bucket: ${{ env.S3_BACKEND_BUCKET }}
                  s3-bucket-key-prefix: ${{ env.S3_BACKEND_BUCKET_PREFIX }}${{ steps.target-branch.outputs.TARGET_BRANCH }}/
                  s3-bucket-region: ${{ env.S3_BUCKET_REGION }}
                  ref-arch: ${{ matrix.scenario.name }}
                  tags: >
                      {
                        "ci-run-id": "${{ github.run_id }}",
                        "ci-run-number": "${{ github.run_number }}",
                        "ci-workflow": "${{ github.workflow }}",
                        "ci-actor": "${{ github.actor }}",
                        "ci-ref": "${{ github.ref }}",
                        "ci-commit": "${{ github.sha }}",
                        "ci-repo": "${{ github.repository }}",
                        "ci-event": "${{ github.event_name }}",
                        "map-migrated": "migARUADZHVWZ"
                      }
    integration-tests:
        name: Run integration tests - ${{ matrix.distro.name }} - ${{ matrix.scenario.name }} - ${{ matrix.declination.name }}
        runs-on: ubuntu-latest
        needs:
            - prepare-clusters
            - clusters-info
        strategy:
            fail-fast: false
            matrix:
                distro: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).distro }}
                scenario: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).scenario }}
                declination: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).declination }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Install asdf tools with cache for the project
              uses: camunda/infraex-common-config/./.github/actions/asdf-install-tooling@ce8f360e366f900378c3d1531d1f278f3789f04b # 1.7.0

            - name: Install zbctl
              run: |
                  set -euo pipefail
                  npm i -g zbctl
                  zbctl version
            - name: Configure AWS CLI
              uses: ./.github/actions/aws-configure-cli
              with:
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
                  aws-profile: ${{ env.AWS_PROFILE }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Import Artifactory credentials
              id: artifactory-credentials
              uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
              with:
                  url: ${{ secrets.VAULT_ADDR }}
                  method: approle
                  roleId: ${{ secrets.VAULT_ROLE_ID }}
                  secretId: ${{ secrets.VAULT_SECRET_ID }}
                  exportEnv: false
                  secrets: |
                      secret/data/products/infrastructure-experience/ci/artifactory-ro ARTIFACTORY_USR;
                      secret/data/products/infrastructure-experience/ci/artifactory-ro ARTIFACTORY_PSW;

            - name: Import Camunda basic auth credentials
              id: camunda-credentials
              uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
              with:
                  url: ${{ secrets.VAULT_ADDR }}
                  method: approle
                  roleId: ${{ secrets.VAULT_ROLE_ID }}
                  secretId: ${{ secrets.VAULT_SECRET_ID }}
                  exportEnv: false
                  secrets: |
                      secret/data/products/infrastructure-experience/ci/common CI_CAMUNDA_USER_TEST_CLIENT_ID | CAMUNDA_BASIC_AUTH_USER;
                      secret/data/products/infrastructure-experience/ci/common CI_CAMUNDA_USER_TEST_CLIENT_SECRET | CAMUNDA_BASIC_AUTH_PASSWORD;

            - name: Export Camunda basic auth credentials
              run: |
                  {
                    echo "CAMUNDA_BASIC_AUTH_USER=${{ steps.camunda-credentials.outputs.CAMUNDA_BASIC_AUTH_USER }}"
                    echo "CAMUNDA_BASIC_AUTH_PASSWORD=${{ steps.camunda-credentials.outputs.CAMUNDA_BASIC_AUTH_PASSWORD }}"
                  } >> "$GITHUB_ENV"

            - name: 📁 Get a copy of the reference architecture
              timeout-minutes: 10
              run: |
                  # run it as specified in the doc
                  set -euo pipefail

                  ./aws/compute/${{ matrix.scenario.name }}/procedure/get-your-copy.sh
                  tree
            - name: Set current target branch
              id: target-branch
              run: |
                  set -euo pipefail
                  TARGET_BRANCH=$(cat .target-branch)
                  echo "TARGET_BRANCH=$TARGET_BRANCH" | tee -a "$GITHUB_OUTPUT"
            - name: Set current Camunda version
              id: camunda-version
              run: |
                  set -euo pipefail
                  CAMUNDA_VERSION=$(cat .camunda-version)
                  TESTS_CAMUNDA_VERSION_HYPHENS=$(echo "${{ env.TESTS_CAMUNDA_VERSION }}" | tr '.' '-')
                  {
                    echo "CAMUNDA_VERSION=$CAMUNDA_VERSION"
                    echo "TESTS_CAMUNDA_VERSION_HYPHENS=$TESTS_CAMUNDA_VERSION_HYPHENS"
                  } >> "$GITHUB_OUTPUT"

            - name: Get Terraform outputs
              id: terraform-outputs
              uses: ./.github/actions/internal-generic-terraform-outputs
              with:
                  tf-state-suffix: ${{ matrix.distro.clusterName }}-${{matrix.scenario.shortName }}
                  tf-modules-name: cluster
                  s3-backend-bucket: ${{ env.S3_BACKEND_BUCKET }}
                  s3-bucket-key-prefix: ${{ env.S3_BACKEND_BUCKET_PREFIX }}${{ steps.target-branch.outputs.TARGET_BRANCH }}/
                  s3-bucket-region: ${{ env.S3_BUCKET_REGION }}

            - name: Terratest - Run all Tests
              id: terratest
              working-directory: aws/compute/ec2-single-region/test/src
              timeout-minutes: 121
              env:
                  # We just need the outputs from terraform to run the tests, which is initialized in above
                  TERRAFORM_DIR: ${{ github.workspace }}/.github/actions/internal-generic-terraform-outputs
                  CAMUNDA_VERSION: ${{ env.TESTS_CAMUNDA_VERSION }}
                  CAMUNDA_PREVIOUS_VERSION: ${{ env.TESTS_CAMUNDA_PREVIOUS_VERSION }}
                  CAMUNDA_CONNECTORS_VERSION: ${{ env.TESTS_CONNECTORS_VERSION }}
                  CAMUNDA_CONNECTORS_PREVIOUS_VERSION: ${{ env.TESTS_CONNECTORS_PREVIOUS_VERSION }}
                  CAMUNDA_DISTRO_USER: ${{ steps.artifactory-credentials.outputs.ARTIFACTORY_USR }}
                  CAMUNDA_DISTRO_PASSWORD: ${{ steps.artifactory-credentials.outputs.ARTIFACTORY_PSW }}
                  # Download the distribution + connectors bundle once and stage them on every node,
                  # instead of each node (x3) re-downloading from Artifactory on every install. The
                  # cache dir persists for the whole job, so re-installs (CloudWatch, upgrade) reuse
                  # it too. This is the main lever to cut our Artifactory egress. The caching logic
                  # lives in a CI-only helper (test/ci-distro-cache.sh) so the customer-facing
                  # procedure scripts stay free of it; all-in-one-install.sh sources it only when
                  # CAMUNDA_DISTRO_CACHE_LIB is set.
                  CAMUNDA_DISTRO_CACHE_DIR: ${{ runner.temp }}/camunda-distro-cache
                  CAMUNDA_DISTRO_CACHE_LIB: ${{ github.workspace }}/aws/compute/ec2-single-region/test/ci-distro-cache.sh
                  CAMUNDA_BASIC_AUTH_USER: ${{ steps.camunda-credentials.outputs.CAMUNDA_BASIC_AUTH_USER }}
                  CAMUNDA_BASIC_AUTH_PASSWORD: ${{ steps.camunda-credentials.outputs.CAMUNDA_BASIC_AUTH_PASSWORD }}
              run: |
                  set -euo pipefail
                  export PATH=$PATH:$(go env GOPATH)/bin
                  mkdir /home/runner/.ssh
                  touch /home/runner/.ssh/config
                  go install gotest.tools/gotestsum@latest

                  # Run all tests except TestSetup and TestTeardown
                  set +e
                  go run gotest.tools/gotestsum@latest --junitfile tests.xml -- --timeout=120m --skip 'TestSetup|TestTeardown'
                  rc=$?
                  set -e

                  if [[ "${rc}" -eq 0 ]]; then
                      exit 0
                  fi

                  # TODO: [release-duty] remove this SNAPSHOT upgrade-flake tolerance at 8.10 GA -- the
                  # upgrade then runs GA -> GA and must fail loudly (this block would otherwise hide it).
                  # Tolerate ONLY the documented upstream flake: on a SNAPSHOT build the in-place
                  # upgrade (TestCamundaUpgrade) can fail because the daily Camunda SNAPSHOT artifact is
                  # broken upstream, independent of this repo (see TestCamundaUpgrade in
                  # default_ec2_test.go). In that single case we keep the job green with a loud warning;
                  # any other failure -- or an additional failing test -- still fails the job.
                  install_version=$(grep -E '^CAMUNDA_VERSION=' ../../procedure/camunda-install.sh | head -1 | sed -E 's/.*:-"?([^"}]*)"?\}?.*/\1/' || true)
                  failing=$(python3 ../print-failed-tests.py tests.xml || true)
                  echo "[INFO] install_version='${install_version}' failing_tests='${failing}'"
                  if [[ "${install_version}" == *SNAPSHOT* && "${failing}" == "TestCamundaUpgrade" ]]; then
                      echo "::warning::Tolerated SNAPSHOT upgrade flake (TestCamundaUpgrade) - broken upstream daily artifact, see default_ec2_test.go"
                      echo "tolerated=true" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi
                  exit "${rc}"

            - name: 🔥 Run Camunda Smoke Test
              # Skip when the upgrade flake was tolerated above: the broker is intentionally left in a
              # known-broken state, so the smoke test would fail and defeat the tolerance.
              if: env.TESTS_ENABLED == 'true' && steps.terratest.outputs.tolerated != 'true'
              timeout-minutes: 15
              uses: ./.github/actions/camunda-smoke-test
              with:
                  auth-mode: basic
                  zeebe-rest-address: >-
                      http://${{ fromJson(steps.terraform-outputs.outputs.json_output).alb_endpoint.value }}
                  basic-auth-user: ${{ steps.camunda-credentials.outputs.CAMUNDA_BASIC_AUTH_USER }}
                  basic-auth-password: ${{ steps.camunda-credentials.outputs.CAMUNDA_BASIC_AUTH_PASSWORD }}
                  benchmark-duration: '300'

            # this is a workaround for test report not working as expected due to https://github.com/test-summary/action/issues/5
            - name: Filter logger.go from the test report (too large)
              if: always()
              working-directory: aws/compute/ec2-single-region/test/src
              run: |
                  set -euo pipefail
                  sed 's/&#xA;/\n/g' < "./tests.xml" |
                  grep -E -v '^.*logger\.go.*$' |
                  sed 's/\n/&#xA;/g' > "./tests-${{ steps.camunda-version.outputs.TESTS_CAMUNDA_VERSION_HYPHENS }}-filtered.xml"
            - name: Upload test reports
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: test-reports-${{ steps.camunda-version.outputs.TESTS_CAMUNDA_VERSION_HYPHENS }}-${{ matrix.distro.name }}
                  path: ${{ github.workspace }}/aws/compute/ec2-single-region/test/src/tests-${{ steps.camunda-version.outputs.TESTS_CAMUNDA_VERSION_HYPHENS
                      }}-filtered.xml
                  retention-days: 7

    cleanup-clusters:
        name: Cleanup EC2 cluster
        if: always()
        runs-on: ubuntu-latest
        needs:
            - clusters-info
            - prepare-clusters
            - integration-tests
        strategy:
            fail-fast: false
            matrix:
                distro: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).distro }}
                scenario: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).scenario }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              if: env.CLEANUP_CLUSTERS == 'true'
              with:
                  fetch-depth: 0

            - name: Install asdf tools with cache
              if: env.CLEANUP_CLUSTERS == 'true'
              uses: camunda/infraex-common-config/./.github/actions/asdf-install-tooling@ce8f360e366f900378c3d1531d1f278f3789f04b # 1.7.0

            - name: Configure AWS CLI
              if: env.CLEANUP_CLUSTERS == 'true'
              uses: ./.github/actions/aws-configure-cli
              with:
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
                  aws-profile: ${{ env.AWS_PROFILE }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Set current target branch
              id: target-branch
              run: |
                  set -euo pipefail
                  TARGET_BRANCH=$(cat .target-branch)
                  echo "TARGET_BRANCH=$TARGET_BRANCH" | tee -a "$GITHUB_OUTPUT"

            - name: Delete on-demand Infrastructure
              uses: ./.github/actions/aws-generic-terraform-cleanup
              if: always() && env.CLEANUP_CLUSTERS == 'true'
              timeout-minutes: 125
              with:
                  tf-bucket: ${{ env.S3_BACKEND_BUCKET }}
                  tf-bucket-region: ${{ env.S3_BUCKET_REGION }}
                  max-age-hours: 0
                  target: ${{ matrix.distro.clusterName }}-${{matrix.scenario.shortName }}
                  tf-bucket-key-prefix: ${{ env.S3_BACKEND_BUCKET_PREFIX }}${{ steps.target-branch.outputs.TARGET_BRANCH }}/
                  modules-order: cluster

    test-report:
        runs-on: ubuntu-latest
        if: always() && needs.triage.outputs.should_skip == 'false'
        needs:
            - integration-tests
            - triage
        outputs:
            SNAPSHOT_ERROR: ${{ steps.determine-if-failed-tests-include-snapshot.outputs.SNAPSHOT_ERROR }}
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  pattern: test-reports-*
                  path: /tmp/testreports
                  merge-multiple: true
            - name: Determine if failed tests include SNAPSHOT
              id: determine-if-failed-tests-include-snapshot
              run: |
                  set -euo pipefail
                  file=$(find /tmp/testreports -name "*SNAPSHOT*.xml" -type f)
                  echo "Found file: $file"
                  if grep -q "FAIL" "$file"; then
                    echo "File containing 'SNAPSHOT' with FAIL exists"
                    echo "SNAPSHOT_ERROR=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "No file containing 'SNAPSHOT' or with FAIL found"
                    echo "SNAPSHOT_ERROR=false" >> "$GITHUB_OUTPUT"
                  fi
            - name: Run test-summary
              uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2
              with:
                  paths: /tmp/testreports/**/*.xml

    report-success:
        name: Report success
        if: ${{ !failure() && !cancelled() }}
        runs-on: ubuntu-latest
        needs:
            - integration-tests
            - cleanup-clusters
            - test-report
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Prevent other runs for renovate
              if: ${{ env.IS_RENOVATE_PR == 'true' }}
              env:
                  GH_TOKEN: ${{ github.token }}
              uses: ./.github/actions/internal-apply-skip-label

    report-failure:
        name: Report failure
        runs-on: ubuntu-latest
        if: needs.triage.outputs.should_skip == 'false' && (failure())
        needs:
            - triage
            - report-success
            - test-report
        steps:
            - name: Notify in Slack in case of failure
              id: slack-notification
              uses: camunda/infraex-common-config/.github/actions/report-failure-on-slack@ce8f360e366f900378c3d1531d1f278f3789f04b # 1.7.0
              with:
                  vault_addr: ${{ secrets.VAULT_ADDR }}
                  vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
                  vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}
                  slack_channel_id: ${{ env.IS_SCHEDULE == 'true' && 'C076N4G1162' || 'C07E4FF6YMB' }}
                  slack_mention_people: ${{ env.IS_SCHEDULE == 'true' && '@infraex-medic' || '' }}
                  disable_silence_check: ${{ env.IS_SCHEDULE == 'true' && 'false' || 'true' }}
