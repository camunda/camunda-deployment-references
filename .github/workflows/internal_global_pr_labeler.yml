---
name: Internal - Global - Pull Request Labeler
on:
    pull_request_target:
    schedule:
        - cron: 0 1 * * 1
    pull_request:
        paths:
            - .github/workflows/labeler.yml

jobs:
    labeler:
        permissions:
            contents: read
            pull-requests: write # only allow updates of the tags
        runs-on: ubuntu-latest
        steps:
            - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6

            - name: Notify in Slack in case of failure
              id: slack-notification
              if: failure()
              # TODO(infraex-common-config#487): pinned to the feat/issue-1106-branch-aware-slack-alerts tip;
              # bump to the next released tag (>=1.7.0) of infraex-common-config before merging.
              uses: camunda/infraex-common-config/.github/actions/report-failure-on-slack@b033a85e17556c002c2b54f1a0ae31554382eb90
              with:
                  vault_addr: ${{ secrets.VAULT_ADDR }}
                  vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
                  vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}
                  slack_channel_id: ${{ github.event_name == 'schedule' && 'C076N4G1162' || 'C07E4FF6YMB' }}
                  slack_mention_people: ${{ github.event_name == 'schedule' && '@infraex-medic' || '' }}
                  disable_silence_check: ${{ github.event_name == 'schedule' && 'false' || 'true' }}
