---
name: Internal - Global - Pull Request Labeler
on:
    pull_request_target:
    schedule:
        - cron: 0 1 * * 1
    pull_request:
        paths:
            - .github/workflows/labeler.yml

jobs:
    labeler:
        permissions:
            contents: read
            pull-requests: write # only allow updates of the tags
        runs-on: ubuntu-latest
        steps:
            - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6

            - name: Notify in Slack in case of failure
              id: slack-notification
              if: failure() && github.event_name == 'schedule'
              uses: camunda/infraex-common-config/.github/actions/report-failure-on-slack@18718a9ca7599dc71ef3624230ad624720e85ee9 # 1.6.0
              with:
                  vault_addr: ${{ secrets.VAULT_ADDR }}
                  vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
                  vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}
