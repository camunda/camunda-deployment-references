---
name: Tests - Integration - Generic Migration from Bitnami

permissions:
    contents: read
    pull-requests: write

on:
    schedule:
        - cron: 0 3 * * 2 # Runs at 3 AM on Tuesday (after operator-based tests on Monday)
    pull_request:
        paths:
            - .github/workflows/generic_kubernetes_migration_test.yml
            - .github/workflows/_migration_test_run.yml
            - .github/workflows-config/generic-kubernetes-migration-from-bitnami/test_matrix.yml
            - .tool-versions
            - generic/kubernetes/migration/**
            - generic/kubernetes/operator-based/**
            - local/kubernetes/kind-single-region/**
            - .github/actions/internal-apply-skip-label/**
            - .github/actions/internal-tests-matrix/**
            - .github/actions/internal-clean-namespace/**
            - .github/actions/internal-helm-deprecation-check/**

    workflow_dispatch:
        inputs:
            enable_tests:
                description: Whether to enable the tests.
                type: boolean
                default: true
            benchmark_scenario:
                description: |
                    Benchmark data volume scenario.
                    'light' = 5 PI/s for 5 min (~32 MB), 'heavy' = 150 PI/s for 30 min (~20 GB).
                type: choice
                options:
                    - light
                    - heavy
                default: light

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

env:
    IS_SCHEDULE: ${{ (contains(github.head_ref, 'schedules/') || github.event_name == 'schedule') && 'true' || 'false' }}
    IS_RENOVATE_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'renovate[bot]' }}

    CI_MATRIX_FILE: .github/workflows-config/generic-kubernetes-migration-from-bitnami/test_matrix.yml

    TESTS_ENABLED: ${{ github.event.inputs.enable_tests || 'true' }}
    BENCHMARK_SCENARIO: ${{ github.event.inputs.benchmark_scenario || 'light' }}

    # renovate: datasource=helm depName=camunda-platform versioning=regex:^14(\.(?<minor>\d+))?(\.(?<patch>\d+))?$ registryUrl=https://helm.camunda.io
    CAMUNDA_HELM_CHART_VERSION: 14-dev-latest
    # TODO: [release-duty] before the release, update this!
    # TODO: [release-duty] adjust renovate comment to bump the major version

    # renovate: datasource=github-tags depName=camunda/camunda-platform-helm
    TESTS_CAMUNDA_HELM_CHART_REPO_REF: main
    TESTS_CAMUNDA_HELM_CHART_REPO_PATH: ./.camunda_helm_repo

jobs:
    triage:
        runs-on: ubuntu-latest
        outputs:
            should_skip: ${{ steps.skip_check.outputs.should_skip }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - name: Check labels
              id: skip_check
              uses: ./.github/actions/internal-triage-skip

    clusters-info:
        needs:
            - triage
        if: needs.triage.outputs.should_skip == 'false'
        name: Define Matrix
        runs-on: ubuntu-latest
        outputs:
            platform-matrix: ${{ steps.matrix.outputs.platform_matrix }}
            platform-matrix-light: ${{ steps.split.outputs.light }}
            platform-matrix-heavy: ${{ steps.split.outputs.heavy }}
            has-heavy: ${{ steps.split.outputs.has_heavy }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0

            - name: Install asdf tools with cache
              uses: camunda/infraex-common-config/./.github/actions/asdf-install-tooling@193a21e1e56c9a65517a822224ac3b4ffa4d6ae4 # 1.5.9

            - name: Define tests matrix
              uses: ./.github/actions/internal-tests-matrix
              id: matrix
              with:
                  ci_matrix_file: ${{ env.CI_MATRIX_FILE }}
                  cluster_prefix: kind-migr
                  ref_arch: migration-from-bitnami
                  is_schedule: ${{ env.IS_SCHEDULE }}
                  is_renovate_pr: ${{ env.IS_RENOVATE_PR }}

            - name: Split matrix into light and heavy
              id: split
              run: |
                  set -euo pipefail
                  FULL='${{ steps.matrix.outputs.platform_matrix }}'
                  LIGHT=$(echo "$FULL" | jq -c '{
                      distro: [.distro[] | select((.benchmark_scenario // "light") != "heavy")],
                      scenario: .scenario
                  }')
                  HEAVY=$(echo "$FULL" | jq -c '{
                      distro: [.distro[] | select(.benchmark_scenario == "heavy")],
                      scenario: .scenario
                  }')
                  HAS_HEAVY=$(echo "$HEAVY" | jq -r 'if (.distro | length) > 0 then "true" else "false" end')
                  {
                      echo "light=$LIGHT"
                      echo "heavy=$HEAVY"
                      echo "has_heavy=$HAS_HEAVY"
                  } >> "$GITHUB_OUTPUT"
                  echo "Light distros: $(echo "$LIGHT" | jq -r '[.distro[].name] | join(", ")')"
                  echo "Heavy distros: $(echo "$HEAVY" | jq -r '[.distro[].name] | join(", ")')"

    # =================================================================
    # Run migration tests — light distros in parallel, then heavy sequentially.
    # Test steps are in _migration_test_run.yml (reusable workflow).
    # =================================================================
    migration-tests:
        needs:
            - triage
            - clusters-info
        if: needs.triage.outputs.should_skip == 'false'
        uses: ./.github/workflows/_migration_test_run.yml
        with:
            platform-matrix: ${{ needs.clusters-info.outputs.platform-matrix-light }}
        secrets: inherit

    migration-tests-heavy:
        needs:
            - triage
            - clusters-info
            - migration-tests
        if: needs.triage.outputs.should_skip == 'false' && needs.clusters-info.outputs.has-heavy == 'true'
        uses: ./.github/workflows/_migration_test_run.yml
        with:
            platform-matrix: ${{ needs.clusters-info.outputs.platform-matrix-heavy }}
            max-parallel: 1
        secrets: inherit

    report-success:
        name: Report success
        runs-on: ubuntu-latest
        needs:
            - migration-tests
            - migration-tests-heavy
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Prevent other runs for renovate
              if: ${{ env.IS_RENOVATE_PR == 'true' }}
              env:
                  GH_TOKEN: ${{ github.token }}
              uses: ./.github/actions/internal-apply-skip-label

    # =================================================================
    # Meta-analysis: compare warm reindex vs standard cutover
    # =================================================================
    compare-warm-reindex:
        name: Compare warm reindex effectiveness
        runs-on: ubuntu-latest
        if: always()
        needs:
            - migration-tests
            - migration-tests-heavy
        steps:
            - name: Download all migration metrics
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  pattern: migration-metrics-*
                  merge-multiple: false
                  path: metrics

            - name: Analyze warm reindex effectiveness
              run: |
                  set -euo pipefail

                  {
                      echo "## Migration Timing Meta-Analysis"
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

                  # Collect all metrics files
                  METRICS_FILES=$(find metrics/ -name 'migration-metrics.json' 2>/dev/null || true)
                  if [[ -z "$METRICS_FILES" ]]; then
                      echo "No migration metrics found — skipping analysis." >> "$GITHUB_STEP_SUMMARY"
                      exit 0
                  fi

                  {
                      echo "### Per-job metrics"
                      echo ""
                      echo "| Distro | Scenario | Warm Reindex | Phase 1 | Phase 2 | Phase 3 (downtime) | Cutover ES Reindex | Status |"
                      echo "|--------|----------|--------------|---------|---------|--------------------|-------------------|--------|"
                  } >> "$GITHUB_STEP_SUMMARY"

                  for f in $METRICS_FILES; do
                      DISTRO=$(jq -r '.distro' "$f")
                      SCENARIO=$(jq -r '.benchmark_scenario' "$f")
                      WARM=$(jq -r '.es_warm_reindex' "$f")
                      P1=$(jq -r '.phase1_duration // "-"' "$f")
                      P2=$(jq -r '.phase2_duration // "-"' "$f")
                      P3=$(jq -r '.phase3_duration // "-"' "$f")
                      CUT_DUR=$(jq -r '.cutover_reindex_duration // "-"' "$f")
                      STATUS=$(jq -r '.job_status' "$f")
                      echo "| $DISTRO | $SCENARIO | $WARM | $P1 | $P2 | $P3 | $CUT_DUR | $STATUS |" >> "$GITHUB_STEP_SUMMARY"
                  done

                  echo "" >> "$GITHUB_STEP_SUMMARY"

                  # Compare heavy-with-warm vs heavy-without-warm if both exist
                  HEAVY_STD=$(find metrics/ -path '*/Kind-Heavy-Domain/*' -name 'migration-metrics.json' 2>/dev/null | head -1)
                  HEAVY_WARM=$(find metrics/ -path '*/Kind-Heavy-WarmReindex-Domain/*' -name 'migration-metrics.json' 2>/dev/null | head -1)

                  if [[ -n "$HEAVY_STD" && -n "$HEAVY_WARM" ]]; then
                      STD_P3=$(jq -r '.phase3_duration // ""' "$HEAVY_STD")
                      WARM_P3=$(jq -r '.phase3_duration // ""' "$HEAVY_WARM")
                      STD_CUT=$(jq -r '.cutover_reindex_duration // ""' "$HEAVY_STD")
                      WARM_CUT=$(jq -r '.cutover_reindex_duration // ""' "$HEAVY_WARM")
                      WARM_CREATED=$(jq -r '.cutover_reindex_created // 0' "$HEAVY_WARM")
                      WARM_SKIPPED=$(jq -r '.cutover_reindex_skipped // 0' "$HEAVY_WARM")
                      WARM_TOTAL=$(jq -r '.cutover_reindex_total // 0' "$HEAVY_WARM")
                      WARM_DOCS_PRE=$(jq -r '.warm_reindex_docs // 0' "$HEAVY_WARM")

                      {
                          echo "### Warm Reindex Effectiveness (Heavy scenario)"
                          echo ""
                          echo "| Metric | Without Warm Reindex | With Warm Reindex |"
                          echo "|--------|---------------------|-------------------|"
                          echo "| Phase 3 (downtime window) | $STD_P3 | $WARM_P3 |"
                          echo "| ES cutover reindex duration | $STD_CUT | $WARM_CUT |"
                          echo "| Docs created during cutover | - | $WARM_CREATED |"
                          echo "| Docs skipped (warm pre-migrated) | - | $WARM_SKIPPED |"
                          echo "| Total docs | - | $WARM_TOTAL |"
                          echo "| Docs pre-migrated (Phase 2) | - | $WARM_DOCS_PRE |"
                          echo ""
                      } >> "$GITHUB_STEP_SUMMARY"

                      # Compute skip ratio as a scale factor indicator
                      if [[ "$WARM_TOTAL" -gt 0 && "$WARM_SKIPPED" -gt 0 ]]; then
                          SKIP_PCT=$(( WARM_SKIPPED * 100 / WARM_TOTAL ))
                          {
                              echo "**Skip ratio**: ${SKIP_PCT}% of docs were pre-migrated by warm reindex and skipped during cutover."
                              echo ""
                              echo "> The warm reindex effectiveness scales with data volume: the larger the dataset,"
                              echo "> the higher the skip ratio and the greater the downtime reduction."
                              echo "> With a delta window of ~5 min (light benchmark), the skip ratio is a conservative lower bound."
                          } >> "$GITHUB_STEP_SUMMARY"
                      fi
                  else
                      {
                          echo "### Warm Reindex Comparison"
                          echo ""
                          echo "> Both \`Kind-Heavy-Domain\` and \`Kind-Heavy-WarmReindex-Domain\` must run"
                          echo "> to produce a comparison. This typically happens on scheduled runs only."
                      } >> "$GITHUB_STEP_SUMMARY"
                  fi

    report-failures:
        name: Report failures
        if: failure()
        runs-on: ubuntu-latest
        needs:
            - report-success
        steps:
            - name: Notify in Slack in case of failure
              id: slack-notification
              if: ${{ env.IS_SCHEDULE == 'true' }}
              uses: camunda/infraex-common-config/.github/actions/report-failure-on-slack@193a21e1e56c9a65517a822224ac3b4ffa4d6ae4 # 1.5.9
              with:
                  vault_addr: ${{ secrets.VAULT_ADDR }}
                  vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
                  vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}
