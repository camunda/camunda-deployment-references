---
# This workflow updates an artifact containing the OpenShift ACM versions,
# it's used by renovate and published at https://camunda.github.io/camunda-deployment-references/openshift_acm_versions.txt
name: Internal - OpenShift - Save OpenShift ACM Versions as an artifact

on:
    schedule:
        - cron: 0 0 * * *
    workflow_dispatch:
    pull_request:
        paths:
            - .github/workflows/internal_openshift_artifact_acm_versions.yml

jobs:
    save-acm-versions:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Switch to gh-pages branch
              run: |
                  cp .github/scripts/get_acm_versions.py /tmp/get_acm_versions.py
                  git fetch origin gh-pages
                  git checkout gh-pages

            - name: Retrieve OpenShift ACM versions
              shell: bash
              run: |
                  set -euo pipefail

                  python3 -m venv acm-venv
                  source acm-venv/bin/activate

                  pip install requests bs4

                  python /tmp/get_acm_versions.py

                  echo "Printing: ./docs/openshift_acm_versions.txt"
                  cat "./docs/openshift_acm_versions.txt"

                  # Guard: never publish an empty/invalid artifact (see commit fa56123).
                  if [ ! -s ./docs/openshift_acm_versions.txt ] || ! grep -qE '[0-9]' ./docs/openshift_acm_versions.txt; then
                    echo "::error::Generated './docs/openshift_acm_versions.txt' is empty or has no version numbers; aborting to avoid publishing an empty artifact."
                    exit 1
                  fi

            - name: Commit and push OpenShift ACM versions file to gh-pages
              shell: bash
              run: |
                  set -euo pipefail

                  git diff --exit-code docs/openshift_acm_versions.txt || {
                    echo "Changes detected, committing and pushing to gh-pages"
                    git config --local user.name "github-actions[bot]"
                    git config --local user.email "github-actions[bot]@users.noreply.github.com"
                    git add docs/openshift_acm_versions.txt
                    git commit -m "Update OpenShift ACM versions"
                    git push origin gh-pages
                  }
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Notify in Slack in case of failure
              id: slack-notification
              if: failure()
              uses: camunda/infraex-common-config/.github/actions/report-failure-on-slack@bde1b69728d323c1c2d02e19153a8e00382eec4a # 1.8.0
              with:
                  vault_addr: ${{ secrets.VAULT_ADDR }}
                  vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
                  vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}
                  slack_channel_id: ${{ github.event_name == 'schedule' && 'C076N4G1162' || 'C07E4FF6YMB' }}
                  slack_mention_people: ${{ github.event_name == 'schedule' && '@infraex-medic' || '' }}
                  disable_silence_check: ${{ github.event_name == 'schedule' && 'false' || 'true' }}
