---
name: Tests - Integration - Local Kubernetes Kind Single Region
permissions:
    contents: read
    pull-requests: write
on:
    schedule:
        - cron: 0 4 * * 3
    pull_request: {}
    workflow_dispatch:
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false
env:
    REF_ARCH_PATH: local/kubernetes/kind-single-region
    IS_SCHEDULE: ${{ (contains(github.head_ref, 'schedules/') || github.event_name == 'schedule') && 'true' || 'false' }}
    IS_RENOVATE_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'renovate[bot]' }}
    CI_MATRIX_FILE: .github/workflows-config/local-kubernetes-kind-single-region/test_matrix.yml
    TESTS_ENABLED: 'true'
jobs:
    triage:
        runs-on: ubuntu-latest
        outputs:
            should_skip: ${{ steps.skip_check.outputs.should_skip }}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
            - name: Check labels
              id: skip_check
              uses: ./.github/actions/internal-triage-skip
    clusters-info:
        needs: triage
        if: needs.triage.outputs.should_skip == 'false'
        name: Define Matrix
        runs-on: ubuntu-latest
        outputs:
            platform-matrix: ${{ steps.matrix.outputs.platform_matrix }}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
            - name: Install asdf tools with cache
              uses: camunda/infraex-common-config/./.github/actions/asdf-install-tooling@ce8f360e366f900378c3d1531d1f278f3789f04b
            - name: Define tests matrix
              uses: ./.github/actions/internal-tests-matrix
              id: matrix
              with:
                  ci_matrix_file: ${{ env.CI_MATRIX_FILE }}
                  cluster_prefix: kind-${{ github.event.pull_request.number || '' }}
                  is_schedule: ${{ env.IS_SCHEDULE }}
                  is_renovate_pr: ${{ env.IS_RENOVATE_PR }}
    integration-tests:
        name: Test ${{ matrix.distro.name }} - ${{ matrix.declination.name }}
        needs:
            - triage
            - clusters-info
        if: needs.triage.outputs.should_skip == 'false'
        runs-on: aws-core-8-default
        timeout-minutes: 45
        strategy:
            fail-fast: false
            matrix:
                distro: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).distro }}
                scenario: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).scenario }}
                declination: ${{ fromJson(needs.clusters-info.outputs.platform-matrix).declination }}
        env:
            CLUSTER_NAME: camunda-platform-local
            CAMUNDA_NAMESPACE: camunda
            CAMUNDA_RELEASE_NAME: camunda
            TEST_CLUSTER_TYPE: kubernetes
        steps:
            - name: Checkout repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
            - name: Install asdf tools with cache
              uses: camunda/infraex-common-config/./.github/actions/asdf-install-tooling@ce8f360e366f900378c3d1531d1f278f3789f04b
            - name: Install envsubst
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y -qq gettext-base
            - name: Import Secrets
              id: secrets
              uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b
              with:
                  url: ${{ secrets.VAULT_ADDR }}
                  method: approle
                  roleId: ${{ secrets.VAULT_ROLE_ID }}
                  secretId: ${{ secrets.VAULT_SECRET_ID }}
                  exportEnv: false
                  secrets: |
                      secret/data/products/infrastructure-experience/ci/common DOCKERHUB_USER;
                      secret/data/products/infrastructure-experience/ci/common DOCKERHUB_PASSWORD;
                      secret/data/products/infrastructure-experience/ci/common CI_CAMUNDA_USER_TEST_CLIENT_ID;
                      secret/data/products/infrastructure-experience/ci/common CI_CAMUNDA_USER_TEST_CLIENT_SECRET;
            - name: Create Kind cluster
              working-directory: ${{ env.REF_ARCH_PATH }}
              run: ./procedure/cluster-create.sh
            - name: Deploy Contour
              if: matrix.declination.use_tls
              working-directory: ${{ env.REF_ARCH_PATH }}
              run: ./procedure/contour-deploy.sh
            - name: Configure CoreDNS
              if: matrix.declination.use_tls
              working-directory: ${{ env.REF_ARCH_PATH }}
              run: |
                  set -euo pipefail

                  ./procedure/coredns-config.sh
            - name: Generate TLS certificates
              if: matrix.declination.use_tls
              working-directory: ${{ env.REF_ARCH_PATH }}
              run: |
                  set -euo pipefail

                  ./procedure/certs-generate.sh
            - name: Create TLS secret
              if: matrix.declination.use_tls
              working-directory: ${{ env.REF_ARCH_PATH }}
              run: |
                  set -euo pipefail

                  ./procedure/certs-create-secret.sh
            - name: Create CA ConfigMap
              if: matrix.declination.use_tls
              working-directory: ${{ env.REF_ARCH_PATH }}
              run: |
                  set -euo pipefail

                  ./procedure/certs-create-ca-configmap.sh
            - name: Create Docker Hub pull secret
              run: |
                  set -euo pipefail

                  # Create the pull secret to avoid Docker Hub rate limit
                  kubectl create secret docker-registry index-docker-io \
                      --docker-server=index.docker.io \
                      --docker-username="${{ steps.secrets.outputs.DOCKERHUB_USER }}" \
                      --docker-password="${{ steps.secrets.outputs.DOCKERHUB_PASSWORD }}" \
                      --namespace="${{ env.CAMUNDA_NAMESPACE }}"
            - name: Deploy operators (Elasticsearch, PostgreSQL, Keycloak)
              timeout-minutes: 15
              working-directory: ${{ env.REF_ARCH_PATH }}
              env:
                  SECONDARY_STORAGE: ${{ matrix.declination.secondary_storage }}
                  CAMUNDA_MODE: ${{ matrix.declination.use_tls && 'domain' || 'no-domain' }}
              run: |
                  set -euo pipefail
                  ./procedure/operators-deploy.sh
            - name: Create identity secrets
              working-directory: ${{ env.REF_ARCH_PATH }}
              run: ./procedure/create-identity-secrets.sh
            - name: Extract Helm chart version
              id: chart-version
              working-directory: ${{ env.REF_ARCH_PATH }}
              run: |
                  SCRIPT=${{ matrix.declination.use_tls && 'procedure/camunda-deploy-domain.sh' || 'procedure/camunda-deploy-no-domain.sh' }}
                  VERSION=$(grep -oP 'CAMUNDA_HELM_CHART_VERSION="\K[^"]+' "$SCRIPT")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            - name: Helm registry login
              uses: ./.github/actions/internal-helm-registry-login
              with:
                  helm-chart-version: ${{ steps.chart-version.outputs.version }}
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
            - name: Deploy Camunda (domain mode)
              if: matrix.declination.use_tls
              working-directory: ${{ env.REF_ARCH_PATH }}
              env:
                  SECONDARY_STORAGE: ${{ matrix.declination.secondary_storage }}
              run: |
                  set -euo pipefail

                  # Apply registry configuration to avoid Docker Hub rate limit
                  yq ". *+ load(\"../../../generic/kubernetes/single-region/tests/helm-values/registry.yml\")" \
                    helm-values/values-domain.yml > helm-values/values-domain.yml.tmp
                  mv helm-values/values-domain.yml.tmp helm-values/values-domain.yml

                  # CI-only: grant the auto-generated 'orchestration' M2M client
                  # the admin role so the smoke test can deploy BPMN resources
                  # via the Zeebe REST API. User-facing helm-values stay unchanged.
                  yq -i '.orchestration.security.initialization.defaultRoles.admin.clients = ["orchestration"]' \
                    helm-values/values-domain.yml

                  ./procedure/camunda-deploy-domain.sh
            - name: Deploy Camunda (no-domain mode)
              if: ${{ !matrix.declination.use_tls }}
              working-directory: ${{ env.REF_ARCH_PATH }}
              env:
                  SECONDARY_STORAGE: ${{ matrix.declination.secondary_storage }}
              run: |
                  set -euo pipefail

                  # Apply registry configuration to avoid Docker Hub rate limit
                  yq ". *+ load(\"../../../generic/kubernetes/single-region/tests/helm-values/registry.yml\")" \
                    helm-values/values-no-domain.yml > helm-values/values-no-domain.yml.tmp
                  mv helm-values/values-no-domain.yml.tmp helm-values/values-no-domain.yml

                  # CI-only: grant the auto-generated 'orchestration' M2M client
                  # the admin role so the smoke test can deploy BPMN resources
                  # via the Zeebe REST API. User-facing helm-values stay unchanged.
                  yq -i '.orchestration.security.initialization.defaultRoles.admin.clients = ["orchestration"]' \
                    helm-values/values-no-domain.yml

                  ./procedure/camunda-deploy-no-domain.sh
            - name: 🔍 Check for Helm deprecation warnings
              uses: ./.github/actions/internal-helm-deprecation-check
              with:
                  release-name: ${{ env.CAMUNDA_RELEASE_NAME }}
                  namespace: ${{ env.CAMUNDA_NAMESPACE }}
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
            - name: Wait for Camunda deployment
              timeout-minutes: 10
              env:
                  CAMUNDA_NAMESPACE: ${{ env.CAMUNDA_NAMESPACE }}
              run: ./generic/kubernetes/single-region/procedure/check-deployment-ready.sh
            - name: Verify get-keycloak-password script
              working-directory: ${{ env.REF_ARCH_PATH }}
              run: |
                  set -euo pipefail

                  echo "Testing get-keycloak-password.sh script..."
                  output=$(./procedure/get-keycloak-password.sh)

                  echo "$output"

                  # Verify the script outputs both username and password
                  echo "$output" | grep -q "Keycloak Admin Username:" || { echo "ERROR: Missing username in output"; exit 1; }
                  echo "$output" | grep -q "Keycloak Admin Password:" || { echo "ERROR: Missing password in output"; exit 1; }

                  echo "✅ get-keycloak-password.sh works correctly"
            - name: ✅ Deployment verification successful
              run: |
                  set -euo pipefail

                  echo "=== Deployment Successful ==="
                  echo "Camunda Platform has been successfully deployed and all pods are ready."

                  echo ""
                  echo "=== Helm Release ==="
                  helm list -n "${{ env.CAMUNDA_NAMESPACE }}"

                  echo ""
                  echo "=== All Resources ==="
                  kubectl get all -n "${{ env.CAMUNDA_NAMESPACE }}"
            - name: Set Camunda domain environment variables
              run: |
                  set -euo pipefail

                  if [[ "${{ matrix.declination.use_tls }}" == "true" ]]; then
                      echo "CAMUNDA_DOMAIN=camunda.example.com" | tee -a "$GITHUB_ENV"
                      echo "CAMUNDA_GRPC_DOMAIN=zeebe-camunda.example.com:443" | tee -a "$GITHUB_ENV"
                  else
                      echo "CAMUNDA_DOMAIN=" | tee -a "$GITHUB_ENV"
                      echo "CAMUNDA_GRPC_DOMAIN=" | tee -a "$GITHUB_ENV"
                  fi
            - name: Set current Camunda version
              id: camunda-version
              run: |
                  set -euo pipefail

                  CAMUNDA_VERSION=$(cat .camunda-version)
                  echo "CAMUNDA_VERSION=$CAMUNDA_VERSION" | tee -a "$GITHUB_OUTPUT"
            - name: Extract auto-generated credentials from Helm deployment
              id: local-credentials
              run: "set -euo pipefail\n\necho \"\U0001F4E6 Extracting auto-generated credentials from camunda-credentials secret...\"\n\n# The Helm chart\
                  \ auto-generates an 'orchestration' client that can be used for M2M authentication\n# Client ID is 'orchestration' and secret is stored\
                  \ in identity-orchestration-client-token\nLOCAL_CLIENT_ID=\"orchestration\"\nLOCAL_CLIENT_SECRET=$(kubectl get secret camunda-credentials\
                  \ -n \"${{ env.CAMUNDA_NAMESPACE }}\" \\\n  -o jsonpath='{.data.identity-orchestration-client-token}' | base64 -d)\n\nif [[ -z \"$LOCAL_CLIENT_SECRET\"\
                  \ ]]; then\n  echo \"⚠️ Could not extract orchestration client secret, tests requiring auth will be skipped\"\n  echo \"LOCAL_CLIENT_ID=\"\
                  \ | tee -a \"$GITHUB_OUTPUT\"\n  echo \"LOCAL_CLIENT_SECRET=\" | tee -a \"$GITHUB_OUTPUT\"\nelse\n  echo \"✅ Successfully extracted orchestration\
                  \ client credentials\"\n  echo \"LOCAL_CLIENT_ID=$LOCAL_CLIENT_ID\" | tee -a \"$GITHUB_OUTPUT\"\n  # Don't print secret to logs\n  echo\
                  \ \"LOCAL_CLIENT_SECRET=$LOCAL_CLIENT_SECRET\" >> \"$GITHUB_OUTPUT\"\nfi\n\n# Build the M2M client map (JSON) consumed by the per-component\n\
                  # M2M token test. Keys are Keycloak client IDs, values are\n# secrets pulled from the camunda-credentials secret. Missing\n# entries are\
                  \ silently skipped (component disabled).\nread_secret() {\n    kubectl get secret camunda-credentials -n \"${{ env.CAMUNDA_NAMESPACE }}\"\
                  \ \\\n        -o jsonpath=\"{.data.$1}\" 2>/dev/null | base64 -d || true\n}\nM2M_JSON='{'\nsep=''\n# NOTE: 'console' is a Keycloak public\
                  \ client (no\n# service account) — client_credentials grant is not allowed\n# for it, so it must NOT be added here. Venom only covered\n\
                  # connectors / optimize / orchestration anyway.\nENTRIES=(\n    \"orchestration:identity-orchestration-client-token\"\n    \"connectors:identity-connectors-client-token\"\
                  \n)\n# Optimize is only deployed when secondary storage is\n# Elasticsearch; in pg-only mode the keycloak client is\n# not provisioned\
                  \ and client_credentials returns 401.\nif [[ \"${{ matrix.declination.secondary_storage }}\" != \"postgres\" ]]; then\n    ENTRIES+=(\"\
                  optimize:identity-optimize-client-token\")\nfi\nfor entry in \"${ENTRIES[@]}\"; do\n    cid=\"${entry%%:*}\"\n    key=\"${entry##*:}\"\
                  \n    val=\"$(read_secret \"$key\")\"\n    if [[ -n \"$val\" ]]; then\n        M2M_JSON+=\"${sep}\\\"${cid}\\\":\\\"${val}\\\"\"\n   \
                  \     sep=','\n    fi\ndone\nM2M_JSON+='}'\n# Use a delimited heredoc so the JSON survives masking.\n{\n    echo 'LOCAL_M2M_CLIENTS<<__M2M_EOF__'\n\
                  \    echo \"$M2M_JSON\"\n    echo '__M2M_EOF__'\n} >> \"$GITHUB_OUTPUT\"\n"
            - name: 🔥 Run Camunda Smoke Test
              if: env.TESTS_ENABLED == 'true'
              timeout-minutes: 15
              uses: ./.github/actions/camunda-smoke-test
              with:
                  namespace: ${{ env.CAMUNDA_NAMESPACE }}
                  release-name: ${{ env.CAMUNDA_RELEASE_NAME }}
            - name: 🧪 Run Go Integration Tests (replaces Venom)
              if: env.TESTS_ENABLED == 'true'
              timeout-minutes: 20
              uses: ./.github/actions/internal-integration-tests
              with:
                  test-namespace: ${{ env.CAMUNDA_NAMESPACE }}
                  test-release-name: ${{ env.CAMUNDA_RELEASE_NAME }}
                  test-cluster-type: ${{ env.TEST_CLUSTER_TYPE }}
                  camunda-domain: ${{ env.CAMUNDA_DOMAIN }}
                  camunda-domain-grpc: ${{ env.CAMUNDA_GRPC_DOMAIN }}
                  auth-mode: oidc
                  oidc-client-id: ${{ steps.local-credentials.outputs.LOCAL_CLIENT_ID }}
                  oidc-client-secret: ${{ steps.local-credentials.outputs.LOCAL_CLIENT_SECRET }}
                  oidc-m2m-clients: ${{ steps.local-credentials.outputs.LOCAL_M2M_CLIENTS }}
                  keycloak-url: http://keycloak-service:18080/auth
                  elasticsearch-enabled: 'false'
                  webmodeler-enabled: 'true'
                  console-enabled: 'true'
                  optimize-enabled: ${{ matrix.declination.secondary_storage == 'postgres' && 'false' || 'true' }}
                  local-domain-mode: ${{ matrix.declination.use_tls && 'true' || 'false' }}
            - name: 🧪 Run C8-SM-CHECKS deployment and connectivity tests
              if: env.TESTS_ENABLED == 'true'
              timeout-minutes: 15
              uses: ./.github/actions/internal-camunda-chart-tests
              with:
                  camunda-version: ${{ steps.camunda-version.outputs.CAMUNDA_VERSION }}
                  camunda-domain: ${{ env.CAMUNDA_DOMAIN }}
                  camunda-domain-grpc: ${{ env.CAMUNDA_GRPC_DOMAIN }}
                  webmodeler-enabled: 'true'
                  console-enabled: 'true'
                  optimize-enabled: ${{ matrix.declination.secondary_storage == 'postgres' && 'false' || 'true' }}
                  elasticsearch-enabled: ${{ matrix.declination.secondary_storage == 'postgres' && 'false' || 'true' }}
                  test-namespace: ${{ env.CAMUNDA_NAMESPACE }}
                  test-cluster-type: ${{ env.TEST_CLUSTER_TYPE }}
                  test-release-name: ${{ env.CAMUNDA_RELEASE_NAME }}
                  test-client-id: ${{ steps.local-credentials.outputs.LOCAL_CLIENT_ID }}
                  test-client-secret: ${{ steps.local-credentials.outputs.LOCAL_CLIENT_SECRET }}
                  enable-zeebe-client-tests: 'false'
                  keycloak-service-name: keycloak-service:18080
                  elasticsearch-service-name: elasticsearch-es-http:9200
                  enable-c8sm-deployment-check: 'true'
                  enable-c8sm-connectivity-check: 'true'
                  skip-c8sm-connectivity-ingress-class-check: 'true'
                  enable-c8sm-irsa-check: 'false'
                  enable-c8sm-zeebe-token-check: ${{ matrix.declination.use_tls && steps.local-credentials.outputs.LOCAL_CLIENT_SECRET != '' && 'true' ||
                      'false' }}
                  enable-c8sm-zeebe-connectivity-check: ${{ matrix.declination.use_tls && steps.local-credentials.outputs.LOCAL_CLIENT_SECRET != '' && 'true'
                      || 'false' }}
                  local-domain-mode: ${{ matrix.declination.use_tls && 'true' || 'false' }}
            - name: Debug failed pods
              if: failure()
              uses: ./.github/actions/internal-debug-failed-pods
              with:
                  namespace: ${{ env.CAMUNDA_NAMESPACE }}
                  context: ${{ env.CLUSTER_NAME }}
                  artifact-suffix: ${{ env.CLUSTER_NAME }}
            - name: Cleanup
              if: always()
              run: |
                  set -euo pipefail

                  echo "Cleaning up Kind cluster: ${{ env.CLUSTER_NAME }}"
                  kind delete cluster --name "${{ env.CLUSTER_NAME }}" || true
    report-success:
        name: Report success
        if: ${{ !failure() && !cancelled() }}
        runs-on: ubuntu-latest
        needs:
            - integration-tests
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
            - name: Prevent other runs for renovate
              if: ${{ env.IS_RENOVATE_PR == 'true' }}
              env:
                  GH_TOKEN: ${{ github.token }}
              uses: ./.github/actions/internal-apply-skip-label
    report-failure:
        name: Report failures
        if: needs.triage.outputs.should_skip == 'false' && (failure())
        runs-on: ubuntu-latest
        needs:
            - triage
            - report-success
        steps:
            - name: Notify in Slack in case of failure
              id: slack-notification
              uses: camunda/infraex-common-config/.github/actions/report-failure-on-slack@ce8f360e366f900378c3d1531d1f278f3789f04b
              with:
                  vault_addr: ${{ secrets.VAULT_ADDR }}
                  vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
                  vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}
                  slack_channel_id: ${{ env.IS_SCHEDULE == 'true' && 'C076N4G1162' || 'C07E4FF6YMB' }}
                  slack_mention_people: ${{ env.IS_SCHEDULE == 'true' && '@infraex-medic' || '' }}
                  disable_silence_check: ${{ env.IS_SCHEDULE == 'true' && 'false' || 'true' }}

