---
name: Tests - Integration - AWS Containers ECS Dual Region Fargate

# End-to-end Terratest suite. Applies the full vpc/ → infra/ → app/ stack
# against the sandbox AWS account, waits for Raft quorum, asserts on Zeebe
# topology, then destroys.
#
# NOT yet enabled on a schedule: invoke via workflow_dispatch until the
# sandbox-account smoke run validates the suite end-to-end. After that, add
# a row to .github/workflows-config/workflow-scheduler.yml.

on:
    workflow_dispatch:
        inputs:
            test_name:
                description: Which test to run (empty = all)
                required: false
                default: ''
                type: string

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    AWS_PROFILE: infraex
    AWS_REGION: eu-west-2

    TEST_DIR: ./aws/containers/ecs-dual-region-fargate/test/src

jobs:
    triage:
        runs-on: ubuntu-slim
        outputs:
            should_skip: ${{ steps.skip_check.outputs.should_skip }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - name: Check labels
              id: skip_check
              uses: ./.github/actions/internal-triage-skip

    integration:
        runs-on: ubuntu-latest
        needs:
            - triage
        if: needs.triage.outputs.should_skip == 'false'
        timeout-minutes: 120
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Install asdf tools with cache
              uses: camunda/infraex-common-config/./.github/actions/asdf-install-tooling@bde1b69728d323c1c2d02e19153a8e00382eec4a # 1.8.0

            - name: Configure AWS CLI
              uses: ./.github/actions/aws-configure-cli
              with:
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
                  aws-profile: ${{ env.AWS_PROFILE }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Cache Go modules
              uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
              with:
                  path: |
                      ~/go/pkg/mod
                      ~/.cache/go-build
                  key: go-${{ runner.os }}-${{ hashFiles('aws/containers/ecs-dual-region-fargate/test/src/go.sum') }}

            - name: Run Terratest
              working-directory: ${{ env.TEST_DIR }}
              env:
                  TEST_AWS_PROFILE: ${{ env.AWS_PROFILE }}
                  TEST_REGION_0: eu-west-2
                  TEST_REGION_1: eu-west-3
              run: |
                  set -e
                  TEST_FILTER="${{ inputs.test_name }}"
                  if [[ -z "$TEST_FILTER" ]]; then
                      go test -v -timeout 90m ./...
                  else
                      go test -v -timeout 90m -run "$TEST_FILTER" ./...
                  fi
