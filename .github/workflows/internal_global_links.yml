---
name: Internal - Global - Check external links

on:
    workflow_dispatch:
    schedule:
        - cron: 0 3 * * *
    pull_request:
        paths:
            - .github/workflows/internal_global_links.yml
            - '**/*.md'

env:
    IS_SCHEDULE: ${{ (contains(github.head_ref, 'schedules/') || github.event_name == 'schedule') && 'true' || 'false' }}

jobs:
    lint:
        name: links-check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Get Current Date
              id: dateofday
              run: echo "DATEOFDAY=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"

            - name: Restore lychee cache
              uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
              with:
                  path: .lycheecache
                  key: cache-lychee-${{ env.DATEOFDAY }}

            - name: Link Checker
              uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
              with:
                  fail: true
                  args: -c ./lychee-links.toml --cache --max-cache-age 1d . --verbose --no-progress '*.md' './**/*.md'
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Cache links
              uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
              with:
                  path: .lycheecache
                  key: cache-lychee-${{ env.DATEOFDAY }}

            - name: Create Issue From File
              if: failure() && env.IS_SCHEDULE == 'true'
              uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6
              with:
                  title: Link Checker Report
                  content-filepath: ./lychee/out.md
                  labels: report, automated issue
                  assignees: '@camunda/infraex-medic'

            - name: Notify in Slack in case of failure
              id: slack-notification
              uses: camunda/infraex-common-config/.github/actions/report-failure-on-slack@bde1b69728d323c1c2d02e19153a8e00382eec4a # 1.8.0
              if: failure()
              with:
                  vault_addr: ${{ secrets.VAULT_ADDR }}
                  vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
                  vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}
                  slack_channel_id: ${{ env.IS_SCHEDULE == 'true' && 'C076N4G1162' || 'C07E4FF6YMB' }}
                  slack_mention_people: ${{ env.IS_SCHEDULE == 'true' && '@infraex-medic' || '' }}
                  disable_silence_check: ${{ env.IS_SCHEDULE == 'true' && 'false' || 'true' }}
