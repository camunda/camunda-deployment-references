---
name: Internal - Global - Approve agent PR workflows

# DRAFT — Auto-approves GitHub Actions workflow runs that are awaiting manual
# approval on pull requests opened by coding-agent bots (anthropic-code-agent,
# copilot-swe-agent, openai-code-agent).
#
# Why this exists: when a coding agent opens or updates a PR, GitHub gates every
# workflow run on that PR behind a manual "approve and run" click. The automated
# CI-failure fix loop (internal_global_failure_to_agent_fix) needs those checks
# to run so the agent — and the human reviewers — can see whether the proposed
# fix actually works. This workflow grants that approval automatically, but ONLY
# for PRs authored by the known agent bots. A maintainer still reviews, approves
# and merges the PR itself; this only unblocks the CI feedback on it.
#
# Why a schedule and not `pull_request_target`: the agent-PR approval gate also
# freezes `pull_request_target` runs on those PRs, so an event-driven approver
# would itself be stuck awaiting approval and could never approve anything (a
# deadlock). A scheduled run executes from the default branch and is not gated.
#
# Why a PAT: the `actions/runs/{id}/approve` endpoint requires write access that
# the default GITHUB_TOKEN is not granted for this operation, so a user PAT
# (Vault key COPILOT_AGENT_PAT, the same one used to assign the agent) is used.
#
# SECURITY: this deliberately relaxes GitHub's human-in-the-loop gate for agent
# PRs. It is scoped strictly to agent-bot authors. A human must still review and
# approve the pull request before it can be merged.

on:
    schedule:
        # Every 10 minutes — keeps agent-PR checks moving without a human click.
        - cron: '*/10 * * * *'
    workflow_dispatch:
    # Draft-only: lets the PR branch exercise the approver before it reaches the
    # default branch (scheduled triggers only fire from the default branch).
    # TODO [setup]: drop this `push:` block before merge.
    push:
        branches:
            - ci/ci-failure-agent-autofix
        paths:
            - .github/workflows/internal_global_approve_agent_pr_workflows.yml

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false

permissions:
    contents: read
    # Required for the Vault approle login that fetches the PAT.
    id-token: write

env:
    # Logins of the coding-agent bots whose PR workflow runs may be auto-approved.
    # Normalized (no `app/` prefix, no `[bot]` suffix, lowercased) before compare.
    AGENT_BOT_LOGINS: anthropic-code-agent copilot-swe-agent copilot openai-code-agent

jobs:
    approve-agent-pr-workflows:
        name: Approve pending agent PR workflows
        runs-on: ubuntu-latest
        steps:
            # User-to-server PAT from Vault — the assignment PAT doubles as the
            # approver since it belongs to a maintainer with write access.
            - name: Import agent PAT
              id: creds
              uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4
              with:
                  url: ${{ secrets.VAULT_ADDR }}
                  method: approle
                  roleId: ${{ secrets.VAULT_ROLE_ID }}
                  secretId: ${{ secrets.VAULT_SECRET_ID }}
                  exportEnv: false
                  secrets: |
                      secret/data/products/infrastructure-experience/ci/common COPILOT_AGENT_PAT | COPILOT_AGENT_PAT;

            - name: Approve pending workflow runs on agent PRs
              env:
                  GH_TOKEN: ${{ steps.creds.outputs.COPILOT_AGENT_PAT }}
                  REPO: ${{ github.repository }}
                  AGENT_BOT_LOGINS: ${{ env.AGENT_BOT_LOGINS }}
              shell: bash
              run: |
                  set -euo pipefail

                  # Normalize a bot login: drop gh's `app/` prefix and the `[bot]`
                  # suffix, then lowercase, so all representations compare equal.
                  normalize() {
                    printf '%s' "$1" | sed -E 's#^app/##; s#\[bot\]$##' | tr '[:upper:]' '[:lower:]'
                  }

                  is_agent() {
                    local login want
                    login=$(normalize "$1")
                    for want in $AGENT_BOT_LOGINS; do
                      [ "$login" = "$(normalize "$want")" ] && return 0
                    done
                    return 1
                  }

                  # Open PRs authored by a bot, as TSV: number, headSha, login.
                  prs=$(gh pr list --repo "$REPO" --state open --limit 100 \
                    --json number,headRefOid,author \
                    --jq '.[] | select(.author.is_bot == true)
                          | [.number, .headRefOid, .author.login] | @tsv')

                  if [ -z "$prs" ]; then
                    echo "No bot-authored open PRs."
                    exit 0
                  fi

                  approved=0
                  while IFS=$'\t' read -r number sha login; do
                    [ -n "$number" ] || continue
                    if ! is_agent "$login"; then
                      echo "PR #$number by $login — not an agent bot, skipping."
                      continue
                    fi
                    echo "PR #$number by $login (sha ${sha:0:7}) — checking pending runs."
                    # Runs on this PR head that are awaiting manual approval.
                    run_ids=$(gh api \
                      "repos/$REPO/actions/runs?head_sha=$sha&status=action_required&per_page=100" \
                      --jq '.workflow_runs[].id')
                    for rid in $run_ids; do
                      if gh api --method POST "repos/$REPO/actions/runs/$rid/approve" >/dev/null 2>&1; then
                        echo "  approved run $rid"
                        approved=$((approved + 1))
                      else
                        echo "  could not approve run $rid (already approved or no permission)"
                      fi
                    done
                  done <<< "$prs"

                  echo "Done. Approved $approved run(s)."
