---
name: Tests - Integration - Teleport - AWS Kubernetes EKS Dual Region

permissions:
    contents: read # don't allow commits
    id-token: write # for Teleport authentication
    pull-requests: write # allow comments, labels (used by internal-apply-skip-label)

on:
    # Disabled: waiting for https://github.com/camunda/team-infrastructure-experience/issues/1052
    # schedule:
    #     - cron: 0 2 * * 1 # Every Monday at 02:00 UTC
    workflow_dispatch:
        inputs:
            delete_clusters:
                description: Whether to delete the Zeebe clusters.
                type: boolean
                default: true
            enable_tests:
                description: Whether to enable the tests.
                type: boolean
                default: true
    # yamllint disable rule:comments-indentation
    # Disabled: waiting for https://github.com/camunda/team-infrastructure-experience/issues/1052
    # pull_request:
    #     paths:
    #         - .github/workflows/aws_kubernetes_eks_dual_region_teleport_tests.yml
    #         - aws/kubernetes/eks-dual-region/helm-values/**
    #         - aws/kubernetes/eks-dual-region/procedure/**
    #         - aws/kubernetes/eks-dual-region/test/**
    #         - .tools-versions
    #         - .github/actions/internal-multi-region-tests/**
    #         - .github/actions/kubernetes-eck-operator/**
    #         - .github/actions/kubernetes-eck-operator-cleanup/**
    #         - generic/kubernetes/operator-based/elasticsearch/**
    # yamllint enable rule:comments-indentation

# limit to a single execution per actor of this workflow
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    # we don't cancel the previous run, so it can finish it and let clusters in a proper state
    cancel-in-progress: false

env:
    IS_SCHEDULE: ${{ (contains(github.head_ref, 'schedules/') || github.event_name == 'schedule') && 'true' || 'false' }}
    IS_RENOVATE_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'renovate[bot]' }}

    AWS_PROFILE: infraex
    AWS_REGION: eu-west-2

    LABELS: camunda.cloud/ephemeral=true
    ANNOTATIONS: janitor/ttl=2h

    KUBECONFIG: ./kubeconfig

    CLEANUP_CLUSTERS: ${{ github.event.inputs.delete_clusters || 'true' }}
    TESTS_ENABLED: ${{ github.event.inputs.enable_tests || 'true' }}
    BACKUP_BUCKET: tests-c8-multi-region-es-eu-central-1 # static shared bucket for all Teleport tests
    ZEEBE_CLUSTER_SIZE: 8 # default size of Zeebe cluster for tests - used by scripts
    CAMUNDA_RELEASE_NAME: camunda
    CLUSTER_NAME: camunda-ci-eks
    CLUSTER_0: camunda.teleport.sh-camunda-ci-eks
    CLUSTER_1: camunda.teleport.sh-camunda-ci-eks
    CAMUNDA_NAMESPACE_0: c8-multiregion-test-cluster-0
    CAMUNDA_NAMESPACE_1: c8-multiregion-test-cluster-1
    NAMESPACE_PREFIX: infraex-
    TELEPORT: true

    # renovate: datasource=helm depName=camunda-platform versioning=regex:^14(\.(?<minor>\d+))?(\.(?<patch>\d+))?$ registryUrl=https://helm.camunda.io
    CAMUNDA_HELM_CHART_VERSION: 14-dev-latest
    # TODO: [release-duty] before the release, update this!
    # TODO: [release-duty] adjust renovate comment to bump the major version

jobs:
    triage:
        runs-on: ubuntu-latest
        outputs:
            should_skip: ${{ steps.skip_check.outputs.should_skip }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - name: Check labels
              id: skip_check
              uses: ./.github/actions/internal-triage-skip

    integration-tests:
        runs-on: ubuntu-latest
        if: needs.triage.outputs.should_skip == 'false'
        needs:
            - triage
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - name: Install asdf tools with cache
              uses: camunda/infraex-common-config/./.github/actions/asdf-install-tooling@193a21e1e56c9a65517a822224ac3b4ffa4d6ae4 # 1.5.9
            - name: Configure AWS CLI
              uses: ./.github/actions/aws-configure-cli
              with:
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
                  aws-profile: ${{ env.AWS_PROFILE }}
                  aws-region: ${{ env.AWS_REGION }}
            - name: Set up Teleport
              uses: teleport-actions/setup@a820ebbf1bc1a496efca348ad21042d6e8df73a6 # v1
              with:
                  # renovate: datasource=custom.teleport-camunda depName=teleport
                  version: 18.7.1
            - name: Authenticate with Teleport
              uses: teleport-actions/auth-k8s@d45dc8f8d215c23519c9d87095ac5de98796bfdc # v2
              with:
                  proxy: camunda.teleport.sh:443
                  token: infra-ci-prod-github-action-infraex
                  kubernetes-cluster: camunda-ci-eks
                  certificate-ttl: 3h # Set a TTL for the certificate matching the job duration (worst case)
            - name: Write kubeconfig file
              id: write-kubeconfig
              working-directory: ./aws/kubernetes/eks-dual-region/test
              run: |
                  kubectl config view --raw > ./kubeconfig
            - name: Generate values for namespaces with prefix and random suffix
              id: update-namespaces
              run: |
                  set -euxo pipefail

                  RANDOM_ID="$(openssl rand -hex 3)"

                  BACKUP_NAME=${RANDOM_ID}
                  CAMUNDA_NAMESPACE_0="${NAMESPACE_PREFIX}${CAMUNDA_NAMESPACE_0}-${RANDOM_ID}"
                  CAMUNDA_NAMESPACE_1="${NAMESPACE_PREFIX}${CAMUNDA_NAMESPACE_1}-${RANDOM_ID}"

                  # Write the updated values to the GitHub Actions environment for subsequent steps.
                  {
                    echo "BACKUP_NAME=${BACKUP_NAME}"
                    echo "CAMUNDA_NAMESPACE_0=${CAMUNDA_NAMESPACE_0}"
                    echo "CAMUNDA_NAMESPACE_1=${CAMUNDA_NAMESPACE_1}"
                    echo "CLUSTER_0_NAMESPACE_ARR=${CAMUNDA_NAMESPACE_0}"
                    echo "CLUSTER_1_NAMESPACE_ARR=${CAMUNDA_NAMESPACE_1}"
                  } | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"

            - name: Import Secrets
              id: secrets
              uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3
              with:
                  url: ${{ secrets.VAULT_ADDR }}
                  method: approle
                  roleId: ${{ secrets.VAULT_ROLE_ID }}
                  secretId: ${{ secrets.VAULT_SECRET_ID }}
                  secrets: |
                      secret/data/products/infrastructure-experience/ci/common AWS_ACCESS_KEY | S3_BACKUP_ACCESS_KEY;
                      secret/data/products/infrastructure-experience/ci/common AWS_SECRET_KEY | S3_BACKUP_SECRET_KEY;

            - name: Clean up Helm releases and ECK resources
              run: |
                  set -euo pipefail

                  for ns in ${{ env.CAMUNDA_NAMESPACE_0 }} ${{ env.CAMUNDA_NAMESPACE_1 }}; do
                    if kubectl get namespace "$ns" &>/dev/null; then
                      echo "Cleaning up resources in $ns..."
                      helm delete camunda -n "$ns" 2>/dev/null || true
                      kubectl delete elasticsearch --all -n "$ns" --timeout=120s 2>/dev/null || true
                    fi
                  done

            - name: Delete namespaces
              run: |
                  set -euo pipefail

                  for ns in ${{ env.CAMUNDA_NAMESPACE_0 }} ${{ env.CAMUNDA_NAMESPACE_1 }}; do
                    if kubectl get namespace "$ns" &>/dev/null; then
                      echo "Deleting namespace $ns..."
                      kubectl delete namespace "$ns" --wait --timeout=300s
                      echo "✓ Namespace $ns deleted"
                    fi
                  done
            - name: Create namespaces and secrets
              id: create-namespaces
              env:
                  AWS_SECRET_ACCESS_KEY_ES: ${{ steps.secrets.outputs.S3_BACKUP_SECRET_KEY }}
                  AWS_ACCESS_KEY_ES: ${{ steps.secrets.outputs.S3_BACKUP_ACCESS_KEY }}
              working-directory: ./aws/kubernetes/eks-dual-region/test
              run: |
                  set -euo pipefail

                  go test --count=1 -v -timeout 9m -failfast -run TestClusterPrerequisites

            ############# ECK Elasticsearch Deployment ##############
            - name: Generate Teleport Elasticsearch manifest
              run: |
                  set -euo pipefail

                  BASE="generic/kubernetes/operator-based/elasticsearch/elasticsearch-cluster-dual-region.yml"
                  OUT="generic/kubernetes/operator-based/elasticsearch/elasticsearch-cluster-dual-region-teleport.yml"

                  cp "$BASE" "$OUT"

                  # Reduce replica count
                  yq -i '.spec.nodeSets[0].count = 2' "$OUT"

                  # Add Teleport tolerations
                  yq -i '.spec.nodeSets[0].podTemplate.spec.tolerations = [
                    {"key": "t-core-8-unstable", "operator": "Exists", "effect": "NoSchedule"},
                    {"key": "t-core-16-unstable", "operator": "Exists", "effect": "NoSchedule"}
                  ]' "$OUT"

                  # Add nodeAffinity for unstable node groups
                  yq -i '.spec.nodeSets[0].podTemplate.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms = [
                    {"matchExpressions": [{"key": "nodegroup", "operator": "In", "values": ["t-core-8-unstable", "t-core-16-unstable"]}]}
                  ]' "$OUT"

                  # Reduce resource requests for Teleport runners
                  yq -i '.spec.nodeSets[0].podTemplate.spec.containers[0].resources.requests.cpu = "100m"' "$OUT"
                  yq -i '.spec.nodeSets[0].podTemplate.spec.containers[0].resources.requests.memory = "512Mi"' "$OUT"
                  yq -i '.spec.nodeSets[0].podTemplate.spec.containers[0].resources.limits.cpu = 1' "$OUT"

                  # Reduce storage request
                  yq -i '.spec.nodeSets[0].volumeClaimTemplates[0].spec.resources.requests.storage = "30Gi"' "$OUT"

            - name: Deploy Elasticsearch via ECK on cluster-0 namespace
              timeout-minutes: 10
              uses: ./.github/actions/kubernetes-eck-operator
              with:
                  namespace: ${{ env.CAMUNDA_NAMESPACE_0 }}
                  elasticsearch-cluster-file: elasticsearch-cluster-dual-region-teleport.yml

            - name: Deploy Elasticsearch via ECK on cluster-1 namespace
              timeout-minutes: 10
              uses: ./.github/actions/kubernetes-eck-operator
              with:
                  namespace: ${{ env.CAMUNDA_NAMESPACE_1 }}
                  elasticsearch-cluster-file: elasticsearch-cluster-dual-region-teleport.yml

            - name: Sync Elasticsearch passwords across regions
              run: |
                  set -euo pipefail

                  bash ./aws/kubernetes/eks-dual-region/procedure/sync_elasticsearch_passwords.sh

            - name: Label and annotate namespaces and secrets
              working-directory: ./aws/kubernetes/eks-dual-region/test
              run: |
                  set -euo pipefail

                  export LABELS="${{ env.LABELS }}"
                  export ANNOTATIONS="${{ env.ANNOTATIONS }}"

                  apply_labels_and_annotations() {
                    local namespace="$1"

                    # Apply labels to namespace
                    if [ -n "${LABELS:-}" ]; then
                      kubectl label namespace "$namespace" "${LABELS}" --overwrite
                    fi

                    # Apply annotations to namespace
                    if [ -n "${ANNOTATIONS:-}" ]; then
                      for ann in ${ANNOTATIONS}; do
                        kubectl annotate namespace "$namespace" "$ann" --overwrite
                      done
                    fi

                    # Apply labels and annotations to all secrets in the namespace
                    local secrets
                    secrets="$(kubectl get secrets -n "$namespace" -o jsonpath='{.items[*].metadata.name}')"
                    for secret in $secrets; do
                      if [ -n "${LABELS:-}" ]; then
                        kubectl label secret "$secret" -n "$namespace" "${LABELS}" --overwrite
                      fi
                      if [ -n "${ANNOTATIONS:-}" ]; then
                        for ann in ${ANNOTATIONS}; do
                          kubectl annotate secret "$secret" -n "$namespace" "$ann" --overwrite
                        done
                      fi
                    done
                  }

                  # Combine cluster-0 and cluster-1 arrays into one comma-separated list
                  IFS=',' read -r -a ALL_NAMESPACES <<< "${CAMUNDA_NAMESPACE_0},${CAMUNDA_NAMESPACE_1}"
                  for namespace in "${ALL_NAMESPACES[@]}"; do
                    apply_labels_and_annotations "$namespace"
                  done

            - name: Helm registry login
              uses: ./.github/actions/internal-helm-registry-login
              with:
                  helm-chart-version: ${{ env.CAMUNDA_HELM_CHART_VERSION }}
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

            - name: Run Multi-region tests
              if: env.TESTS_ENABLED == 'true'
              timeout-minutes: 60
              uses: ./.github/actions/internal-multi-region-tests
              with:
                  cluster-0-name: ${{ env.CLUSTER_0 }}
                  cluster-1-name: ${{ env.CLUSTER_1 }}
                  cluster-0-namespace: ${{ env.CAMUNDA_NAMESPACE_0 }}
                  cluster-1-namespace: ${{ env.CAMUNDA_NAMESPACE_1 }}
                  helm-version: ${{ env.CAMUNDA_HELM_CHART_VERSION }}
                  backup-name: ${{ env.BACKUP_NAME }}
                  backup-bucket: ${{ env.BACKUP_BUCKET }}
                  default-values-yaml: ${{ github.workspace }}/aws/kubernetes/eks-dual-region/helm-values/camunda-values.yml
                  region-0-values-yaml: ${{ github.workspace }}/aws/kubernetes/eks-dual-region/helm-values/region0/camunda-values.yml
                  region-1-values-yaml: ${{ github.workspace }}/aws/kubernetes/eks-dual-region/helm-values/region1/camunda-values.yml
                  skip-cleanup: 'true'

            ############# Debug failed pods ##############
            - name: Debug failed pods on cluster-0
              if: failure()
              uses: ./.github/actions/internal-debug-failed-pods
              with:
                  namespace: ${{ env.CAMUNDA_NAMESPACE_0 }}
                  artifact-suffix: cluster-0

            - name: Debug failed pods on cluster-1
              if: failure()
              uses: ./.github/actions/internal-debug-failed-pods
              with:
                  namespace: ${{ env.CAMUNDA_NAMESPACE_1 }}
                  artifact-suffix: cluster-1

            ############# ECK Elasticsearch Cleanup ##############
            - name: Cleanup ECK Elasticsearch on cluster-0 namespace
              if: always() && env.CLEANUP_CLUSTERS == 'true'
              uses: ./.github/actions/kubernetes-eck-operator-cleanup
              with:
                  namespace: ${{ env.CAMUNDA_NAMESPACE_0 }}

            - name: Cleanup ECK Elasticsearch on cluster-1 namespace
              if: always() && env.CLEANUP_CLUSTERS == 'true'
              uses: ./.github/actions/kubernetes-eck-operator-cleanup
              with:
                  namespace: ${{ env.CAMUNDA_NAMESPACE_1 }}

            - name: 🧹 Uninstall ECK Operator
              if: always() && env.CLEANUP_CLUSTERS == 'true'
              uses: ./.github/actions/kubernetes-eck-operator-cleanup
              with:
                  namespace: ${{ env.CAMUNDA_NAMESPACE_0 }}
                  skip-operator-uninstall: 'false'

            - name: Delete namespaces
              if: always() && env.CLEANUP_CLUSTERS == 'true'
              working-directory: ./aws/kubernetes/eks-dual-region/test
              run: |
                  set -euo pipefail

                  kubectl delete namespace "${CAMUNDA_NAMESPACE_0}" || true
                  kubectl delete namespace "${CAMUNDA_NAMESPACE_1}" || true

    report-success:
        name: Report success
        runs-on: ubuntu-latest
        needs:
            - integration-tests
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Prevent other runs for renovate
              if: ${{ env.IS_RENOVATE_PR == 'true' }}
              env:
                  GH_TOKEN: ${{ github.token }}
              uses: ./.github/actions/internal-apply-skip-label

    report-failure:
        name: Report failures
        if: failure()
        runs-on: ubuntu-latest
        needs:
            - report-success
        steps:
            - name: Notify in Slack in case of failure
              id: slack-notification
              if: ${{ env.IS_SCHEDULE == 'true' }}
              uses: camunda/infraex-common-config/.github/actions/report-failure-on-slack@193a21e1e56c9a65517a822224ac3b4ffa4d6ae4 # 1.5.9
              with:
                  vault_addr: ${{ secrets.VAULT_ADDR }}
                  vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
                  vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}
