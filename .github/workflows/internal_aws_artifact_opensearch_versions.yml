---
# This workflow updates an artifact containing the OpenSearch versions,
# it's used by renovate and published at https://camunda.github.io/camunda-deployment-references/opensearch_versions.txt
name: Internal - AWS - Save OpenSearch Versions as an artifact

on:
    schedule:
        - cron: 0 1 * * *
    workflow_dispatch:
    pull_request:
        paths:
            - .github/workflows/internal_aws_artifact_opensearch_versions.yml

env:
    AWS_REGION: eu-west-2
    AWS_PROFILE: infraex

jobs:
    save-opensearch-versions:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Install asdf tools with cache
              uses: camunda/infraex-common-config/./.github/actions/asdf-install-tooling@ce8f360e366f900378c3d1531d1f278f3789f04b # 1.7.0

            - uses: camunda/camunda-deployment-references/.github/actions/aws-configure-cli@4f3c7204d76df59b3a6edc1780c303acee70b5e9 # main
              with:
                  vault-addr: ${{ secrets.VAULT_ADDR }}
                  vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
                  vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
                  aws-profile: ${{ env.AWS_PROFILE }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Switch to gh-pages branch
              run: |
                  cp .tool-versions /tmp/.tool-versions
                  git fetch origin gh-pages
                  git checkout gh-pages
                  cp /tmp/.tool-versions .tool-versions

            - name: Output OpenSearch versions to file
              shell: bash
              run: |
                  set -euo pipefail

                  mkdir -p docs
                  aws opensearch list-versions --no-cli-pager \
                    | jq -r '.Versions[] | select(startswith("OpenSearch_")) | sub("OpenSearch_"; "")' \
                    > docs/opensearch_versions.txt
                  cat docs/opensearch_versions.txt

            - name: Commit and push OpenSearch versions file to gh-pages
              shell: bash
              run: |
                  set -euo pipefail

                  git diff --exit-code docs/opensearch_versions.txt || {
                    echo "Changes detected, committing and pushing to gh-pages"
                    git config --local user.name "github-actions[bot]"
                    git config --local user.email "github-actions[bot]@users.noreply.github.com"
                    git add docs/opensearch_versions.txt
                    git commit -m "Update OpenSearch versions"
                    git push origin gh-pages
                  }
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Notify in Slack in case of failure
              id: slack-notification
              if: failure()
              uses: camunda/infraex-common-config/.github/actions/report-failure-on-slack@ce8f360e366f900378c3d1531d1f278f3789f04b # 1.7.0
              with:
                  vault_addr: ${{ secrets.VAULT_ADDR }}
                  vault_role_id: ${{ secrets.VAULT_ROLE_ID }}
                  vault_secret_id: ${{ secrets.VAULT_SECRET_ID }}
                  slack_channel_id: ${{ github.event_name == 'schedule' && 'C076N4G1162' || 'C07E4FF6YMB' }}
                  slack_mention_people: ${{ github.event_name == 'schedule' && '@infraex-medic' || '' }}
                  disable_silence_check: ${{ github.event_name == 'schedule' && 'false' || 'true' }}
