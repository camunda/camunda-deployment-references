---
# Benchmark ConfigMap: BPMN process + payload.
# Variables substituted by the composite action via envsubst:
#   SMOKE_NAMESPACE, SMOKE_DURATION, SMOKE_PI_PER_SECOND,
#   SMOKE_ZEEBE_GRPC, SMOKE_ZEEBE_REST, SMOKE_KEYCLOAK_TOKEN_URL,
#   SMOKE_CLIENT_SECRET_NAME
apiVersion: v1
kind: ConfigMap
metadata:
    name: smoke-test-benchmark-bpmn
    namespace: ${SMOKE_NAMESPACE}
    labels:
        app: camunda-smoke-test
data:
    benchmark.bpmn: |
        <?xml version="1.0" encoding="UTF-8"?>
        <bpmn:definitions xmlns:bpmn="http://www.omg.org/spec/BPMN/20100524/MODEL"
                          xmlns:bpmndi="http://www.omg.org/spec/BPMN/20100524/DI"
                          xmlns:dc="http://www.omg.org/spec/DD/20100524/DC"
                          xmlns:di="http://www.omg.org/spec/DD/20100524/DI"
                          xmlns:zeebe="http://camunda.org/schema/zeebe/1.0"
                          xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                          id="Definitions_1"
                          targetNamespace="http://bpmn.io/schema/bpmn">
          <bpmn:process id="smoke-test-benchmark" name="Smoke Test Benchmark" isExecutable="true">
            <bpmn:startEvent id="start" name="Start">
              <bpmn:outgoing>toValidation</bpmn:outgoing>
            </bpmn:startEvent>
            <bpmn:serviceTask id="validate" name="Validate Input">
              <bpmn:extensionElements>
                <zeebe:taskDefinition type="smoke-task-1"/>
              </bpmn:extensionElements>
              <bpmn:incoming>toValidation</bpmn:incoming>
              <bpmn:outgoing>toGateway</bpmn:outgoing>
            </bpmn:serviceTask>
            <bpmn:exclusiveGateway id="typeGateway" name="Order Type?">
              <bpmn:incoming>toGateway</bpmn:incoming>
              <bpmn:outgoing>toStandard</bpmn:outgoing>
              <bpmn:outgoing>toExpress</bpmn:outgoing>
            </bpmn:exclusiveGateway>
            <bpmn:serviceTask id="standardProcess" name="Standard Processing">
              <bpmn:extensionElements>
                <zeebe:taskDefinition type="smoke-task-2"/>
              </bpmn:extensionElements>
              <bpmn:incoming>toStandard</bpmn:incoming>
              <bpmn:outgoing>fromStandard</bpmn:outgoing>
            </bpmn:serviceTask>
            <bpmn:serviceTask id="expressProcess" name="Express Processing">
              <bpmn:extensionElements>
                <zeebe:taskDefinition type="smoke-task-3"/>
              </bpmn:extensionElements>
              <bpmn:incoming>toExpress</bpmn:incoming>
              <bpmn:outgoing>fromExpress</bpmn:outgoing>
            </bpmn:serviceTask>
            <bpmn:exclusiveGateway id="mergeGateway" name="Merge">
              <bpmn:incoming>fromStandard</bpmn:incoming>
              <bpmn:incoming>fromExpress</bpmn:incoming>
              <bpmn:outgoing>toParallel</bpmn:outgoing>
            </bpmn:exclusiveGateway>
            <bpmn:parallelGateway id="parallelSplit" name="Enrich">
              <bpmn:incoming>toParallel</bpmn:incoming>
              <bpmn:outgoing>toEnrich1</bpmn:outgoing>
              <bpmn:outgoing>toEnrich2</bpmn:outgoing>
            </bpmn:parallelGateway>
            <bpmn:serviceTask id="enrichData" name="Enrich Data">
              <bpmn:extensionElements>
                <zeebe:taskDefinition type="smoke-task-4"/>
              </bpmn:extensionElements>
              <bpmn:incoming>toEnrich1</bpmn:incoming>
              <bpmn:outgoing>fromEnrich1</bpmn:outgoing>
            </bpmn:serviceTask>
            <bpmn:serviceTask id="calculateScore" name="Calculate Score">
              <bpmn:extensionElements>
                <zeebe:taskDefinition type="smoke-task-5"/>
              </bpmn:extensionElements>
              <bpmn:incoming>toEnrich2</bpmn:incoming>
              <bpmn:outgoing>fromEnrich2</bpmn:outgoing>
            </bpmn:serviceTask>
            <bpmn:parallelGateway id="parallelJoin" name="Join">
              <bpmn:incoming>fromEnrich1</bpmn:incoming>
              <bpmn:incoming>fromEnrich2</bpmn:incoming>
              <bpmn:outgoing>toFinalize</bpmn:outgoing>
            </bpmn:parallelGateway>
            <bpmn:serviceTask id="finalize" name="Finalize">
              <bpmn:extensionElements>
                <zeebe:taskDefinition type="smoke-task-6"/>
              </bpmn:extensionElements>
              <bpmn:incoming>toFinalize</bpmn:incoming>
              <bpmn:outgoing>toEnd</bpmn:outgoing>
            </bpmn:serviceTask>
            <bpmn:endEvent id="end" name="End">
              <bpmn:incoming>toEnd</bpmn:incoming>
            </bpmn:endEvent>
            <bpmn:sequenceFlow id="toValidation" sourceRef="start" targetRef="validate"/>
            <bpmn:sequenceFlow id="toGateway" sourceRef="validate" targetRef="typeGateway"/>
            <bpmn:sequenceFlow id="toStandard" sourceRef="typeGateway" targetRef="standardProcess" name="standard">
              <bpmn:conditionExpression xsi:type="bpmn:tFormalExpression">=orderType = "standard"</bpmn:conditionExpression>
            </bpmn:sequenceFlow>
            <bpmn:sequenceFlow id="toExpress" sourceRef="typeGateway" targetRef="expressProcess" name="express">
              <bpmn:conditionExpression xsi:type="bpmn:tFormalExpression">=orderType = "express"</bpmn:conditionExpression>
            </bpmn:sequenceFlow>
            <bpmn:sequenceFlow id="fromStandard" sourceRef="standardProcess" targetRef="mergeGateway"/>
            <bpmn:sequenceFlow id="fromExpress" sourceRef="expressProcess" targetRef="mergeGateway"/>
            <bpmn:sequenceFlow id="toParallel" sourceRef="mergeGateway" targetRef="parallelSplit"/>
            <bpmn:sequenceFlow id="toEnrich1" sourceRef="parallelSplit" targetRef="enrichData"/>
            <bpmn:sequenceFlow id="toEnrich2" sourceRef="parallelSplit" targetRef="calculateScore"/>
            <bpmn:sequenceFlow id="fromEnrich1" sourceRef="enrichData" targetRef="parallelJoin"/>
            <bpmn:sequenceFlow id="fromEnrich2" sourceRef="calculateScore" targetRef="parallelJoin"/>
            <bpmn:sequenceFlow id="toFinalize" sourceRef="parallelJoin" targetRef="finalize"/>
            <bpmn:sequenceFlow id="toEnd" sourceRef="finalize" targetRef="end"/>
          </bpmn:process>
        </bpmn:definitions>
    payload.json: |
        {
          "orderId": "ORD-smoke-test",
          "orderType": "standard",
          "customer": {
            "id": "CUST-smoke",
            "name": "Smoke Test Customer",
            "email": "smoke@example.com",
            "tier": "gold"
          },
          "amount": 1250.99,
          "currency": "EUR",
          "priority": 3,
          "approved": true,
          "tags": ["smoke-test", "benchmark"],
          "items": [
            {"sku": "ITEM-001", "quantity": 2, "price": 500.00},
            {"sku": "ITEM-002", "quantity": 1, "price": 250.99}
          ],
          "metadata": {
            "source": "smoke-test",
            "version": "8.8"
          }
        }
---
apiVersion: batch/v1
kind: Job
metadata:
    name: smoke-test-benchmark
    namespace: ${SMOKE_NAMESPACE}
    labels:
        app: camunda-smoke-test
spec:
    ttlSecondsAfterFinished: 3600
    activeDeadlineSeconds: ${SMOKE_DURATION}
    backoffLimit: 0
    template:
        metadata:
            labels:
                app: camunda-smoke-test
        spec:
            restartPolicy: Never
            volumes:
                - name: bpmn
                  configMap:
                      name: smoke-test-benchmark-bpmn
            containers:
                - name: benchmark
                  image: camundacommunityhub/camunda-8-benchmark:main
                  volumeMounts:
                      - name: bpmn
                        mountPath: /bpmn
                        readOnly: true
                  env:
                      - name: CAMUNDA_CLIENT_MODE
                        value: self-managed
                      - name: CAMUNDA_CLIENT_ZEEBE_GRPC_ADDRESS
                        value: ${SMOKE_ZEEBE_GRPC}
                      - name: CAMUNDA_CLIENT_ZEEBE_REST_ADDRESS
                        value: ${SMOKE_ZEEBE_REST}
                      - name: CAMUNDA_CLIENT_ZEEBE_PREFER_REST_OVER_GRPC
                        value: 'false'
                      - name: CAMUNDA_CLIENT_AUTH_ISSUER
                        value: ${SMOKE_KEYCLOAK_TOKEN_URL}
                      - name: CAMUNDA_CLIENT_AUTH_CLIENT_ID
                        valueFrom:
                            secretKeyRef:
                                name: ${SMOKE_CLIENT_SECRET_NAME}
                                key: identity-admin-client-id
                      - name: CAMUNDA_CLIENT_AUTH_CLIENT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: ${SMOKE_CLIENT_SECRET_NAME}
                                key: identity-admin-client-secret
                      - name: BENCHMARK_BPMN_RESOURCE
                        value: file:/bpmn/benchmark.bpmn
                      - name: BENCHMARK_PAYLOADPATH
                        value: file:/bpmn/payload.json
                      - name: BENCHMARK_START_PROCESSES
                        value: 'true'
                      - name: BENCHMARK_START_PI_PER_SECOND
                        value: ${SMOKE_PI_PER_SECOND}
                      - name: BENCHMARK_AUTO_DEPLOY_PROCESS
                        value: 'true'
                      - name: BENCHMARK_BPMN_PROCESS_ID
                        value: smoke-test-benchmark
                      - name: BENCHMARK_START_WORKERS
                        value: 'true'
                      - name: BENCHMARK_JOBTYPE
                        value: smoke-task
                      - name: BENCHMARK_MULTIPLEJOBTYPES
                        value: '6'
                      - name: BENCHMARK_TASK_COMPLETION_DELAY
                        value: '100'
                      - name: BENCHMARK_WARMUP_PHASE_DURATION_MILLIS
                        value: '10000'
                      - name: BENCHMARK_START_RATE_ADJUSTMENT_STRATEGY
                        value: none
                  resources:
                      requests:
                          cpu: 500m
                          memory: 512Mi
                      limits:
                          cpu: 1
                          memory: 1Gi
