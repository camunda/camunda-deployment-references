---
name: Camunda Smoke Test

description: >
    Generate benchmark process data and verify that processes executed successfully.
    Deploys a Zeebe benchmark job (configurable duration/rate), waits for data
    propagation, then verifies process instances exist via the Zeebe REST API.

    This action runs in-cluster Kubernetes Jobs and requires kubectl access to
    the target cluster. It uses the camunda-8-benchmark tool for data generation
    and a lightweight alpine/curl job for verification.

inputs:
    namespace:
        description: Kubernetes namespace where Camunda is deployed.
        required: false
        default: camunda
    release-name:
        description: Helm release name for Camunda.
        required: false
        default: camunda
    keycloak-url:
        description: >
            In-cluster Keycloak base URL.
            Operator-based (default): http://keycloak-service:18080/auth
            Bitnami sub-charts: http://<release-name>-keycloak:80/auth
        required: false
        default: ''
    benchmark-duration:
        description: >
            Benchmark duration in seconds (the benchmark job runs until killed
            by activeDeadlineSeconds). Default 300 = 5 minutes.
        required: false
        default: '300'
    benchmark-pi-per-second:
        description: Process instances per second to generate.
        required: false
        default: '5'
    min-expected-instances:
        description: >
            Minimum number of process instances expected after the benchmark.
            A low number (default 10) is sufficient for a smoke test —
            it proves data generation and Zeebe processing work end-to-end.
        required: false
        default: '10'
    client-secret-name:
        description: >
            Kubernetes Secret name containing identity-admin-client-id and
            identity-admin-client-secret keys for OIDC authentication.
        required: false
        default: identity-secret-for-components-integration
    propagation-wait-seconds:
        description: Seconds to wait for data to propagate to search indices after the benchmark.
        required: false
        default: '60'
    zeebe-grpc-address:
        description: >
            Zeebe gRPC address (in-cluster). Defaults to http://<release-name>-zeebe-gateway:26500.
        required: false
        default: ''
    zeebe-rest-address:
        description: >
            Zeebe REST API address (in-cluster). Defaults to http://<release-name>-zeebe-gateway:8080.
        required: false
        default: ''

outputs:
    benchmark-status:
        description: "'success' or 'failed'"
        value: ${{ steps.benchmark.outcome == 'success' && 'success' || 'failed' }}
    verify-status:
        description: "'success' or 'failed'"
        value: ${{ steps.verify.outcome == 'success' && 'success' || 'failed' }}
    total-instances:
        description: Total process instances found after benchmark.
        value: ${{ steps.verify-result.outputs.total_instances }}

runs:
    using: composite
    steps:
        # ──────────────────────────────────────────────────────────────
        # Resolve defaults for optional inputs
        # ──────────────────────────────────────────────────────────────
        - name: Set environment variables
          shell: bash
          run: |
              set -euo pipefail
              RELEASE="${{ inputs.release-name }}"

              # Keycloak URL
              KC_URL="${{ inputs.keycloak-url }}"
              if [[ -z "$KC_URL" ]]; then
                  KC_URL="http://keycloak-service:18080/auth"
              fi

              # Zeebe addresses
              GRPC="${{ inputs.zeebe-grpc-address }}"
              if [[ -z "$GRPC" ]]; then
                  GRPC="http://${RELEASE}-zeebe-gateway:26500"
              fi
              REST="${{ inputs.zeebe-rest-address }}"
              if [[ -z "$REST" ]]; then
                  REST="http://${RELEASE}-zeebe-gateway:8080"
              fi

              # Management API is always on port 9600
              MGMT="http://${RELEASE}-zeebe-gateway:9600"

              # Token URL (full path for the benchmark tool)
              TOKEN_URL="${KC_URL}/realms/camunda-platform/protocol/openid-connect/token"

              {
                  echo "SMOKE_NAMESPACE=${{ inputs.namespace }}"
                  echo "SMOKE_RELEASE_NAME=${RELEASE}"
                  echo "SMOKE_KEYCLOAK_TOKEN_URL=${TOKEN_URL}"
                  echo "SMOKE_ZEEBE_GRPC=${GRPC}"
                  echo "SMOKE_ZEEBE_REST=${REST}"
                  echo "SMOKE_ZEEBE_MGMT=${MGMT}"
                  echo "SMOKE_DURATION=${{ inputs.benchmark-duration }}"
                  echo "SMOKE_PI_PER_SECOND=${{ inputs.benchmark-pi-per-second }}"
                  echo "SMOKE_MIN_EXPECTED=${{ inputs.min-expected-instances }}"
                  echo "SMOKE_CLIENT_SECRET_NAME=${{ inputs.client-secret-name }}"
              } >> "$GITHUB_ENV"

        # ──────────────────────────────────────────────────────────────
        # Clean up any previous smoke test resources
        # ──────────────────────────────────────────────────────────────
        - name: Clean up previous smoke test resources
          shell: bash
          run: |
              set -euo pipefail
              kubectl delete job smoke-test-benchmark \
                  -n "${{ inputs.namespace }}" --ignore-not-found=true
              kubectl delete job smoke-test-verify \
                  -n "${{ inputs.namespace }}" --ignore-not-found=true
              kubectl delete configmap smoke-test-benchmark-bpmn \
                  -n "${{ inputs.namespace }}" --ignore-not-found=true

        # ──────────────────────────────────────────────────────────────
        # Deploy and run the benchmark
        # ──────────────────────────────────────────────────────────────
        - name: Apply benchmark job
          id: benchmark
          shell: bash
          run: |
              set -euo pipefail
              ACTION_DIR="${{ github.action_path }}"

              echo "Generating benchmark manifests..."
              # shellcheck disable=SC2016
              ENVSUBST_VARS='${SMOKE_NAMESPACE} ${SMOKE_DURATION}'
              ENVSUBST_VARS+=' ${SMOKE_PI_PER_SECOND}'
              ENVSUBST_VARS+=' ${SMOKE_ZEEBE_GRPC} ${SMOKE_ZEEBE_REST}'
              ENVSUBST_VARS+=' ${SMOKE_KEYCLOAK_TOKEN_URL}'
              ENVSUBST_VARS+=' ${SMOKE_CLIENT_SECRET_NAME}'
              envsubst "$ENVSUBST_VARS" \
                  < "${ACTION_DIR}/manifests/benchmark-job.yml" \
                  | kubectl apply -f -

              echo "Waiting for benchmark pod to start..."
              BENCHMARK_STARTED=false
              for _ in $(seq 1 60); do
                  PHASE=$(kubectl get pods -n "${{ inputs.namespace }}" \
                      -l job-name=smoke-test-benchmark \
                      -o jsonpath='{.items[0].status.phase}' 2>/dev/null || echo "Pending")
                  if [ "$PHASE" = "Running" ] || [ "$PHASE" = "Succeeded" ]; then
                      echo "Pod phase: $PHASE"
                      BENCHMARK_STARTED=true
                      break
                  elif [ "$PHASE" = "Failed" ]; then
                      echo "::error::Benchmark pod failed to start"
                      kubectl logs job/smoke-test-benchmark -n "${{ inputs.namespace }}" 2>/dev/null || true
                      exit 1
                  fi
                  echo "  pod phase: $PHASE (waiting...)"
                  sleep 5
              done

              if [ "$BENCHMARK_STARTED" != "true" ]; then
                  echo "::error::Benchmark pod never reached Running phase"
                  exit 1
              fi

              echo "Streaming benchmark logs..."
              kubectl logs job/smoke-test-benchmark \
                  -n "${{ inputs.namespace }}" --follow --tail=-1 &
              LOGS_PID=$!

              # The benchmark runs until activeDeadlineSeconds kills it,
              # so the job condition is "failed" (DeadlineExceeded).
              WAIT_TIMEOUT=$(( ${{ inputs.benchmark-duration }} + 120 ))
              kubectl wait --for=condition=failed job/smoke-test-benchmark \
                  -n "${{ inputs.namespace }}" --timeout="${WAIT_TIMEOUT}s"

              kill "$LOGS_PID" 2>/dev/null || true

              echo "Benchmark finished (duration: ${{ inputs.benchmark-duration }}s, rate: ${{ inputs.benchmark-pi-per-second }} PI/s)"

        # ──────────────────────────────────────────────────────────────
        # Wait for data propagation to search indices
        # ──────────────────────────────────────────────────────────────
        - name: Wait for data propagation
          shell: bash
          run: |
              set -euo pipefail
              echo "Waiting ${{ inputs.propagation-wait-seconds }}s for data to propagate to search indices..."
              sleep "${{ inputs.propagation-wait-seconds }}"

        # ──────────────────────────────────────────────────────────────
        # Deploy and run the verification job
        # ──────────────────────────────────────────────────────────────
        - name: Apply verify job
          id: verify
          shell: bash
          run: |
              set -euo pipefail
              ACTION_DIR="${{ github.action_path }}"

              echo "Generating verify manifest..."
              # shellcheck disable=SC2016
              envsubst '${SMOKE_NAMESPACE} ${SMOKE_ZEEBE_REST} ${SMOKE_ZEEBE_MGMT} ${SMOKE_KEYCLOAK_TOKEN_URL} ${SMOKE_MIN_EXPECTED} ${SMOKE_CLIENT_SECRET_NAME}' \
                  < "${ACTION_DIR}/manifests/verify-job.yml" \
                  | kubectl apply -f -

              echo "Waiting for verify pod to be scheduled..."
              kubectl wait --for=condition=Ready pod \
                  -l job-name=smoke-test-verify \
                  -n "${{ inputs.namespace }}" --timeout=120s 2>/dev/null || true

              echo "Streaming verify job logs..."
              kubectl logs job/smoke-test-verify \
                  -n "${{ inputs.namespace }}" --follow --tail=-1 &
              LOGS_PID=$!

              kubectl wait --for=condition=complete job/smoke-test-verify \
                  -n "${{ inputs.namespace }}" --timeout=300s || {
                  echo "::error::Verify job did not complete in time"
                  kill "$LOGS_PID" 2>/dev/null || true
                  kubectl logs job/smoke-test-verify -n "${{ inputs.namespace }}" 2>/dev/null || true
                  exit 1
              }
              kill "$LOGS_PID" 2>/dev/null || true

              echo "Smoke test verification passed"

        - name: Extract verify results
          id: verify-result
          if: always()
          shell: bash
          run: |
              set -euo pipefail
              LOGS=$(kubectl logs job/smoke-test-verify -n "${{ inputs.namespace }}" 2>/dev/null || echo "")
              TOTAL=$(echo "$LOGS" | grep -oP 'Total instances:\s+\K\d+' || echo "0")
              echo "total_instances=${TOTAL}" >> "$GITHUB_OUTPUT"

        # ──────────────────────────────────────────────────────────────
        # Cleanup
        # ──────────────────────────────────────────────────────────────
        - name: Clean up smoke test resources
          if: always()
          shell: bash
          run: |
              set -euo pipefail
              kubectl delete job smoke-test-benchmark \
                  -n "${{ inputs.namespace }}" --ignore-not-found=true
              kubectl delete job smoke-test-verify \
                  -n "${{ inputs.namespace }}" --ignore-not-found=true
              kubectl delete configmap smoke-test-benchmark-bpmn \
                  -n "${{ inputs.namespace }}" --ignore-not-found=true
