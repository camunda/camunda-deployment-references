---
name: Internal Helm Deprecation Check
description: |
    Check for deprecation warnings and errors in the deployed Camunda Helm chart.
    Uses `helm get notes` to retrieve the release notes and scans for
    `[camunda][warning]` (deprecated configuration) and `[camunda][error]`
    (removed configuration) messages.
    Optionally validates that deployed values do not contain unknown keys
    by checking against a strict version of the chart's JSON Schema.

    Findings are reported in an event-aware, non-blocking way:
      - pull_request / pull_request_target / workflow_run: posted to a
        single shared PR comment (one comment per PR, one section per
        workflow/job/release/namespace combination).
      - schedule (real or simulated via a `schedules/*` head_ref): emitted
        as ::warning:: annotations and, when the Slack inputs are wired,
        posted to Slack via the shared report-warning-on-slack action
        (an advisory, non-failure notification).
        Simulated schedules are detected from the caller workflow's
        `IS_SCHEDULE` env var (set to `'true'` when
        `contains(github.head_ref, 'schedules/') || github.event_name == 'schedule'`).
      - workflow_dispatch / push / any other event: emitted as
        ::warning:: annotations in the job log only.
    Findings (deprecation warnings, removed keys, unknown keys) are never
    treated as failures — the intent is to trace drift, not to block release
    pipelines. The action can still exit non-zero on genuine internal errors
    (e.g. `helm get notes` / `helm get values` failures, or an internal error
    in the unknown-keys validator).

    See: https://github.com/camunda/camunda-platform-helm/issues/4564

inputs:
    release-name:
        description: The Helm release name to check
        required: false
        default: camunda
    namespace:
        description: The Kubernetes namespace where the release is deployed
        required: false
        default: camunda
    kube-context:
        description: The Kubernetes context to use (optional, defaults to current context)
        required: false
        default: ''
    exclude-patterns:
        description: |
            Newline-separated list of fixed strings to exclude from warnings and errors.
            Messages containing any of these strings will be ignored.
        required: false
        default: ''
    check-unknown-keys:
        description: |
            When set to 'true', deployed values are validated against a strict
            version of the chart's JSON Schema to detect unknown keys
            (typos, removed properties).
            The schema is automatically extracted from the deployed chart.
            See: https://github.com/camunda/camunda-platform-helm/issues/4564
        required: false
        default: 'true'
    comment-section-key:
        description: |
            Optional extra identifier mixed into the PR comment section ID.
            Use this when the same workflow + job + release-name + namespace
            tuple runs more than once (e.g. across matrix entries) and each
            run should produce its own section in the shared PR comment.
        required: false
        default: ''
    github-token:
        description: |
            Token used to read and update the shared PR comment.
            Defaults to the workflow-provided GITHUB_TOKEN. The token needs
            `pull-requests: write` permission for the comment to be posted.
        required: false
        default: ${{ github.token }}
    vault-addr:
        description: |
            HashiCorp Vault address. Required only when posting a Slack
            alert on scheduled runs. Pass secrets.VAULT_ADDR from the caller.
        required: false
        default: ''
    vault-role-id:
        description: |
            HashiCorp Vault AppRole role id. Required only when posting a
            Slack alert on scheduled runs. Pass secrets.VAULT_ROLE_ID from the caller.
        required: false
        default: ''
    vault-secret-id:
        description: |
            HashiCorp Vault AppRole secret id. Required only when posting a
            Slack alert on scheduled runs. Pass secrets.VAULT_SECRET_ID from the caller.
        required: false
        default: ''
    slack-channel-id:
        description: |
            Slack channel id to alert when findings are detected on a
            (real or simulated) scheduled run. When left empty, the
            action defaults to the standard infraex channels:
              - `C076N4G1162` (infraex-alerts) on real schedule events
              - `C07E4FF6YMB` (infraex-test)   on every other event
                (simulated schedules via `schedules/*` head_ref,
                 workflow_dispatch, etc.)
            Set explicitly to override.
        required: false
        default: ''
    slack-mention-people:
        description: |
            Slack handles or group mentions to include in the scheduled-run
            alert (e.g. `@infraex-medic`). Only used when the caller
            workflow advertises `IS_SCHEDULE=true` (real or simulated
            schedule).
        required: false
        default: ''

runs:
    using: composite
    steps:
        - name: 🔍 Check for Helm deprecation warnings
          shell: bash
          env:
              FINDINGS_DIR: ${{ runner.temp }}/helm-deprecation-check
          run: |
              set -euo pipefail

              RELEASE_NAME="${{ inputs.release-name }}"
              NAMESPACE="${{ inputs.namespace }}"
              KUBE_CONTEXT="${{ inputs.kube-context }}"

              mkdir -p "${FINDINGS_DIR}"
              FINDINGS_FILE="${FINDINGS_DIR}/findings.md"
              : > "${FINDINGS_FILE}"
              echo "FINDINGS_FILE=${FINDINGS_FILE}" >> "${GITHUB_ENV}"

              CONTEXT_ARGS=()
              if [[ -n "${KUBE_CONTEXT}" ]]; then
                  CONTEXT_ARGS+=(--kube-context "${KUBE_CONTEXT}")
                  echo "Checking Helm release '${RELEASE_NAME}' in namespace '${NAMESPACE}' (context: '${KUBE_CONTEXT}') for deprecation warnings..."
              else
                  echo "Checking Helm release '${RELEASE_NAME}' in namespace '${NAMESPACE}' for deprecation warnings..."
              fi

              # Retrieve the release notes from the deployed chart
              if ! NOTES=$(helm get notes "${RELEASE_NAME}" --namespace "${NAMESPACE}" "${CONTEXT_ARGS[@]}" 2>&1); then
                  echo "::error::Failed to retrieve Helm release notes for '${RELEASE_NAME}' in namespace '${NAMESPACE}'. Helm output:"
                  echo "${NOTES}"
                  exit 1
              fi

              # Extract deprecation warnings (pattern used by the Camunda Helm chart)
              WARNINGS=$(echo "${NOTES}" | grep -i '\[camunda\]\[warning\]' || true)

              # Extract errors for removed configuration keys
              ERRORS=$(echo "${NOTES}" | grep -i '\[camunda\]\[error\]' || true)

              # Exclude warnings matching provided patterns (fixed-string match)
              EXCLUDE_PATTERNS="${{ inputs.exclude-patterns }}"
              if [[ -n "${EXCLUDE_PATTERNS}" && -n "${WARNINGS}" ]]; then
                  while IFS= read -r pattern; do
                      [[ -z "${pattern}" ]] && continue
                      FILTERED=$(echo "${WARNINGS}" | grep -F -v -- "${pattern}") || rc=$?
                      if [[ ${rc:-0} -eq 1 ]]; then
                          # All warnings matched the exclude pattern
                          WARNINGS=""
                          break
                      elif [[ ${rc:-0} -gt 1 ]]; then
                          echo "::error::grep failed (exit ${rc}) while applying exclude pattern: ${pattern}"
                          exit 1
                      else
                          WARNINGS="${FILTERED}"
                      fi
                      unset rc
                  done <<< "${EXCLUDE_PATTERNS}"
              fi
              if [[ -n "${EXCLUDE_PATTERNS}" && -n "${ERRORS}" ]]; then
                  while IFS= read -r pattern; do
                      [[ -z "${pattern}" ]] && continue
                      FILTERED=$(echo "${ERRORS}" | grep -F -v -- "${pattern}") || rc=$?
                      if [[ ${rc:-0} -eq 1 ]]; then
                          ERRORS=""
                          break
                      elif [[ ${rc:-0} -gt 1 ]]; then
                          echo "::error::grep failed (exit ${rc}) while applying exclude pattern: ${pattern}"
                          exit 1
                      else
                          ERRORS="${FILTERED}"
                      fi
                      unset rc
                  done <<< "${EXCLUDE_PATTERNS}"
              fi

              if [[ -n "${ERRORS}" ]]; then
                  echo "::warning::Removed configuration keys detected in Helm release '${RELEASE_NAME}'"
                  echo ""
                  echo "=========================================="
                  echo "  REMOVED CONFIGURATION KEYS (ERRORS)"
                  echo "=========================================="
                  echo ""
                  echo "${ERRORS}"
                  echo ""
                  echo "=========================================="
                  echo ""
                  {
                      echo "### ❌ Removed configuration keys"
                      echo ""
                      echo '```'
                      echo "${ERRORS}"
                      echo '```'
                      echo ""
                  } >> "${FINDINGS_FILE}"
              fi

              if [[ -n "${WARNINGS}" ]]; then
                  echo "::warning::Deprecation warnings detected in Helm release '${RELEASE_NAME}'"
                  echo ""
                  echo "=========================================="
                  echo "  DEPRECATION WARNINGS"
                  echo "=========================================="
                  echo ""
                  echo "${WARNINGS}"
                  echo ""
                  echo "=========================================="
                  echo ""
                  {
                      echo "### ⚠️ Deprecation warnings"
                      echo ""
                      echo '```'
                      echo "${WARNINGS}"
                      echo '```'
                      echo ""
                  } >> "${FINDINGS_FILE}"
              fi

              if [[ -s "${FINDINGS_FILE}" ]]; then
                  echo "Findings will be reported via PR comment (or fail the job on non-PR events)."
                  echo "See: https://docs.camunda.io/docs/self-managed/deployment/helm/upgrade/"
              else
                  echo "✅ No deprecation warnings or errors found in Helm release '${RELEASE_NAME}'"
              fi

        - name: 🔑 Check for unknown configuration keys
          if: ${{ inputs.check-unknown-keys == 'true' }}
          shell: bash
          run: |
              set -euo pipefail

              RELEASE_NAME="${{ inputs.release-name }}"
              NAMESPACE="${{ inputs.namespace }}"
              KUBE_CONTEXT="${{ inputs.kube-context }}"

              CONTEXT_ARGS=()
              if [[ -n "${KUBE_CONTEXT}" ]]; then
                  CONTEXT_ARGS+=(--kube-context "${KUBE_CONTEXT}")
              fi

              echo "Checking deployed values for unknown configuration keys..."

              WORK_DIR=$(mktemp -d)
              trap 'rm -rf "${WORK_DIR}"' EXIT

              # Extract chart name and version from the deployed release
              CHART_INFO=$(helm list --namespace "${NAMESPACE}" "${CONTEXT_ARGS[@]}" \
                  --filter "^${RELEASE_NAME}$" -o json | jq -r '.[0].chart')

              if [[ -z "${CHART_INFO}" || "${CHART_INFO}" == "null" ]]; then
                  echo "::error::Could not determine chart info for release '${RELEASE_NAME}' in namespace '${NAMESPACE}'."
                  exit 1
              fi

              # Parse chart name and version (format: <name>-<version>)
              CHART_VERSION=$(echo "${CHART_INFO}" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+.*$')
              CHART_NAME=$(echo "${CHART_INFO}" | sed "s/-${CHART_VERSION}$//")

              echo "Detected chart: ${CHART_NAME} version ${CHART_VERSION}"

              # Dynamic skip: the strict unknown-keys validation requires
              # schema fixes shipped in camunda-platform >= 14.0.2 (not yet
              # released at time of writing — expected very soon).
              # On older charts (e.g. 14.0.1) the deployed values contain keys
              # that are valid at runtime but missing from the bundled
              # values.schema.json (orchestration.affinity, env[].valueFrom,
              # global.multiregion, identityKeycloak.image.pullSecrets,
              # elasticsearch.global.imagePullSecrets, ...).
              # Refs:
              #   - https://github.com/camunda/camunda-platform-helm/issues/5930 (bug)
              #   - https://github.com/camunda/camunda-platform-helm/pull/5938   (merged fix, awaiting 14.0.2 release)
              # Once 14.0.2 lands, this guard becomes a no-op automatically and
              # the strict check resumes everywhere.
              MIN_SCHEMA_VERSION="14.0.2"
              # Strip pre-release suffix (e.g. "-alpha6", "-dev-...") so that
              # 14.0.2-alpha1 is still considered >= 14.0.2 for our purposes.
              CHART_VERSION_BASE=$(echo "${CHART_VERSION}" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
              LOWEST=$(printf '%s\n%s\n' "${CHART_VERSION_BASE}" "${MIN_SCHEMA_VERSION}" | sort -V | head -n1)
              if [[ "${LOWEST}" != "${MIN_SCHEMA_VERSION}" ]]; then
                  echo "::warning::Skipping unknown-keys check: chart ${CHART_NAME} ${CHART_VERSION}" \
                      "predates the schema fixes from camunda-platform-helm ${MIN_SCHEMA_VERSION}" \
                      "(see https://github.com/camunda/camunda-platform-helm/pull/5938)." \
                      "Re-enable automatically once ${MIN_SCHEMA_VERSION} is published."
                  exit 0
              fi

              # Pull the chart to extract its schema.
              # Try the OCI registry first, then fall back to the Helm repo.
              # Pre-release versions (e.g. 14.0.0-alpha6) may not have their
              # own OCI tag when installed via a floating tag like "14-dev-latest".
              CHART_PULLED=false
              if helm pull "oci://registry.camunda.cloud/team-distribution/${CHART_NAME}" \
                  --version "${CHART_VERSION}" \
                  --destination "${WORK_DIR}" \
                  --untar 2>/dev/null; then
                  CHART_PULLED=true
              else
                  echo "OCI pull failed, trying Helm repo fallback..."
                  if helm pull "${CHART_NAME}" \
                      --repo "https://helm.camunda.io" \
                      --version "${CHART_VERSION}" \
                      --destination "${WORK_DIR}" \
                      --untar 2>/dev/null; then
                      CHART_PULLED=true
                  fi
              fi

              if [[ "${CHART_PULLED}" != "true" ]]; then
                  echo "::warning::Could not pull chart ${CHART_NAME}:${CHART_VERSION}" \
                      "from OCI registry or Helm repo." \
                      "The version may not be published yet. Skipping unknown keys check."
                  exit 0
              fi

              SCHEMA_PATH="${WORK_DIR}/${CHART_NAME}/values.schema.json"
              if [[ ! -f "${SCHEMA_PATH}" ]]; then
                  echo "::warning::No values.schema.json found in chart ${CHART_NAME}:${CHART_VERSION}, skipping unknown keys check."
                  exit 0
              fi

              # Retrieve deployed values as JSON
              VALUES_JSON="${WORK_DIR}/deployed-values.json"
              HELM_VALUES_STDERR="${WORK_DIR}/helm-get-values.stderr"
              if ! helm get values "${RELEASE_NAME}" --namespace "${NAMESPACE}" "${CONTEXT_ARGS[@]}" \
                  -o json > "${VALUES_JSON}" 2> "${HELM_VALUES_STDERR}"; then
                  echo "::error::Failed to retrieve Helm values for '${RELEASE_NAME}' in namespace '${NAMESPACE}'."
                  if [[ -s "${HELM_VALUES_STDERR}" ]]; then
                      echo "Helm output:"
                      cat "${HELM_VALUES_STDERR}"
                  fi
                  exit 1
              fi

              # Run the unknown keys validation, capturing stdout for the PR comment
              SCRIPT_DIR="${GITHUB_ACTION_PATH}"
              VALIDATION_OUTPUT="${WORK_DIR}/validation-output.txt"
              VALIDATION_EXIT=0
              python3 "${SCRIPT_DIR}/validate-unknown-keys.py" "${SCHEMA_PATH}" "${VALUES_JSON}" \
                  > "${VALIDATION_OUTPUT}" 2>&1 || VALIDATION_EXIT=$?

              # Always echo the captured output to the job log
              cat "${VALIDATION_OUTPUT}"

              if [[ "${VALIDATION_EXIT}" -eq 0 ]]; then
                  echo "✅ No unknown configuration keys found in Helm release '${RELEASE_NAME}'"
              elif [[ "${VALIDATION_EXIT}" -eq 2 ]]; then
                  echo ""
                  echo "::error::Failed to validate deployed values against the chart schema" \
                      "for Helm release '${RELEASE_NAME}'." \
                      "This indicates an internal error in the validation script."
                  exit 1
              else
                  echo ""
                  echo "::warning::Unknown configuration keys detected in Helm release '${RELEASE_NAME}'"
                  echo "These keys are not recognized by the Camunda Helm chart schema and will be silently ignored."
                  echo "This may indicate typos or use of removed/renamed configuration properties."
                  {
                      echo "### 🔑 Unknown configuration keys"
                      echo ""
                      echo '```'
                      cat "${VALIDATION_OUTPUT}"
                      echo '```'
                      echo ""
                  } >> "${FINDINGS_FILE}"
              fi

        - name: 💬 Report findings (PR comment, log, or Slack)
          id: report-findings
          if: always()
          shell: bash
          env:
              GH_TOKEN: ${{ inputs.github-token }}
              INPUT_RELEASE_NAME: ${{ inputs.release-name }}
              INPUT_NAMESPACE: ${{ inputs.namespace }}
              INPUT_KUBE_CONTEXT: ${{ inputs.kube-context }}
              INPUT_SECTION_KEY: ${{ inputs.comment-section-key }}
              GH_WORKFLOW: ${{ github.workflow }}
              GH_JOB: ${{ github.job }}
              GH_REPO: ${{ github.repository }}
              GH_RUN_ID: ${{ github.run_id }}
              GH_SERVER_URL: ${{ github.server_url }}
          run: |
              set -euo pipefail

              # The previous step may not have run (e.g. earlier infra failure).
              # Treat a missing findings file as "nothing to report".
              if [[ -z "${FINDINGS_FILE:-}" || ! -f "${FINDINGS_FILE}" || ! -s "${FINDINGS_FILE}" ]]; then
                  echo "findings-present=false" >> "${GITHUB_OUTPUT}"
                  echo "No findings to report."
                  exit 0
              fi

              echo "findings-present=true" >> "${GITHUB_OUTPUT}"

              # Determine PR number from the triggering event.
              PR_NUMBER=""
              case "${GITHUB_EVENT_NAME:-}" in
                  pull_request|pull_request_target)
                      PR_NUMBER=$(jq -r '.pull_request.number // empty' "${GITHUB_EVENT_PATH}")
                      ;;
                  workflow_run)
                      PR_NUMBER=$(jq -r '.workflow_run.pull_requests[0].number // empty' "${GITHUB_EVENT_PATH}")
                      ;;
              esac

              if [[ -z "${PR_NUMBER}" ]]; then
                  echo "::warning::Helm deprecation findings detected on event '${GITHUB_EVENT_NAME:-unknown}'; see job log."
                  echo "Findings:"
                  cat "${FINDINGS_FILE}"
                  echo ""
                  echo "See: https://docs.camunda.io/docs/self-managed/deployment/helm/upgrade/"
                  exit 0
              fi

              python3 "${GITHUB_ACTION_PATH}/upsert-pr-comment.py" \
                  --pr-number "${PR_NUMBER}" \
                  --repo "${GH_REPO}" \
                  --workflow "${GH_WORKFLOW}" \
                  --job "${GH_JOB}" \
                  --release-name "${INPUT_RELEASE_NAME}" \
                  --namespace "${INPUT_NAMESPACE}" \
                  --kube-context "${INPUT_KUBE_CONTEXT}" \
                  --section-key "${INPUT_SECTION_KEY}" \
                  --run-url "${GH_SERVER_URL}/${GH_REPO}/actions/runs/${GH_RUN_ID}" \
                  --findings-file "${FINDINGS_FILE}"

        - name: 🔔 Warn on Slack about scheduled-run findings
          if: |
              always()
              && env.IS_SCHEDULE == 'true'
              && steps.report-findings.outputs.findings-present == 'true'
              && inputs.vault-addr != ''
              && inputs.vault-role-id != ''
              && inputs.vault-secret-id != ''
          # report-warning-on-slack posts an advisory (non-failure) Slack message, so
          # non-blocking Helm drift on scheduled stable/* runs no longer looks like a
          # red "STABLE BRANCH FAILURE" alert pointing at a green run.
          # Pending release of camunda/infraex-common-config#502; repin to the tagged
          # SHA once it merges.
          uses: camunda/infraex-common-config/.github/actions/report-warning-on-slack@3a947cec0e79beb52e1f04b8da0c8ddc5c51fe52 # pending release (PR #502)
          with:
              vault_addr: ${{ inputs.vault-addr }}
              vault_role_id: ${{ inputs.vault-role-id }}
              vault_secret_id: ${{ inputs.vault-secret-id }}
              slack_channel_id: ${{ inputs.slack-channel-id != '' && inputs.slack-channel-id || (env.IS_SCHEDULE == 'true' && 'C076N4G1162' || 'C07E4FF6YMB')
                  }}
              slack_mention_people: ${{ inputs.slack-mention-people }}
              title: Helm configuration drift
              message: ${{ format('Helm release {0} has non-blocking deprecation / unknown-key findings (ignored by the chart); run did not fail.', inputs.release-name)
                  }}
